<style>

.command-grid{min-height:0;display:grid;grid-template-columns:1fr 1fr .95fr;grid-template-rows:minmax(0,1fr) minmax(0,1fr);grid-template-areas:"flow logistics temperature" "orders risk news";gap:8px}.panel{min-width:0;min-height:0;border:1px solid var(--line);background:var(--panel);border-radius:8px;box-shadow:var(--shadow);padding:10px;overflow:hidden}.panel-head{height:32px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:7px}.panel-title{font-size:14px;font-weight:900}.panel-note{font-size:10px;color:var(--faint);line-height:1.35}.panel button,.panel a{color:var(--muted);background:none;border:0;padding:0;text-decoration:none;cursor:pointer}.panel button:hover,.panel a:hover{color:var(--gold)}#flowPanel{grid-area:flow}#logisticsChartPanel{grid-area:logistics}#temperaturePanel{grid-area:temperature}#orderChartPanel{grid-area:orders}#riskPanel{grid-area:risk}#newsPanel{grid-area:news}

.donut-grid{height:calc(100% - 39px);display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}.donut-card{min-width:0;border:1px solid var(--line2);border-radius:7px;background:rgba(13,20,38,.62);padding:8px;display:grid;grid-template-rows:auto 72px 1fr;gap:6px}.donut-title{font-size:11px;font-weight:850;color:var(--muted)}.donut-chart{width:72px;height:72px;border-radius:50%;place-self:center;background:conic-gradient(var(--blue) 0 100%);position:relative}.donut-chart:after{content:"";position:absolute;inset:18px;border-radius:50%;background:var(--panel2);border:1px solid var(--line2)}.donut-list{display:grid;gap:4px;min-width:0}.donut-item{display:grid;grid-template-columns:8px minmax(0,1fr) auto;gap:5px;align-items:center;font-size:9px;color:var(--faint);cursor:pointer}.donut-dot{width:8px;height:8px;border-radius:50%;background:var(--blue)}.donut-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted)}.temp-board{height:calc(100% - 39px);display:grid;grid-template-rows:38px 1fr 58px;gap:6px}.temp-alerts{display:grid;gap:5px;overflow:hidden}.temp-alert{border:1px solid var(--line2);border-radius:7px;background:rgba(13,20,38,.62);padding:6px;cursor:pointer}.temp-alert .topline{display:flex;justify-content:space-between;font-size:10px;font-weight:850}.temp-alert .meta{margin-top:3px;font-size:9px;color:var(--faint)}.health-rule{display:none}.progress-hint{color:var(--faint);font-size:8px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
@media (max-width:1180px){body{overflow:auto}.shell{height:auto;min-height:100vh}.dashboard{grid-template-rows:auto auto auto auto}.filterbar{grid-template-columns:1fr 1fr}.kpi-strip{grid-template-columns:repeat(2,minmax(0,1fr))}.command-grid{grid-template-columns:1fr;grid-template-rows:auto;grid-template-areas:"flow" "logistics" "temperature" "orders" "risk" "news"}.panel{min-height:240px}.module-dock{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media (max-width:680px){.shell{padding:8px;grid-template-rows:auto auto}.topbar{height:auto;align-items:flex-start;flex-direction:column;padding:12px}.top-actions{width:100%;justify-content:space-between;flex-wrap:wrap}.filterbar,.kpi-strip,.module-dock{grid-template-columns:1fr}.structure-grid{grid-template-columns:1fr}.brand-top{grid-column:auto}.panel{min-height:250px}.modal-backdrop{padding:10px}}
.kpi,.panel,.module,.risk,.temp-alert,.bottleneck,.donut-card,.mini-metric,.funnel-row{will-change:transform,opacity}.funnel-fill,.bottleneck-bar span,.bar-fill{transform-origin:left center}.donut-chart{will-change:transform,filter}.risk[data-drill],.temp-alert[data-container]{position:relative;overflow:hidden}.risk[data-drill]:after,.temp-alert[data-container]:after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);transform:translateX(-120%);pointer-events:none}
@media (prefers-reduced-motion: reduce){.kpi,.panel,.module,.risk,.temp-alert,.bottleneck,.donut-card,.mini-metric,.funnel-row,.donut-chart,.funnel-fill,.bottleneck-bar span,.bar-fill{will-change:auto!important;transition:none!important;animation:none!important}.risk[data-drill]:after,.temp-alert[data-container]:after{display:none}}
</style>

<body>
<div class="shell">
  <header class="topbar">
    <div class="brand-block">
      <div class="brand-mark">EX</div>
      <div><h1>老板经营驾驶舱</h1><p>按国家、工厂、柜号看风险、效率、结构、温度</p></div>
    </div>
    <div class="top-actions">
      <div class="refresh-state" id="refreshState">正在加载</div>
      <div class="clock"><span id="dateDisplay"></span><strong id="clockDisplay"></strong></div>
      <div class="userbar" id="userbar"></div>
    </div>
  </header>
  <main class="dashboard">
    <section class="filterbar" id="filterbar" aria-label="筛选"></section>
    <section class="kpi-strip" id="kpiStrip" aria-label="经营核心指标"></section>
    <section class="command-grid">
      <section class="panel" id="flowPanel" aria-label="履约效率"></section>
      <section class="panel" id="logisticsChartPanel" aria-label="瓶颈排行"></section>
      <section class="panel" id="temperaturePanel" aria-label="温度健康"></section>
      <section class="panel" id="orderChartPanel" aria-label="结构画像"></section>
      <aside class="panel" id="riskPanel" aria-label="风险待办"></aside>
      <section class="panel" id="newsPanel" aria-label="新闻概览"></section>
    </section>
    <section class="module-dock" id="moduleDock" aria-label="模块入口"></section>
  </main>
</div>
<div class="modal-backdrop" id="drillModal">
  <div class="modal">
    <div class="modal-head"><div class="modal-title" id="modalTitle">明细</div><button class="modal-close" id="modalClose">关闭</button></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>
<script src="/vendor/gsap/gsap.min.js"></script>
<script>
const API='';
const MODULES=[
  {code:'orders',name:'订单看板',href:'/index.html',desc:'订单和柜数'},
  {code:'flow',name:'货柜流向',href:'/index-flow.html',desc:'状态流转'},
  {code:'logistics',name:'物流监控',href:'/index.html#logistics',desc:'在途滞留'},
  {code:'temperature',name:'温度监控',href:'/index-tv.html',desc:'温度详情'},
  {code:'news',name:'行业新闻',href:'/index.html#news',desc:'新闻源'},
  {code:'smartsheet',name:'智能表',href:'/admin.html#smartsheet',desc:'企微数据'},
  {code:'admin',name:'系统管理',href:'/admin.html#accounts',desc:'权限配置'},
];
let state={user:null,model:null,filters:{country:'',factory:'',container:''}};
const labels={orderNo:'订单号',country:'国家',factory:'工厂',freshBoxes:'鲜果柜数',frozenBoxes:'冻果柜数',totalBoxes:'总柜数',containerNo:'柜号',brand:'品牌',category:'品类',status:'当前状态',shipDate:'发货日期',arrivalDate:'到岸日期',domesticShipDate:'国内发货',signedDate:'签收日期',dwellDays:'停留天数',type:'风险类型',summary:'说明',days:'天数',severity:'等级',setTemp:'设定温度',returnTemp:'回风温度',deviation:'温差'};
window.DashboardMotion=(()=>{
  const reduced=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const previousValues=new Map();
  let firstPaint=true;
  function ready(){return !reduced&&window.gsap}
  function elements(selector,root=document){return Array.from(root.querySelectorAll(selector))}
  function numberParts(text){const m=String(text||'').trim().match(/^(-?\d+(?:\.\d+)?)(.*)$/);return m?{value:Number(m[1]),suffix:m[2]||'',decimals:(m[1].split('.')[1]||'').length}:null}
  function stableKey(el,index){const parent=el.closest('[data-drill],[data-container],.kpi,.cycle,.mini-metric')||el;return `${parent.dataset.drill||parent.dataset.container||parent.textContent.slice(0,18)}:${index}`}
  function countValues(root=document){
    if(!ready())return;
    elements('.kpi .value,.cycle .value,.mini-metric .value',root).forEach((el,index)=>{
      const parsed=numberParts(el.textContent);
      if(!parsed||!Number.isFinite(parsed.value))return;
      const key=stableKey(el,index);
      const from=previousValues.has(key)?previousValues.get(key):(firstPaint?0:parsed.value);
      previousValues.set(key,parsed.value);
      if(from===parsed.value)return;
      const counter={value:from};
      gsap.to(counter,{value:parsed.value,duration:firstPaint?.8:.45,ease:'power2.out',onUpdate(){
        const value=parsed.decimals?counter.value.toFixed(parsed.decimals):Math.round(counter.value);
        el.textContent=value+parsed.suffix;
      }});
    });
  }
  function stageIn(root=document){
    if(!ready())return;
    if(firstPaint){
      gsap.fromTo('.topbar,.filterbar',{autoAlpha:0,y:-10},{autoAlpha:1,y:0,duration:.45,ease:'power2.out',stagger:.06});
      gsap.fromTo('.kpi,.panel,.module',{autoAlpha:0,y:14,scale:.985},{autoAlpha:1,y:0,scale:1,duration:.5,ease:'power3.out',stagger:.035,delay:.08});
    }else{
      gsap.fromTo(elements('.kpi,.panel',root),{autoAlpha:.86,y:5},{autoAlpha:1,y:0,duration:.28,ease:'power2.out',stagger:.015,overwrite:true});
    }
  }
  function revealMeters(root=document){
    if(!ready())return;
    elements('.funnel-fill,.bottleneck-bar span,.bar-fill',root).forEach((el,index)=>{
      gsap.fromTo(el,{scaleX:0},{scaleX:1,duration:.55,ease:'power3.out',delay:index*.025,overwrite:true});
    });
    gsap.fromTo(elements('.donut-chart',root),{scale:.92,filter:'brightness(.82)'},{scale:1,filter:'brightness(1)',duration:.5,ease:'back.out(1.4)',stagger:.04,overwrite:true});
  }
  function emphasizeRisks(root=document){
    if(!ready())return;
    const items=elements('.risk[data-drill],.temp-alert[data-container]',root).slice(0,4);
    gsap.fromTo(items,{autoAlpha:0,x:10},{autoAlpha:1,x:0,duration:.34,ease:'power2.out',stagger:.045,overwrite:true});
    items.forEach((el,index)=>{
      gsap.to(el,{boxShadow:'0 0 0 1px rgba(248,113,113,.18),0 10px 26px rgba(0,0,0,.18)',duration:.7,yoyo:true,repeat:1,delay:.2+index*.06,overwrite:true});
    });
  }
  function wireHover(root=document){
    if(!ready())return;
    elements('.kpi,.panel button,.module,.funnel-row,.bottleneck,.risk,.temp-alert,.donut-item,.mini-metric',root).forEach(el=>{
      if(el.dataset.motionHover)return;
      el.dataset.motionHover='1';
      el.addEventListener('mouseenter',()=>gsap.to(el,{y:-2,duration:.18,ease:'power2.out',overwrite:true}));
      el.addEventListener('mouseleave',()=>gsap.to(el,{y:0,duration:.2,ease:'power2.out',overwrite:true}));
    });
  }
  function afterOverviewRender(){
    if(!ready())return;
    gsap.killTweensOf('.kpi,.panel,.module,.funnel-fill,.bottleneck-bar span,.bar-fill,.donut-chart,.risk,.temp-alert,.mini-metric,.cycle .value,.kpi .value');
    stageIn();
    revealMeters();
    countValues();
    emphasizeRisks();
    wireHover();
    firstPaint=false;
  }
  function openModal(modal){
    if(!ready()||!modal)return;
    const box=modal.querySelector('.modal');
    gsap.fromTo(modal,{autoAlpha:0},{autoAlpha:1,duration:.18,ease:'power2.out',overwrite:true});
    if(box)gsap.fromTo(box,{y:18,scale:.985},{y:0,scale:1,duration:.28,ease:'power3.out',overwrite:true});
  }
  function closeModal(modal,done){
    if(!ready()||!modal){done&&done();return}
    const box=modal.querySelector('.modal');
    if(box)gsap.to(box,{y:10,scale:.99,duration:.16,ease:'power2.in',overwrite:true});
    gsap.to(modal,{autoAlpha:0,duration:.18,ease:'power2.in',overwrite:true,onComplete:done});
  }
  return {afterOverviewRender,openModal,closeModal};
})();
function $(id){return document.getElementById(id)}
function esc(value){return String(value==null?'-':value).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function num(value){const n=Number(value||0);return Number.isFinite(n)?n:0}
function pctText(value){return `${Math.round(num(value)*10)/10}%`}
function clamp(value,min,max){return Math.max(min,Math.min(max,value))}
function pad(n){return String(n).padStart(2,'0')}
function gotoLogin(){location.href='/login?redirect='+encodeURIComponent(location.pathname)}
function tick(){const d=new Date();const w=['日','一','二','三','四','五','六'];$('dateDisplay').textContent=`${d.getMonth()+1}/${d.getDate()} 周${w[d.getDay()]}`;$('clockDisplay').textContent=`${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`}
async function api(path){const res=await fetch(API+path,{cache:'no-store'});if(res.status===401){gotoLogin();throw new Error('未登录')}const json=await res.json();if(!res.ok||json.success===false)throw new Error(json.error||'加载失败');return json.data||json}
function moduleAllowed(user,code){if(user.role==='admin')return true;if((user.permissions||[]).includes(code))return true;if((user.dashboardPermissions||[]).includes(code))return true;return code!=='admin'&&code!=='smartsheet'}
function trendHtml(cmp){if(!cmp)return '';const icon=cmp.direction==='up'?'▲':cmp.direction==='down'?'▼':'→';return `<span class="trend ${esc(cmp.direction)}">${icon} ${esc(Math.abs(cmp.changePct||0))}%</span>`}
function query(){const params=new URLSearchParams();Object.entries(state.filters).forEach(([k,v])=>{if(v)params.set(k,v)});return params.toString()?`?${params}`:''}
function buildViewModel(user, executive){return {user,...executive,modules:MODULES.filter(mod=>moduleAllowed(user,mod.code))}}
function renderUser(user){const name=user.displayName||user.username||'-';const canAdmin=user.role==='admin'||(user.permissions||[]).length>0;$('userbar').innerHTML=`<span>${esc(name)}</span>${canAdmin?'<a href="/admin">后台</a>':''}<a id="btnLogout">退出</a>`;$('btnLogout').onclick=async()=>{try{await fetch('/api/auth/logout',{method:'POST'})}catch(_){}gotoLogin()}}
function renderFilters(model){const f=model.filters||{};const option=(v,cur)=>`<option value="${esc(v)}" ${v===cur?'selected':''}>${esc(v||'全部')}</option>`;$('filterbar').innerHTML=`<select id="countryFilter">${option('',state.filters.country)}${(f.countries||[]).map(v=>option(v,state.filters.country)).join('')}</select><select id="factoryFilter">${option('',state.filters.factory)}${(f.factories||[]).map(v=>option(v,state.filters.factory)).join('')}</select><input id="containerFilter" value="${esc(state.filters.container)}" placeholder="输入柜号直接定位"><button id="filterReset">重置</button>`;['country','factory','container'].forEach(key=>{$(`${key}Filter`).onchange=()=>{state.filters[key]=$(`${key}Filter`).value.trim();load()}});$('containerFilter').onkeydown=e=>{if(e.key==='Enter'){state.filters.container=$('containerFilter').value.trim();load()}};$('filterReset').onclick=()=>{state.filters={country:'',factory:'',container:''};load()}}
function renderKpis(model){const h=model.headline||{},c=model.comparisons||{};const desc=h.descriptions||{};const items=[{label:'订单数',value:h.totalOrders,meaning:desc.totalOrders,accent:'var(--gold)',drill:'orders'},{label:'下单柜数',value:h.totalBoxes,meaning:desc.totalBoxes,accent:'var(--green)',drill:'boxes'},{label:'已发货',value:h.shipped,meaning:desc.shipped,accent:'var(--teal)',drill:'shipped',trend:c.shipped7d},{label:'已签收',value:h.signed,meaning:desc.signed,accent:'var(--blue)',drill:'signed',trend:c.signed7d},{label:'经营健康分',value:h.healthScore,meaning:desc.healthScore,accent:h.healthScore>=80?'var(--green)':h.healthScore>=60?'var(--orange)':'var(--red)',drill:'risks'}];$('kpiStrip').innerHTML=items.map(item=>`<article class="kpi" style="--accent:${item.accent}" data-drill="${esc(item.drill)}"><div class="label">${esc(item.label)}${trendHtml(item.trend)}</div><div class="value num">${esc(item.value)}</div><div class="meaning">${esc(item.meaning)}</div></article>`).join('');document.querySelectorAll('.kpi[data-drill]').forEach(el=>el.onclick=()=>openDrill(el.dataset.drill))}
function renderFlow(model){const e=model.efficiency||{},cycle=e.cycleTimes||{},c=model.comparisons||{};$('flowPanel').innerHTML=`<div class="panel-head"><div><div class="panel-title">履约效率</div><div class="panel-note">最近 7 天对比上一周期</div></div><button data-drill="shipped">明细</button></div><div class="fulfillment-funnel">${(e.funnel||[]).map(row=>`<div class="funnel-row" data-drill="${esc(row.drilldown)}"><div class="funnel-label">${esc(row.label)}</div><div class="funnel-track"><div class="funnel-fill" style="width:${clamp(row.rate,0,100)}%"></div></div><div class="funnel-value num">${esc(row.value)} · ${pctText(row.rate)}</div></div>`).join('')}<div class="cycle-strip"><div class="cycle"><div class="label">平均国外段${trendHtml(c.avgTransitDays7d)}</div><div class="value num">${esc(cycle.avgOverseasDays)}天</div></div><div class="cycle"><div class="label">平均在岸</div><div class="value num">${esc(cycle.avgOnShoreDays)}天</div></div><div class="cycle"><div class="label">平均国内段</div><div class="value num">${esc(cycle.avgDomesticTransitDays)}天</div></div></div></div>`;document.querySelectorAll('.funnel-row[data-drill],#flowPanel button[data-drill]').forEach(el=>el.onclick=()=>openDrill(el.dataset.drill))}
function renderLogisticsChart(model){const list=model.bottlenecks||[];const max=Math.max(1,...list.map(item=>item.longestDays||item.count||0));$('logisticsChartPanel').innerHTML=`<div class="panel-head"><div><div class="panel-title">瓶颈排行</div><div class="panel-note">看哪里卡、卡了几天、代表柜号</div></div><button data-drill="bottlenecks">全部</button></div><div class="bottleneck-list">${list.map(item=>`<div class="bottleneck" data-drill="bottlenecks.${esc(item.key)}"><div class="bottleneck-top"><span>${esc(item.label)}</span><strong class="num">${esc(item.count)}柜</strong></div><div class="bottleneck-meta">${esc(item.hint)} · 最久 ${esc(item.longestDays)} 天 · ${esc(item.longestContainer)}</div><div class="bottleneck-bar"><span style="width:${clamp((item.longestDays||0)/max*100,0,100)}%"></span></div></div>`).join('')}</div>`;document.querySelectorAll('#logisticsChartPanel [data-drill]').forEach(el=>el.onclick=()=>openDrill(el.dataset.drill))}
function renderTemperature(model){const t=model.temperature||{},g=t.gantt||{days:[],rows:[]};$('temperaturePanel').innerHTML=`<div class="panel-head"><div><div class="panel-title">温度监控</div><div class="panel-note">缩略甘特：正常/预警/异常</div></div><button data-drill="temperatureAlerts">异常明细</button></div><div class="temperature-summary"><div class="temp-metrics"><div class="mini-metric" data-drill="temperatureAlerts"><div class="label">异常率</div><div class="value num">${pctText(t.alarmRate)}</div></div><div class="mini-metric" data-drill="temperatureAlerts"><div class="label">异常柜</div><div class="value num">${esc(t.alarmCount)}</div></div><div class="mini-metric" data-drill="temperatureAlerts"><div class="label">最大温差</div><div class="value num">${esc(t.maxDeviation)}°</div></div><div class="mini-metric"><div class="label">均温</div><div class="value num">${esc(t.avgReturnTemp)}°</div></div></div><div class="mini-gantt"><div class="gantt-head"><span></span>${g.days.map(d=>`<span>${esc(d.label)}</span>`).join('')}</div>${g.rows.length?g.rows.map(row=>`<div class="gantt-row" data-container="${esc(row.containerNo)}"><div class="gantt-label">${esc(row.containerNo)}</div>${row.cells.map(cell=>`<div class="gantt-cell ${esc(cell.level)}" title="${esc(cell.date)} ${esc(cell.returnTemp||'')}" data-container="${esc(row.containerNo)}"></div>`).join('')}</div>`).join(''):'<div class="empty-state">暂无温度甘特数据</div>'}</div></div>`;document.querySelectorAll('#temperaturePanel [data-drill]').forEach(el=>el.onclick=()=>openDrill(el.dataset.drill));document.querySelectorAll('#temperaturePanel [data-container]').forEach(el=>el.onclick=()=>openDrill(`byContainer.${el.dataset.container}`))}
function renderOrderChart(model){const s=model.structure||{};const rows=(title,items,accent,type)=>`<div class="structure-block"><div class="structure-title">${esc(title)}</div><div class="bar-chart">${(items||[]).map(item=>`<div class="bar-row" data-drill="${esc(type)}.${esc(item.label)}"><div class="bar-label">${esc(item.label)}</div><div class="bar-track"><div class="bar-fill" style="--accent:${accent};width:${clamp(item.rate||item.value,0,100)}%"></div></div><div class="bar-value num">${esc(item.value)}</div></div>`).join('')}</div></div>`;$('orderChartPanel').innerHTML=`<div class="panel-head"><div><div class="panel-title">结构画像</div><div class="panel-note">按国家、品类、工厂穿透</div></div><button data-drill="orders">订单</button></div><div class="structure-grid">${rows('国家结构',s.country,'var(--blue)','byCountry')}${rows('品类结构',s.category,'var(--teal)','shipped')}<div class="structure-block brand-top">${rows('工厂/品牌 Top',s.brandTop,'var(--gold)','byFactory')}</div></div>`;document.querySelectorAll('#orderChartPanel [data-drill]').forEach(el=>el.onclick=()=>openDrill(el.dataset.drill))}
function renderRisks(model){const risks=model.risks||[];$('riskPanel').innerHTML=`<div class="panel-head"><div><div class="panel-title">风险待办</div><div class="panel-note">可滚动查看，点全部看完整清单</div></div><button data-drill="risks">全部 ${risks.length}</button></div><div class="risk-board">${risks.length?risks.map((r,idx)=>`<div class="risk" data-risk="${idx}" style="--accent:${r.severity==='high'?'var(--red)':'var(--orange)'}"><div class="topline"><span>${esc(r.type)}</span><span>${esc(r.containerNo)}</span></div><div class="meta">${esc(r.summary||'需要业务人员关注')}${r.days?` · ${esc(r.days)}天`:''}</div></div>`).join(''):'<div class="empty-state">当前无高优先级风险</div>'}</div>`;$('riskPanel').querySelector('button').onclick=()=>openDrill('risks');document.querySelectorAll('#riskPanel .risk').forEach(el=>el.onclick=()=>openDrill('risks'))}
function renderNews(model){const n=model.news||{};$('newsPanel').innerHTML=`<div class="panel-head"><div><div class="panel-title">外部信息</div><div class="panel-note">只保留最新 3 条</div></div><a href="/index.html#news">详情</a></div><div class="news-list">${(n.items||[]).length?(n.items||[]).map(item=>`<a class="news-item" href="${esc(item.url||'#')}" target="_blank" rel="noopener"><div class="news-title">${esc(item.title||'未命名新闻')}</div><div class="news-meta">${esc(item.source||item.site||'新闻源')} · ${esc(item.publishedAt||item.time||item.date||'')}</div></a>`).join(''):'<div class="empty-state">暂无自动新闻</div>'}</div>`}
function renderModules(model){$('moduleDock').innerHTML=model.modules.map(mod=>`<a class="module" href="${esc(mod.href)}"><div class="code">${esc(mod.code)}</div><div class="name">${esc(mod.name)}</div><div class="desc">${esc(mod.desc)}</div></a>`).join('')}
function resolveDrill(path){const parts=String(path||'').split('.');let cur=state.model&&state.model.drilldowns;for(const part of parts){if(cur==null)return null;cur=cur[part]}return cur}
function openDrill(path){const data=resolveDrill(path);if(!data)return;const rows=Array.isArray(data.rows)?data.rows:[];const columns=data.columns||Object.keys(rows[0]||{});$('modalTitle').textContent=`${data.title||'明细'} · ${rows.length} 条`;$('modalBody').innerHTML=rows.length?`<table class="drill-table"><thead><tr>${columns.map(c=>`<th>${esc(labels[c]||c)}</th>`).join('')}</tr></thead><tbody>${rows.map(row=>`<tr>${columns.map(c=>`<td>${esc(row[c])}</td>`).join('')}</tr>`).join('')}</tbody></table>`:'<div class="empty-state">暂无明细数据</div>';$('drillModal').classList.add('open');DashboardMotion.openModal($('drillModal'))}
function closeDrill(){DashboardMotion.closeModal($('drillModal'),()=>$('drillModal').classList.remove('open'))}
Object.assign(labels,{statusText:'当前状态',severityText:'等级',recordedAt:'记录时间',note:'备注'});
function trendFrom(model,key,fallback){return (model.snapshotComparisons&&model.snapshotComparisons[key])||fallback}
function renderKpis(model){
 const h=model.headline||{},c=model.comparisons||{},desc=h.descriptions||{},rule=h.healthRule||{};
 const items=[
  {label:'订单数',value:h.totalOrders,meaning:desc.totalOrders,accent:'var(--gold)',drill:'orders',trend:trendFrom(model,'totalOrders7d')},
  {label:'下单柜数',value:h.totalBoxes,meaning:desc.totalBoxes,accent:'var(--green)',drill:'boxes',trend:trendFrom(model,'totalBoxes7d')},
  {label:'已发货',value:h.shipped,meaning:desc.shipped,accent:'var(--teal)',drill:'shipped',trend:trendFrom(model,'shipped7d',c.shipped7d)},
  {label:'已签收',value:h.signed,meaning:desc.signed,accent:'var(--blue)',drill:'signed',trend:trendFrom(model,'signed7d',c.signed7d)},
  {label:'经营健康分',value:h.healthScore,meaning:desc.healthScore||'风险越少、履约越顺，分数越高',accent:h.healthScore>=80?'var(--green)':h.healthScore>=60?'var(--orange)':'var(--red)',drill:'risks',trend:trendFrom(model,'healthScore7d')},
 ];
 $('kpiStrip').innerHTML=items.map(item=>`<article class="kpi" style="--accent:${item.accent}" data-drill="${esc(item.drill)}"><div class="label">${esc(item.label)}${trendHtml(item.trend)}</div><div class="value num">${esc(item.value)}</div><div class="meaning">${esc(item.meaning)}</div>${item.label==='经营健康分'?`<div class="health-rule">${esc(rule.description||'')}</div>`:''}</article>`).join('');
 document.querySelectorAll('.kpi[data-drill]').forEach(el=>el.onclick=()=>openDrill(el.dataset.drill));
}
function renderLogisticsChart(model){
 const list=model.bottlenecks||[];
 $('logisticsChartPanel').innerHTML=`<div class="panel-head"><div><div class="panel-title">瓶颈排行</div><div class="panel-note">进度条表示占已发货柜比例</div></div><button data-drill="bottlenecks">全部</button></div><div class="bottleneck-list">${list.map(item=>`<div class="bottleneck" data-drill="bottlenecks.${esc(item.key)}"><div class="bottleneck-top"><span>${esc(item.label)}</span><strong class="num">${esc(item.count)}柜</strong></div><div class="bottleneck-meta">${esc(item.hint)} · 最久 ${esc(item.longestDays)} 天 · ${esc(item.longestContainer)}</div><div class="bottleneck-bar"><span style="width:${clamp(item.progressRate||0,0,100)}%"></span></div><div class="progress-hint">${esc(item.progressBasis||'占已发货柜比例')} ${pctText(item.progressRate)}</div></div>`).join('')}</div>`;
 document.querySelectorAll('#logisticsChartPanel [data-drill]').forEach(el=>el.onclick=()=>openDrill(el.dataset.drill));
}
function renderTemperature(model){
 const t=model.temperature||{},g=t.gantt||{days:[],rows:[]},alerts=t.topAlerts||[];
 $('temperaturePanel').innerHTML=`<div class="panel-head"><div><div class="panel-title">温度监控</div><div class="panel-note">缩略甘特看趋势，点击柜号看温度明细</div></div><button data-drill="temperatureDetails">全部明细</button></div><div class="temp-board"><div class="temp-metrics"><div class="mini-metric" data-drill="temperatureAlerts"><div class="label">异常率</div><div class="value num">${pctText(t.alarmRate)}</div></div><div class="mini-metric" data-drill="temperatureAlerts"><div class="label">异常柜</div><div class="value num">${esc(t.alarmCount)}</div></div><div class="mini-metric" data-drill="temperatureDetails"><div class="label">最大温差</div><div class="value num">${esc(t.maxDeviation)}°</div></div><div class="mini-metric" data-drill="temperatureDetails"><div class="label">均温</div><div class="value num">${esc(t.avgReturnTemp)}°</div></div></div><div class="mini-gantt"><div class="gantt-head"><span></span>${g.days.map(d=>`<span>${esc(d.label)}</span>`).join('')}</div>${g.rows.length?g.rows.map(row=>`<div class="gantt-row" data-container="${esc(row.containerNo)}"><div class="gantt-label">${esc(row.containerNo)}</div>${row.cells.map(cell=>`<div class="gantt-cell ${esc(cell.level)}" title="${esc(cell.date)} ${esc(cell.returnTemp||'')}" data-container="${esc(row.containerNo)}"></div>`).join('')}</div>`).join(''):'<div class="empty-state">暂无温度甘特数据</div>'}</div><div class="temp-alerts">${alerts.length?alerts.slice(0,2).map(row=>`<div class="temp-alert" data-container="${esc(row.containerNo)}"><div class="topline"><span>${esc(row.containerNo)}</span><strong>${esc(row.statusText)}</strong></div><div class="meta">回风 ${esc(row.returnTemp)}° · 设定 ${esc(row.setTemp)}° · 温差 ${esc(row.deviation)}°</div></div>`).join(''):'<div class="empty-state">暂无温度异常</div>'}</div></div>`;
 document.querySelectorAll('#temperaturePanel [data-drill]').forEach(el=>el.onclick=()=>openDrill(el.dataset.drill));
 document.querySelectorAll('#temperaturePanel [data-container]').forEach(el=>el.onclick=()=>openDrill(`temperatureByContainer.${el.dataset.container}`));
}
function donutStyle(items){const colors=['var(--blue)','var(--gold)','var(--teal)','var(--orange)','var(--violet)'];let start=0,total=items.reduce((sum,item)=>sum+num(item.value),0)||1;return items.map((item,idx)=>{const end=start+num(item.value)/total*100;const part=`${colors[idx%colors.length]} ${start}% ${end}%`;start=end;return part}).join(',')}
function donutBlock(title,items,path){const colors=['var(--blue)','var(--gold)','var(--teal)','var(--orange)','var(--violet)'];return `<div class="donut-card"><div class="donut-title">${esc(title)}</div><div class="donut-chart" style="background:conic-gradient(${donutStyle(items)})"></div><div class="donut-list">${items.map((item,idx)=>`<div class="donut-item" data-drill="${esc(path(item))}"><span class="donut-dot" style="background:${colors[idx%colors.length]}"></span><span class="donut-name">${esc(item.label)}</span><strong>${pctText(item.rate)}</strong></div>`).join('')}</div></div>`}
function renderOrderChart(model){const s=model.structure||{};$('orderChartPanel').innerHTML=`<div class="panel-head"><div><div class="panel-title">结构画像</div><div class="panel-note">国家、品类、品牌占比</div></div><button data-drill="shipped">明细</button></div><div class="donut-grid">${donutBlock('国家',s.country||[],item=>`byCountry.${item.label}`)}${donutBlock('品类',s.category||[],item=>`byCategory.${item.key}`)}${donutBlock('品牌',s.brandTop||[],item=>`byFactory.${item.label}`)}</div>`;document.querySelectorAll('#orderChartPanel [data-drill]').forEach(el=>el.onclick=()=>openDrill(el.dataset.drill))}
function renderRisks(model){const risks=model.risks||[];$('riskPanel').innerHTML=`<div class="panel-head"><div><div class="panel-title">风险待办</div><div class="panel-note">点单条只看对应柜，点全部看清单</div></div><button data-drill="risks">全部 ${risks.length}</button></div><div class="risk-board">${risks.length?risks.map((r,idx)=>`<div class="risk" data-drill="riskItems.${idx}" style="--accent:${r.severity==='high'?'var(--red)':'var(--orange)'}"><div class="topline"><span>${esc(r.type)}</span><span>${esc(r.containerNo)}</span></div><div class="meta">${esc(r.statusText||r.status||r.summary||'需要业务人员关注')}${r.days?` · ${esc(r.days)}天`:''}</div></div>`).join(''):'<div class="empty-state">当前无高优先级风险</div>'}</div>`;document.querySelectorAll('#riskPanel [data-drill]').forEach(el=>el.onclick=()=>openDrill(el.dataset.drill))}
function openDrill(path){const data=resolveDrill(path);if(!data)return;const rows=Array.isArray(data.rows)?data.rows:[],columns=data.columns||Object.keys(rows[0]||{});$('modalTitle').textContent=`${data.title||'明细'} · ${rows.length}条`;$('modalBody').innerHTML=rows.length?`<table class="drill-table"><thead><tr>${columns.map(c=>`<th>${esc(labels[c]||c)}</th>`).join('')}</tr></thead><tbody>${rows.map(row=>`<tr>${columns.map(c=>`<td>${esc(row[c])}</td>`).join('')}</tr>`).join('')}</tbody></table>`:'<div class="empty-state">暂无明细数据</div>';$('drillModal').classList.add('open');DashboardMotion.openModal($('drillModal'))}
async function load(){try{$('refreshState').textContent='正在加载';const [user,executive]=await Promise.all([api('/api/auth/me'),api('/api/overview-executive'+query())]);state.user=user;state.model=buildViewModel(user,executive);renderUser(user);renderFilters(state.model);renderKpis(state.model);renderFlow(state.model);renderLogisticsChart(state.model);renderTemperature(state.model);renderOrderChart(state.model);renderRisks(state.model);renderNews(state.model);renderModules(state.model);DashboardMotion.afterOverviewRender();$('refreshState').textContent='已更新 '+new Date().toLocaleTimeString('zh-CN',{hour12:false})}catch(err){console.warn(err);$('refreshState').textContent=err.message||'加载失败';$('kpiStrip').innerHTML='<div class="empty-state">老板经营驾驶舱加载失败，请稍后刷新</div>'}}
$('modalClose').onclick=closeDrill;$('drillModal').onclick=e=>{if(e.target.id==='drillModal')closeDrill()};setInterval(tick,1000);tick();load();setInterval(load,60000);
</script>
