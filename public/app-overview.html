<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>运营总览 · DURIAN COMMAND CENTER</title>
<style>
:root{--bg:#070b16;--bg2:#0d1426;--panel:rgba(20,28,48,.74);--panel2:rgba(13,20,38,.9);--line:rgba(99,124,168,.2);--line2:rgba(148,173,214,.14);--text:#eef3ff;--muted:#9fb0cc;--faint:#6c7e9c;--gold:#f5c451;--green:#22c55e;--teal:#2dd4bf;--blue:#60a5fa;--red:#f87171;--orange:#f59e0b;--violet:#a78bfa;--shadow:0 16px 46px rgba(0,0,0,.34)}
*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",sans-serif}body{overflow:hidden}.num{font-variant-numeric:tabular-nums;font-weight:850}
.shell{height:100vh;display:grid;grid-template-rows:58px 1fr;gap:10px;padding:10px;background:radial-gradient(circle at 18% 0%,rgba(37,99,235,.13),transparent 28%),linear-gradient(135deg,#070b16 0%,#0d1426 58%,#0b1020 100%)}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;border:1px solid var(--line);background:rgba(13,20,38,.82);border-radius:8px;padding:0 14px;box-shadow:var(--shadow);min-width:0}.brand-block{display:flex;align-items:center;gap:12px;min-width:0}.brand-mark{width:38px;height:38px;display:grid;place-items:center;border:1px solid rgba(96,165,250,.36);border-radius:7px;color:var(--gold);font-weight:900;background:rgba(96,165,250,.08)}h1{margin:0;font-size:20px;font-weight:900;letter-spacing:0}.brand-block p{margin:2px 0 0;color:var(--muted);font-size:11px}.top-actions{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:12px;white-space:nowrap}.refresh-state{border:1px solid var(--line);border-radius:999px;padding:6px 9px}.clock{display:flex;flex-direction:column;align-items:flex-end;line-height:1.05}.clock strong{font-size:18px;color:var(--text)}.userbar{display:flex;align-items:center;gap:7px}.userbar a{color:var(--text);border:1px solid var(--line);border-radius:6px;padding:5px 8px;text-decoration:none;cursor:pointer}.userbar a:hover{border-color:rgba(96,165,250,.6)}
.dashboard{min-height:0;display:grid;grid-template-rows:82px minmax(0,1fr) 54px;gap:9px}.kpi-strip{display:grid;grid-template-columns:repeat(8,minmax(0,1fr));gap:8px;min-width:0}.kpi{min-width:0;border:1px solid var(--line);background:linear-gradient(180deg,rgba(20,28,48,.84),rgba(13,20,38,.88));border-radius:7px;padding:9px 10px;position:relative;overflow:hidden}.kpi:before{content:"";position:absolute;left:0;right:0;top:0;height:2px;background:var(--accent,var(--blue))}.kpi .label{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.kpi .value{margin-top:5px;font-size:25px;line-height:1}.metric-rule{margin-top:5px;color:var(--faint);font-size:10px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.command-grid{min-height:0;display:grid;grid-template-columns:1.1fr 1fr .9fr;grid-template-rows:minmax(0,1fr) minmax(0,1fr);grid-template-areas:"flow logistics risk" "orders temperature news";gap:9px}.panel{min-width:0;min-height:0;border:1px solid var(--line);background:var(--panel);border-radius:8px;box-shadow:var(--shadow);padding:10px;overflow:hidden}.panel-head{height:33px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:7px}.panel-title{font-size:14px;font-weight:900}.panel-note{font-size:10px;color:var(--faint);line-height:1.35}.panel a{color:var(--muted);text-decoration:none}.panel a:hover{color:var(--gold)}#flowPanel{grid-area:flow}#orderChartPanel{grid-area:orders}#logisticsChartPanel{grid-area:logistics}#temperaturePanel{grid-area:temperature}#riskPanel{grid-area:risk}#newsPanel{grid-area:news}
.flow-stages{height:calc(100% - 40px);display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:7px}.stage{border:1px solid var(--line2);border-radius:7px;background:rgba(13,20,38,.64);padding:8px;min-width:0}.stage .name{font-size:11px;color:var(--muted)}.stage .count{margin-top:5px;font-size:23px}.stage .rate{margin-top:6px;height:5px;border-radius:999px;background:rgba(70,85,111,.55);overflow:hidden}.stage .bar{height:100%;background:var(--accent,var(--blue));border-radius:999px}.stage .metric-rule{white-space:normal;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.bar-chart{height:calc(100% - 40px);display:grid;gap:6px}.bar-row{display:grid;grid-template-columns:78px minmax(0,1fr) 44px;gap:8px;align-items:center}.bar-label{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.bar-track{height:9px;border-radius:999px;background:rgba(70,85,111,.6);overflow:hidden}.bar-fill{height:100%;width:0;background:linear-gradient(90deg,var(--accent,var(--blue)),rgba(255,255,255,.36));border-radius:999px}.bar-value{text-align:right;font-size:12px}.bar-rule{grid-column:1/4;margin-top:-3px;color:var(--faint);font-size:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.donut-wrap{height:calc(100% - 40px);display:grid;grid-template-columns:126px minmax(0,1fr);gap:12px;align-items:center}.donut-chart{width:116px;height:116px;border-radius:50%;background:conic-gradient(var(--green) 0deg,var(--green) var(--signedDeg),var(--orange) var(--signedDeg),var(--orange) var(--transitDeg),var(--teal) var(--transitDeg),var(--teal) var(--arrivedDeg),var(--faint) var(--arrivedDeg),var(--faint) 360deg);display:grid;place-items:center}.donut-hole{width:70px;height:70px;border-radius:50%;display:grid;place-items:center;text-align:center;background:var(--bg2);border:1px solid var(--line)}.donut-hole strong{font-size:21px}.legend{display:grid;gap:6px}.legend-item{display:grid;grid-template-columns:minmax(0,1fr) 38px;gap:8px;font-size:11px;color:var(--muted)}.legend-item span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.legend-item span:before{content:"";display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;background:var(--dot)}
.temp-metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px;margin-bottom:7px}.mini-metric{border:1px solid var(--line2);border-radius:7px;background:rgba(13,20,38,.62);padding:6px}.mini-metric .label{font-size:9px;color:var(--faint)}.mini-metric .value{margin-top:3px;font-size:16px}.sparkline{width:100%;height:54px;display:block}.mini-gantt{display:grid;gap:4px;margin-top:5px}.gantt-row{display:grid;grid-template-columns:62px repeat(7,minmax(0,1fr));gap:4px;align-items:center}.gantt-label{font-size:9px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.gantt-cell{height:10px;border-radius:3px;background:rgba(70,85,111,.55)}.gantt-cell.ok{background:rgba(34,197,94,.58)}.gantt-cell.warn{background:rgba(245,158,11,.7)}.gantt-cell.alarm{background:rgba(248,113,113,.78)}
.risk-list,.news-list{height:calc(100% - 40px);display:grid;gap:6px;overflow:hidden}.risk,.news-item{border:1px solid var(--line2);border-radius:7px;background:rgba(13,20,38,.62);padding:7px;min-width:0}.risk{border-left:3px solid var(--accent,var(--orange))}.risk .topline{display:flex;justify-content:space-between;gap:8px;font-size:11px;font-weight:800}.risk .meta,.news-meta{margin-top:4px;color:var(--faint);font-size:9px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.news-item{display:block;color:var(--text);text-decoration:none}.news-title{font-size:11px;font-weight:800;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.empty-state{color:var(--muted);border:1px dashed var(--line);border-radius:7px;padding:14px;text-align:center;font-size:12px}
.module-dock{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:8px;min-height:0}.module{min-width:0;border:1px solid var(--line);border-radius:7px;background:rgba(13,20,38,.82);padding:8px 9px;color:var(--text);text-decoration:none;overflow:hidden}.module .code{font-size:9px;color:var(--faint);font-family:ui-monospace,SFMono-Regular,Menlo,monospace}.module .name{margin-top:3px;font-size:12px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.module .desc{display:none}.module:hover{border-color:rgba(96,165,250,.6)}
@media (max-width:1180px){body{overflow:auto}.shell{height:auto;min-height:100vh}.dashboard{grid-template-rows:auto auto auto}.kpi-strip{grid-template-columns:repeat(4,minmax(0,1fr))}.command-grid{grid-template-columns:1fr;grid-template-rows:auto;grid-template-areas:"flow" "logistics" "orders" "temperature" "risk" "news"}.panel{min-height:220px}.module-dock{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media (max-width:680px){.shell{padding:8px;grid-template-rows:auto auto}.topbar{height:auto;align-items:flex-start;flex-direction:column;padding:12px}.top-actions{width:100%;justify-content:space-between;flex-wrap:wrap}.kpi-strip,.module-dock{grid-template-columns:1fr}.donut-wrap{grid-template-columns:1fr}.temp-metrics{grid-template-columns:repeat(2,minmax(0,1fr))}.flow-stages{grid-template-columns:1fr}.panel{min-height:230px}}
</style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="brand-block">
      <div class="brand-mark">OV</div>
      <div><h1>运营总览</h1><p>Durian Operations Command Center</p></div>
    </div>
    <div class="top-actions">
      <div class="refresh-state" id="refreshState">正在加载</div>
      <div class="clock"><span id="dateDisplay"></span><strong id="clockDisplay"></strong></div>
      <div class="userbar" id="userbar"></div>
    </div>
  </header>
  <main class="dashboard">
    <section class="kpi-strip" id="kpiStrip" aria-label="核心指标"></section>
    <section class="command-grid">
      <section class="panel flow-panel" id="flowPanel" aria-label="货柜状态流转"></section>
      <section class="panel" id="orderChartPanel" aria-label="订单国家和品类柱状图"></section>
      <section class="panel" id="logisticsChartPanel" aria-label="物流状态甜甜圈图"></section>
      <section class="panel" id="temperaturePanel" aria-label="温度监控概览"></section>
      <aside class="panel risk-panel" id="riskPanel" aria-label="风险待办"></aside>
      <section class="panel" id="newsPanel" aria-label="行业新闻概览"></section>
    </section>
    <section class="module-dock" id="moduleDock" aria-label="模块入口"></section>
  </main>
</div>
<script>
const API='';
const MODULES=[
  {code:'orders',name:'订单看板',href:'/index.html',desc:'订单和柜数'},
  {code:'flow',name:'货柜流向',href:'/index-flow.html',desc:'状态流转'},
  {code:'logistics',name:'物流监控',href:'/index.html#logistics',desc:'在途滞留'},
  {code:'temperature',name:'温度监控',href:'/index-tv.html',desc:'温度甘特'},
  {code:'news',name:'行业新闻',href:'/index.html#news',desc:'新闻源'},
  {code:'smartsheet',name:'智能表',href:'/admin.html#smartsheet',desc:'企微数据'},
  {code:'admin',name:'系统管理',href:'/admin.html#accounts',desc:'权限配置'},
];
function $(id){return document.getElementById(id)}
function esc(value){return String(value==null?'-':value).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function num(value){const n=Number(value||0);return Number.isFinite(n)?n:0}
function pct(a,b){return b?Math.round(num(a)/num(b)*1000)/10:0}
function clamp(value,min,max){return Math.max(min,Math.min(max,value))}
function pad(n){return String(n).padStart(2,'0')}
function gotoLogin(){location.href='/login?redirect='+encodeURIComponent(location.pathname)}
function dateKey(value){const d=value?new Date(value):null;if(!d||isNaN(d.getTime()))return '';return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}
function tick(){const d=new Date();const w=['日','一','二','三','四','五','六'];$('dateDisplay').textContent=`${d.getMonth()+1}/${d.getDate()} 周${w[d.getDay()]}`;$('clockDisplay').textContent=`${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`}
async function api(path){const res=await fetch(API+path,{cache:'no-store'});if(res.status===401){gotoLogin();throw new Error('未登录')}const json=await res.json();if(!res.ok||json.success===false)throw new Error(json.error||'加载失败');return json.data||json}
async function apiOptional(path){try{return await api(path)}catch(err){return {_error:err.message||'加载失败'}}}
function moduleAllowed(user,code,visibility){if(user.role==='admin')return true;if((user.permissions||[]).includes(code))return true;if((user.dashboardPermissions||[]).includes(code))return true;if(visibility&&visibility[code])return true;return false}
function flattenRows(section){return section&&Array.isArray(section.rows)?section.rows:[]}
function orderBars(aggregate){
  const th=aggregate.th||{},vn=aggregate.vn||{};
  const rows=[
    {label:'泰国订单',value:num(th.orders),accent:'var(--gold)',rule:'订单数=订单主表去重订单编号'},
    {label:'越南订单',value:num(vn.orders),accent:'var(--red)',rule:'订单数=订单主表去重订单编号'},
    {label:'泰国柜数',value:num(th.boxes),accent:'var(--green)',rule:'下单柜数=订单主表鲜果+冻果柜数'},
    {label:'越南柜数',value:num(vn.boxes),accent:'var(--blue)',rule:'下单柜数=订单主表鲜果+冻果柜数'},
  ];
  const categories=[...flattenRows(th),...flattenRows(vn)].reduce((acc,row)=>{const key=row.category==='FROZEN'?'冻果柜数':'鲜果柜数';acc[key]=(acc[key]||0)+num(row.boxes);return acc},{});
  Object.entries(categories).forEach(([label,value],idx)=>rows.push({label,value,accent:idx?'var(--violet)':'var(--teal)',rule:'品类柜数=订单主表按鲜果/冻果拆分'}));
  return rows.filter(r=>r.value>0||['泰国订单','越南订单'].includes(r.label));
}
function buildGantt(records){
  const days=[];for(let i=6;i>=0;i--){const d=new Date(Date.now()-i*86400000);days.push({key:dateKey(d),label:`${d.getMonth()+1}/${d.getDate()}`})}
  const byContainer=new Map();
  (records||[]).forEach(r=>{const c=r.containerNo||'-';if(c==='-')return;if(!byContainer.has(c))byContainer.set(c,{container:c,days:{}});const k=dateKey(r.updateTime);if(!k)return;const temp=num(r.returnTemp);const set=r.setTemp==null?null:num(r.setTemp);let level='ok';if(r.isAbnormal)level='alarm';else if(set!==null&&Math.abs(temp-set)>2)level='warn';byContainer.get(c).days[k]=level});
  return {days,rows:Array.from(byContainer.values()).slice(0,4)};
}
function tempTrend(records){
  const buckets=new Map();
  (records||[]).forEach(r=>{const key=dateKey(r.updateTime);if(!key||r.returnTemp==null||isNaN(Number(r.returnTemp)))return;if(!buckets.has(key))buckets.set(key,{sum:0,count:0});const b=buckets.get(key);b.sum+=Number(r.returnTemp);b.count+=1});
  const series=[];for(let i=6;i>=0;i--){const d=new Date(Date.now()-i*86400000);const b=buckets.get(dateKey(d));series.push({label:`${d.getMonth()+1}/${d.getDate()}`,value:b&&b.count?Math.round(b.sum/b.count*10)/10:null})}
  return series;
}
function buildViewModel(user,aggregate,flowData,temperatureData){
  const global=aggregate.global||{},logistics=(aggregate.logistics&&aggregate.logistics.kpis)||{},flow=flowData.kpis||{},nodes=flowData.nodes||{};
  const total=num(global.totalBoxes||(nodes.total&&nodes.total.count));
  const shipped=num(flow.shipped||(nodes.shipped&&nodes.shipped.count)||(total-num(global.totalPending)));
  const signed=num(flow.signed||(nodes.signed&&nodes.signed.count)||global.totalDone);
  const unshipped=Math.max(0,num((nodes.unshipped&&nodes.unshipped.count)||global.totalPending));
  const overseas=num((nodes.overseasTransit&&nodes.overseasTransit.count)||logistics.inTransit||global.totalMoving);
  const arrived=num((nodes.arrived&&nodes.arrived.count)||global.totalArrived);
  const domesticTransit=num((nodes.domesticTransit&&nodes.domesticTransit.count));
  const portDelayed=num(logistics.portDelayed);
  const tempStats=temperatureData.stats||{},tempRecords=temperatureData.records||[],tempAlerts=temperatureData.alerts||[],newsAuto=(aggregate.news&&aggregate.news.auto)||[];
  const alerts=[...(flowData.alerts||[])];if(portDelayed>0)alerts.unshift({alertType:'关口滞留',containerNo:'-',dwellDays:portDelayed,summary:`${portDelayed} 个柜/批次需要关注`});tempAlerts.slice(0,2).forEach(item=>alerts.push({alertType:'温度异常',containerNo:item.containerNo,summary:item.reason,time:item.time}));
  return {
    user,aggregate,flowData,temperatureData,visibility:aggregate.visibility||{},generatedAt:aggregate.generatedAt||flowData.generatedAt||'',
    kpis:[
      {label:'订单数',value:num(global.totalOrders),rule:'订单数=订单主表去重订单编号',accent:'var(--gold)'},
      {label:'下单柜数',value:total,rule:'下单柜数=订单主表鲜果+冻果柜数',accent:'var(--green)'},
      {label:'已发货',value:shipped,rule:'已发货=分柜明细有柜号',accent:'var(--teal)'},
      {label:'未发货',value:unshipped,rule:'未发货=下单柜数-已发货',accent:'var(--faint)'},
      {label:'国外在途',value:overseas,rule:'国外在途=已发货未到岸',accent:'var(--orange)'},
      {label:'签收率',value:`${pct(signed,total)}%`,rule:'签收率=已签收柜数/订单总柜数',accent:'var(--green)'},
      {label:'温度异常',value:num(tempStats.abnormalCount||tempStats.abnormal||logistics.tempAlarms),rule:'温度异常=回风温度偏离设定温度',accent:num(tempStats.abnormalCount||tempStats.abnormal||logistics.tempAlarms)?'var(--red)':'var(--blue)'},
      {label:'新闻',value:newsAuto.length,rule:'新闻=自动新闻源最新条数',accent:'var(--violet)'},
    ],
    stages:[
      {name:'总柜数',count:total,parent:total,rule:'订单主表下单柜数',accent:'var(--green)'},
      {name:'已发货',count:shipped,parent:total,rule:'分柜明细有柜号',accent:'var(--teal)'},
      {name:'国外在途',count:overseas,parent:shipped,rule:'已发货未到岸',accent:'var(--orange)'},
      {name:'已到岸',count:arrived,parent:total,rule:'到岸时间非空',accent:'var(--blue)'},
      {name:'国内在途',count:domesticTransit,parent:total,rule:'国内发货后未签收',accent:'var(--violet)'},
      {name:'已签收',count:signed,parent:total,rule:'签收日期非空',accent:'var(--green)'},
    ],
    orderBars:orderBars(aggregate),
    logisticsDonut:{total,signed,overseas,arrived,unshipped},
    temperature:{stats:tempStats,records:tempRecords,alerts:tempAlerts,trend:tempTrend(tempRecords),gantt:buildGantt(tempRecords),error:temperatureData._error},
    news:newsAuto.slice(0,3),newsFetchedAt:aggregate.news&&aggregate.news.fetchedAt,risks:alerts.slice(0,4),
    modules:MODULES.filter(mod=>moduleAllowed(user,mod.code,aggregate.visibility||{})),
  };
}
function renderUser(user){const name=user.displayName||user.username||'-';const canAdmin=user.role==='admin'||(user.permissions||[]).length>0;$('userbar').innerHTML=`<span>${esc(name)}</span>${canAdmin?'<a href="/admin">后台</a>':''}<a id="btnLogout">退出</a>`;$('btnLogout').onclick=async()=>{try{await fetch('/api/auth/logout',{method:'POST'})}catch(_){}gotoLogin()}}
function renderKpis(model){$('kpiStrip').innerHTML=model.kpis.map(item=>`<article class="kpi" style="--accent:${item.accent}"><div class="label">${esc(item.label)}</div><div class="value num">${esc(item.value)}</div><div class="metric-rule">${esc(item.rule)}</div></article>`).join('')}
function renderFlow(model){$('flowPanel').innerHTML=`<div class="panel-head"><div><div class="panel-title">货柜状态流转</div><div class="panel-note">当前状态来自分柜明细</div></div><a class="panel-note" href="/index-flow.html">详情</a></div><div class="flow-stages">${model.stages.map(stage=>`<div class="stage" style="--accent:${stage.accent}"><div class="name">${esc(stage.name)}</div><div class="count num">${esc(stage.count)}</div><div class="metric-rule">${esc(stage.rule)} · ${pct(stage.count,stage.parent)}%</div><div class="rate"><div class="bar" style="width:${Math.min(100,pct(stage.count,stage.parent))}%"></div></div></div>`).join('')}</div>`}
function renderOrderChart(model){const max=Math.max(1,...model.orderBars.map(r=>r.value));$('orderChartPanel').innerHTML=`<div class="panel-head"><div><div class="panel-title">订单与柜量结构</div><div class="panel-note">每行都标明数字口径</div></div><a class="panel-note" href="/index.html">详情</a></div><div class="bar-chart">${model.orderBars.slice(0,6).map(row=>`<div><div class="bar-row"><div class="bar-label">${esc(row.label)}</div><div class="bar-track"><div class="bar-fill" style="--accent:${row.accent};width:${clamp(row.value/max*100,0,100)}%"></div></div><div class="bar-value num">${esc(row.value)}</div><div class="bar-rule">${esc(row.rule)}</div></div></div>`).join('')}</div>`}
function renderLogisticsChart(model){const d=model.logisticsDonut,total=Math.max(1,num(d.total));const signedDeg=pct(d.signed,total)*3.6,transitDeg=signedDeg+pct(d.overseas,total)*3.6,arrivedDeg=transitDeg+pct(d.arrived,total)*3.6;$('logisticsChartPanel').innerHTML=`<div class="panel-head"><div><div class="panel-title">物流状态占比</div><div class="panel-note">签收率=已签收柜数/订单总柜数</div></div><a class="panel-note" href="/index-flow.html">详情</a></div><div class="donut-wrap"><div class="donut-chart" style="--signedDeg:${signedDeg}deg;--transitDeg:${transitDeg}deg;--arrivedDeg:${arrivedDeg}deg"><div class="donut-hole"><div><strong class="num">${esc(pct(d.signed,total))}%</strong><br><span class="panel-note">签收率</span></div></div></div><div class="legend"><div class="legend-item" style="--dot:var(--green)"><span>已签收 · 签收日期非空</span><strong class="num">${esc(d.signed)}</strong></div><div class="legend-item" style="--dot:var(--orange)"><span>国外在途 · 已发货未到岸</span><strong class="num">${esc(d.overseas)}</strong></div><div class="legend-item" style="--dot:var(--teal)"><span>已到岸 · 到岸时间非空</span><strong class="num">${esc(d.arrived)}</strong></div><div class="legend-item" style="--dot:var(--faint)"><span>未发货 · 下单减发货</span><strong class="num">${esc(d.unshipped)}</strong></div></div></div>`}
function sparklinePath(series,w,h){const values=series.map(p=>p.value).filter(v=>v!=null);if(!values.length)return '';const min=Math.min(...values),max=Math.max(...values),span=max-min||1;return series.map((p,i)=>{const x=i*(w/(series.length-1||1));const y=p.value==null?h-6:h-6-((p.value-min)/span)*(h-14);return `${i?'L':'M'}${Math.round(x*10)/10},${Math.round(y*10)/10}`}).join(' ')}
function renderTemperature(model){const t=model.temperature;if(t.error){$('temperaturePanel').innerHTML=`<div class="panel-head"><div><div class="panel-title">温度监控</div><div class="panel-note">温度异常=回风温度偏离设定温度</div></div></div><div class="empty-state">${esc(t.error)}</div>`;return}const stats=t.stats||{},path=sparklinePath(t.trend,280,54),avg=num(stats.avgReturnTemp||stats.avgTemp);$('temperaturePanel').innerHTML=`<div class="panel-head"><div><div class="panel-title">温度监控</div><div class="panel-note">温度异常=回风温度偏离设定温度</div></div><a class="panel-note" href="/index-tv.html">详情</a></div><div class="temp-metrics"><div class="mini-metric"><div class="label">记录数</div><div class="value num">${esc(num(stats.total))}</div></div><div class="mini-metric"><div class="label">冷柜数</div><div class="value num">${esc(num(stats.containerCount))}</div></div><div class="mini-metric"><div class="label">异常</div><div class="value num">${esc(num(stats.abnormalCount||stats.abnormal))}</div></div><div class="mini-metric"><div class="label">均温</div><div class="value num">${esc(avg)}°</div></div></div><svg class="sparkline" viewBox="0 0 280 54" role="img" aria-label="温度趋势折线图"><path d="M0,48 L280,48" stroke="rgba(148,173,214,.16)" fill="none"/><path d="${esc(path)}" stroke="var(--blue)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg><div class="mini-gantt">${t.gantt.rows.length?t.gantt.rows.map(row=>`<div class="gantt-row"><div class="gantt-label">${esc(row.container)}</div>${t.gantt.days.map(day=>`<div class="gantt-cell ${esc(row.days[day.key]||'')}" title="${esc(day.label)}"></div>`).join('')}</div>`).join(''):'<div class="empty-state">暂无温度甘特数据</div>'}</div>`}
function renderNews(model){const fetched=model.newsFetchedAt?new Date(model.newsFetchedAt).toLocaleString('zh-CN'):'等待刷新';$('newsPanel').innerHTML=`<div class="panel-head"><div><div class="panel-title">行业新闻</div><div class="panel-note">新闻=自动新闻源最新条数</div></div><a class="panel-note" href="/index.html#news">详情</a></div><div class="news-list">${model.news.length?model.news.map(item=>`<a class="news-item" href="${esc(item.url||'#')}" target="_blank" rel="noopener"><div class="news-title">${esc(item.title||'未命名新闻')}</div><div class="news-meta">${esc(item.source||item.site||'新闻源')} · ${esc(item.publishedAt||item.time||item.date||fetched)}</div></a>`).join(''):'<div class="empty-state">暂无自动新闻</div>'}</div>`}
function renderRisks(model){if(!model.risks.length){$('riskPanel').innerHTML='<div class="panel-head"><div><div class="panel-title">风险待办</div><div class="panel-note">关口滞留/在途偏久/温度异常</div></div></div><div class="empty-state">当前没有需要立即处理的风险</div>';return}$('riskPanel').innerHTML=`<div class="panel-head"><div><div class="panel-title">风险待办</div><div class="panel-note">只显示最高优先级 4 条</div></div></div><div class="risk-list">${model.risks.map(r=>`<div class="risk" style="--accent:${String(r.alertType||'').includes('异常')||String(r.alertType||'').includes('滞留')?'var(--red)':'var(--orange)'}"><div class="topline"><span>${esc(r.alertType||'风险提醒')}</span><span>${esc(r.containerNo||r.container||'-')}</span></div><div class="meta">${esc(r.summary||r.reason||r.note||'需要业务人员关注')}${r.dwellDays?` · ${esc(r.dwellDays)} 天`:''}</div></div>`).join('')}</div>`}
function renderModules(model){$('moduleDock').innerHTML=model.modules.map(mod=>`<a class="module" href="${esc(mod.href)}"><div class="code">${esc(mod.code)}</div><div class="name">${esc(mod.name)}</div><div class="desc">${esc(mod.desc)}</div></a>`).join('')}
async function init(){tick();try{$('refreshState').textContent='正在加载';const user=await api('/api/auth/me');renderUser(user);const [aggregate,flowData,temperatureData]=await Promise.all([api('/api/aggregate'),api('/api/flow-dashboard'),apiOptional('/api/dashboard?hours=168&limit=500')]);const model=buildViewModel(user,aggregate,flowData,temperatureData);renderKpis(model);renderFlow(model);renderRisks(model);renderOrderChart(model);renderLogisticsChart(model);renderTemperature(model);renderNews(model);renderModules(model);$('refreshState').textContent='已更新 '+new Date().toLocaleTimeString('zh-CN',{hour12:false})}catch(err){console.warn(err);$('refreshState').textContent=err.message||'加载失败';$('kpiStrip').innerHTML='<div class="empty-state">运营总览加载失败，请稍后刷新</div>'}}
setInterval(tick,1000);init();setInterval(init,60000);
</script>
</body>
</html>
