.kpi,.panel,.module,.risk,.temp-alert,.bottleneck,.donut-card,.mini-metric,.funnel-row{will-change:transform,opacity}.funnel-fill,.bottleneck-bar span,.bar-fill{transform-origin:left center}.shell{position:relative;overflow:hidden}.shell:before{content:"";position:absolute;inset:-40%;background:radial-gradient(circle at 18% 20%,rgba(96,165,250,.1),transparent 28%),radial-gradient(circle at 78% 12%,rgba(45,212,191,.075),transparent 30%),linear-gradient(115deg,transparent 36%,rgba(245,196,81,.035) 48%,transparent 60%);animation:holoDrift 18s ease-in-out infinite alternate;pointer-events:none}.shell:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 0,rgba(96,165,250,.028) 50%,transparent 100%);background-size:100% 220px;animation:scanLines 12s linear infinite;mix-blend-mode:screen;pointer-events:none}.topbar,.dashboard{position:relative;z-index:1}.panel,.kpi,.module{position:relative}.panel:before,.kpi:after{content:"";position:absolute;inset:0;border-radius:inherit;background:linear-gradient(120deg,transparent,rgba(96,165,250,.065),transparent);transform:translateX(-120%);animation:panelSheen 11s ease-in-out infinite;pointer-events:none}.kpi:before{box-shadow:0 0 10px color-mix(in srgb,var(--accent,var(--blue)) 46%,transparent);animation:kpiGlow 4.8s ease-in-out infinite}.risk[data-drill],.temp-alert[data-container]{position:relative;overflow:hidden}.risk[data-drill]:after,.temp-alert[data-container]:after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.085),transparent);transform:translateX(-120%);animation:alertSweep 4.8s ease-in-out infinite;pointer-events:none}.risk[data-drill]{animation:riskPulse 5.2s ease-in-out infinite}.temp-alert[data-container]{animation:warningBreath 5.6s ease-in-out infinite}.donut-chart svg{animation:donutTurn 28s linear infinite}.donut-chart{animation:donutPulse 6.8s ease-in-out infinite}.funnel-fill,.bottleneck-bar span{background-size:260% 100%;a <body>
<div class="shell">
  <header class="topbar">
    <div class="brand-block">
      <div class="brand-mark">EX</div>
      <div><h1>老板经营驾驶舱</h1><p>按国家、工厂、柜号看风险、效率、结构、温度</p></div>
    </div>
    <div class="top-actions">
      <div class="refresh-state" id="refreshState">正在加载</div>
      <div class="clock"><span id="dateDisplay"></span><strong id="clockDisplay"></strong></div>
      <div class="userbar" id="userbar"></div>
    </div>
  </header>
  <main class="dashboard">
    <section class="filterbar" id="filterbar" aria-label="筛选"></section>
    <section class="kpi-strip" id="kpiStrip" aria-label="经营核心指标"></section>
    <section class="command-grid" id="commandGrid">
      <section class="panel" id="flowPanel" aria-label="履约效率"></section>
      <section class="panel" id="logisticsChartPanel" aria-label="瓶颈排行"></section>
      <section class="panel" id="temperaturePanel" aria-label="温度健康"></section>
      <section class="panel" id="orderChartPanel" aria-label="结构画像"></section>
      <aside class="panel" id="riskPanel" aria-label="风险待办"></aside>
      <section class="panel" id="newsPanel" aria-label="新闻概览"></section>
    </section>
    <section class="module-dock" id="moduleDock" aria-label="模块入口"></section>
  </main>
</div>
<div class="modal-backdrop" id="drillModal">
  <div class="modal">
    <div class="modal-head"><div class="modal-title" id="modalTitle">明细</div><button class="modal-close" id="modalClose">关闭</button></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>
<script src="/vendor/gsap/gsap.min.js"></script>
<script>
const API='';
const MODULES=[
  {code:'orders',name:'订单看板',href:'/index.html',desc:'订单和柜数'},
  {code:'flow',name:'货柜流向',href:'/index-flow.html',desc:'状态流转'},
  {code:'logistics',name:'物流监控',href:'/index.html#logistics',desc:'在途滞留'},
  {code:'temperature',name:'温度监控',href:'/index-tv.html',desc:'温度详情'},
  {code:'news',name:'行业新闻',href:'/index.html#news',desc:'新闻源'},
  {code:'smartsheet',name:'智能表',href:'/admin.html#smartsheet',desc:'企微数据'},
  {code:'admin',name:'系统管理',href:'/admin.html#accounts',desc:'权限配置'},
];
const BOARD_CONFIGS=[
  {key:'fulfillment',label:'履约效率',code:'FULFILLMENT',subtitle:'订单从下单到签收的全链路效率分析',render:renderFulfillmentDashboard},
  {key:'logistics',label:'物流瓶颈',code:'LOGISTICS',subtitle:'在途、在岸、国内段与滞留柜的调度监控',render:renderLogisticsDashboard},
  {key:'temperature',label:'温度监控',code:'COLDCHAIN',subtitle:'冷链温度异常、趋势和单柜穿透分析',render:renderTemperatureDashboard},
  {key:'orders',label:'订单结构',code:'ORDERS',subtitle:'国家、品类、品牌和柜量结构经营分析',render:renderOrdersDashboard},
  {key:'risks',label:'风险待办',code:'RISKS',subtitle:'高优先级风险、原因分类和处置清单',render:renderRisksDashboard},
  {key:'news',label:'外部信息',code:'INTEL',subtitle:'行业新闻、来源分布和重点信息流',render:renderNewsDashboard},
];
let state={user:null,model:null,filters:{country:'',factory:'',container:''}};
const labels={orderNo:'订单号',country:'国家',factory:'工厂',freshBoxes:'鲜果柜数',frozenBoxes:'冻果柜数',totalBoxes:'总柜数',containerNo:'柜号',brand:'品牌',category:'品类',status:'当前状态',shipDate:'发货日期',arrivalDate:'到岸日期',domesticShipDate:'国内发货',signedDate:'签收日期',dwellDays:'停留天数',type:'风险类型',summary:'说明',days:'天数',severity:'等级',setTemp:'设定温度',returnTemp:'回风温度',deviation:'温差'};
window.DashboardMotion=(()=>{
  const reduced=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const previousValues=new Map();
  let firstPaint=true;
  let ambientTimeline=null;
  function ready(){return !reduced&&window.gsap}
  function elements(selector,root=document){return Array.from(root.querySelectorAll(selector))}
  function numberParts(text){const m=String(text||'').trim().match(/^(-?\d+(?:\.\d+)?)(.*)$/);return m?{value:Number(m[1]),suffix:m[2]||'',decimals:(m[1].split('.')[1]||'').length}:null}
  function stableKey(el,index){const parent=el.closest('[data-drill],[data-container],.kpi,.cycle,.mini-metric')||el;return `${parent.dataset.drill||parent.dataset.container||parent.textContent.slice(0,18)}:${index}`}
  function countValues(root=document){
    if(!ready())return;
    elements('.kpi .value,.cycle .value,.mini-metric .value',root).forEach((el,index)=>{
      const parsed=numberParts(el.textContent);
      if(!parsed||!Number.isFinite(parsed.value))return;
      const key=stableKey(el,index);
      const from=previousValues.has(key)?previousValues.get(key):(firstPaint?0:parsed.value);
      previousValues.set(key,parsed.value);
      if(from===parsed.value)return;
      const counter={value:from};
      gsap.to(counter,{value:parsed.value,duration:firstPaint?.8:.45,ease:'power2.out',onUpdate(){
        const value=parsed.decimals?counter.value.toFixed(parsed.decimals):Math.round(counter.value);
        el.textContent=value+parsed.suffix;
      }});
    });
  }
  function stageIn(root=document){
    if(!ready())return;
    if(firstPaint){
      gsap.fromTo('.topbar,.filterbar',{autoAlpha:.94,y:-4},{autoAlpha:1,y:0,duration:.65,ease:'sine.out',stagger:.04});
      gsap.fromTo('.kpi',{autoAlpha:.96,y:4,scale:.998},{autoAlpha:1,y:0,scale:1,duration:.7,ease:'sine.out',stagger:.025,delay:.04});
      gsap.fromTo('.panel,.module',{autoAlpha:.92,y:8,scale:.995},{autoAlpha:1,y:0,scale:1,duration:.75,ease:'sine.out',stagger:.025,delay:.08});
    }else{
      gsap.fromTo(elements('.kpi,.panel',root),{autoAlpha:.96,y:2},{autoAlpha:1,y:0,duration:.42,ease:'sine.out',stagger:.01,overwrite:true});
    }
  }
  function revealMeters(root=document){
    if(!ready())return;
    elements('.funnel-fill,.bottleneck-bar span,.bar-fill',root).forEach((el,index)=>{
      gsap.fromTo(el,{scaleX:.04},{scaleX:1,duration:.9,ease:'sine.out',delay:index*.035,overwrite:true});
    });
  }
  function emphasizeRisks(root=document){
    if(!ready())return;
    const items=elements('.risk[data-drill],.temp-alert[data-container]',root);
    if(!items.length)return;
    gsap.fromTo(items,{opacity:.55,y:3},{opacity:1,y:0,duration:.42,ease:'power2.out',stagger:.04,overwrite:true});
    items.slice(0,4).forEach((el,index)=>{
      gsap.to(el,{boxShadow:'0 0 0 1px rgba(248,113,113,.14),0 8px 22px rgba(0,0,0,.14)',duration:.65,yoyo:true,repeat:1,delay:.1+index*.05,overwrite:true});
    });
  }
  function wireHover(root=document){
    if(!ready())return;
    elements('.kpi,.panel button,.module,.funnel-row,.bottleneck,.risk,.temp-alert,.donut-item,.mini-metric',root).forEach(el=>{
      if(el.dataset.motionHover)return;
      el.dataset.motionHover='1';
      el.addEventListener('mouseenter',()=>gsap.to(el,{y:-2,duration:.18,ease:'power2.out',overwrite:true}));
      el.addEventListener('mouseleave',()=>gsap.to(el,{y:0,duration:.2,ease:'power2.out',overwrite:true}));
    });
  }
function startAmbientMotion(){
if(!ready())return;
if(ambientTimeline)ambientTimeline.kill();
ambientTimeline=gsap.timeline({repeat:-1,defaults:{ease:'sine.inOut'}});
    ambientTimeline
      .to('.brand-mark',{boxShadow:'0 0 12px rgba(245,196,81,.28),0 0 24px rgba(96,165,250,.1)',duration:2.4,yoyo:true,repeat:1},0)
      .to('.refresh-state',{borderColor:'rgba(96,165,250,.44)',color:'#dbeafe',duration:2.1,yoyo:true,repeat:1},.1)
      .to('.kpi',{boxShadow:'0 0 0 1px rgba(96,165,250,.16),0 14px 38px rgba(0,0,0,.26)',duration:2.8,stagger:.08,yoyo:true,repeat:1},.2)
      .to('#riskPanel',{boxShadow:'0 0 0 1px rgba(248,113,113,.08),0 0 18px rgba(248,113,113,.045)',duration:2.4,yoyo:true,repeat:1},.35)
      .to('#temperaturePanel',{boxShadow:'0 0 0 1px rgba(45,212,191,.08),0 0 16px rgba(45,212,191,.045)',duration:2.4,yoyo:true,repeat:1},.55)
.to('.module',{borderColor:'rgba(96,165,250,.32)',duration:2,stagger:.05,yoyo:true,repeat:1},.8);
}
function autoScrollList(selector){
if(!ready())return;
elements(selector).forEach(el=>{
gsap.killTweensOf(el);
el.setAttribute('data-auto-scroll','1');
el.scrollTop=0;
const distance=el.scrollHeight-el.clientHeight;
if(distance<=8)return;
const tween=gsap.to(el,{scrollTop:distance,duration:Math.max(12,distance/10),ease:'none',repeat:-1,yoyo:true,repeatDelay:1.2});
el.onmouseenter=()=>tween.pause();
el.onmouseleave=()=>tween.resume();
});
}
function afterOverviewRender(){
if(!ready())return;
gsap.killTweensOf('.kpi,.panel,.module,.funnel-fill,.bottleneck-bar span,.bar-fill,.risk,.temp-alert,.mini-metric,.cycle .value,.kpi .value,.risk-board,.news-list');
stageIn();
revealMeters();
countValues();
emphasizeRisks();
wireHover();
startAmbientMotion();
autoScrollList('#riskPanel .risk-board');
autoScrollList('#newsPanel .news-list');
firstPaint=false;
}
  function openModal(modal){
    if(!ready()||!modal)return;
    const box=modal.querySelector('.modal');
    gsap.set(modal,{opacity:0});
    gsap.to(modal,{opacity:1,duration:.22,ease:'power2.out',overwrite:true});
    if(box){gsap.set(box,{y:12,scale:.985});gsap.to(box,{y:0,scale:1,duration:.32,ease:'power3.out',overwrite:true})}
  }
  function closeModal(modal,done){
    if(!ready()||!modal){if(done)done();return}
    const box=modal.querySelector('.modal');
    if(box)gsap.to(box,{y:8,scale:.99,duration:.18,ease:'power2.in',overwrite:true});
    gsap.to(modal,{opacity:0,duration:.2,ease:'power2.in',overwrite:true,onComplete:()=>{if(done)done()}});
  }
  return {afterOverviewRender,openModal,closeModal};
})();
function $(id){return document.getElementById(id)}
function esc(value){return String(value==null?'-':value).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function num(value){const n=Number(value||0);return Number.isFinite(n)?n:0}
function pctText(value){return `${Math.round(num(value)*10)/10}%`}
function clamp(value,min,max){return Math.max(min,Math.min(max,value))}
function pad(n){return String(n).padStart(2,'0')}
function gotoLogin(){location.href='/login?redirect='+encodeURIComponent(location.pathname)}
function tick(){const d=new Date();const w=['日','一','二','三','四','五','六'];$('dateDisplay').textContent=`${d.getMonth()+1}/${d.getDate()} 周${w[d.getDay()]}`;$('clockDisplay').textContent=`${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`}
async function api(path){const res=await fetch(API+path,{cache:'no-store'});if(res.status===401){gotoLogin();throw new Error('未登录')}const json=await res.json();if(!res.ok||json.success===false)throw new Error(json.error||'加载失败');return json.data||json}
function moduleAllowed(user,code){if(user.role==='admin')return true;if((user.permissions||[]).includes(code))return true;if((user.dashboardPermissions||[]).includes(code))return true;return code!=='admin'&&code!=='smartsheet'}
function trendHtml(cmp){if(!cmp)return '';const icon=cmp.direction==='up'?'▲':cmp.direction==='down'?'▼':'→';return `<span class="trend ${esc(cmp.direction)}">${icon} ${esc(Math.abs(cmp.changePct||0))}%</span>`}
function query(){const params=new URLSearchParams();Object.entries(state.filters).forEach(([k,v])=>{if(v)params.set(k,v)});return params.toString()?`?${params}`:''}
function currentBoardKey(){const params=new URLSearchParams(location.search);const key=params.get('board')||'';return BOARD_CONFIGS.some(board=>board.key===key)?key:''}
function buildBoardUrl(boardKey){const params=new URLSearchParams();if(boardKey)params.set('board',boardKey);Object.entries(state.filters).forEach(([k,v])=>{if(v)params.set(k,v)});const qs=params.toString();return `${location.pathname}${qs?`?${qs}`:''}`}
function readInitialFilters(){const params=new URLSearchParams(location.search);['country','factory','container'].forEach(key=>{if(params.get(key))state.filters[key]=params.get(key)})}
function buildViewModel(user, executive){return {user,...executive,modules:MODULES.filter(mod=>moduleAllowed(user,mod.code))}}
function renderUser(user){const name=user.displayName||user.username||'-';const canAdmin=user.role==='admin'||(user.permissions||[]).length>0;$('userbar').innerHTML=`<span>${esc(name)}</span>${canAdmin?'<a href="/admin">后台</a>':''}<a id="btnLogout">退出</a>`;$('btnLogout').onclick=async()=>{try{await fetch('/api/auth/logout',{method:'POST'})}catch(_){}gotoLogin()}}
function renderFilters(model){const f=model.filters||{};const option=(v,cur)=>`<option value="${esc(v)}" ${v===cur?'selected':''}>${esc(v||'全部')}</option>`;$('filterbar').innerHTML=`<select id="countryFilter">${option('',state.filters.country)}${(f.countries||[]).map(v=>option(v,state.filters.country)).join('')}</select><select id="factoryFilter">${option('',state.filters.factory)}${(f.factories||[]).map(v=>option(v,state.filters.factory)).join('')}</select><input id="containerFilter" value="${esc(state.filters.container)}" placeholder="输入柜号直接定位"><button id="filterReset">重置</button>`;['country','factory','container'].forEach(key=>{$(`${key}Filter`).onchange=()=>{state.filters[key]=$(`${key}Filter`).value.trim();load()}});$('containerFilter').onkeydown=e=>{if(e.key==='Enter'){state.filters.container=$('containerFilter').value.trim();load()}};$('filterReset').onclick=()=>{state.filters={country:'',factory:'',container:''};load()}}
function renderFlow(model){const e=model.efficiency||{},cycle=e.cycleTimes||{},c=model.comparisons||{};$('flowPanel').innerHTML=`<div class="panel-head"><div><div class="panel-title">履约效率</div><div class="panel-note">最近 7 天对比上一周期</div></div><div><a data-board-link="fulfillment" href="${esc(buildBoardUrl('fulfillment'))}">进入看板</a> · <button data-drill="shipped">明细</button></div></div><div class="fulfillment-funnel">${(e.funnel||[]).map(row=>`<div class="funnel-row" data-drill="${esc(row.drilldown)}"><div class="funnel-label">${esc(row.label)}</div><div class="funnel-track"><div class="funnel-fill" style="width:${clamp(row.rate,0,100)}%"></div></div><div class="funnel-value num">${esc(row.value)} · ${pctText(row.rate)}</div></div>`).join('')}<div class="cycle-strip"><div class="cycle"><div class="label">平均国外段${trendHtml(c.avgTransitDays7d)}</div><div class="value num">${esc(cycle.avgOverseasDays)}天</div></div><div class="cycle"><div class="label">平均在岸</div><div class="value num">${esc(cycle.avgOnShoreDays)}天</div></div><div class="cycle"><div class="label">平均国内段</div><div class="value num">${esc(cycle.avgDomesticTransitDays)}天</div></div></div></div>`;document.querySelectorAll('.funnel-row[data-drill],#flowPanel button[data-drill]').forEach(el=>el.onclick=()=>openDrill(el.dataset.drill))}
function renderNews(model){const n=model.news||{};$('newsPanel').innerHTML=`<div class="panel-head"><div><div class="panel-title">外部信息</div><div class="panel-note">自动滚动全部新闻</div></div><a data-board-link="news" href="${esc(buildBoardUrl('news'))}">进入看板</a></div><div class="news-list">${(n.items||[]).length?(n.items||[]).map(item=>`<a class="news-item" href="${esc(item.url||'#')}" target="_blank" rel="noopener"><div class="news-title">${esc(item.title||'未命名新闻')}</div><div class="news-meta">${esc(item.source||item.site||'新闻源')} · ${esc(item.publishedAt||item.time||item.date||'')}</div></a>`).join(''):'<div class="empty-state">暂无自动新闻</div>'}</div>`}
function renderModules(model){$('moduleDock').innerHTML=model.modules.map(mod=>`<a class="module" href="${esc(mod.href)}"><div class="code">${esc(mod.code)}</div><div class="name">${esc(mod.name)}</div><div class="desc">${esc(mod.desc)}</div></a>`).join('')}
function resolveDrill(path){const parts=String(path||'').split('.');let cur=state.model&&state.model.drilldowns;for(const part of parts){if(cur==null)return null;cur=cur[part]}return cur}
function trendFrom(model,key,fallback){return (model.snapshotComparisons&&model.snapshotComparisons[key])||fallback}
function renderKpis(model){
 const h=model.headline||{},c=model.comparisons||{},desc=h.descriptions||{},rule=h.healthRule||{};
 const items=[
  {label:'订单数',value:h.totalOrders,meaning:desc.totalOrders,accent:'var(--gold)',drill:'orders',trend:trendFrom(model,'totalOrders7d')},
  {label:'下单柜数',value:h.totalBoxes,meaning:desc.totalBoxes,accent:'var(--green)',drill:'boxes',trend:trendFrom(model,'totalBoxes7d')},
  {label:'已发货',value:h.shipped,meaning:desc.shipped,accent:'var(--teal)',drill:'shipped',trend:trendFrom(model,'shipped7d',c.shipped7d)},
  {label:'已签收',value:h.signed,meaning:desc.signed,accent:'var(--blue)',drill:'signed',trend:trendFrom(model,'signed7d',c.signed7d)},
  {label:'经营健康分',value:h.healthScore,meaning:desc.healthScore||'风险越少、履约越顺，分数越高',accent:h.healthScore>=80?'var(--green)':h.healthScore>=60?'var(--orange)':'var(--red)',drill:'risks',trend:trendFrom(model,'healthScore7d')},
 ];
 $('kpiStrip').innerHTML=items.map(item=>`<article class="kpi" style="--accent:${item.accent}" data-drill="${esc(item.drill)}"><div class="label">${esc(item.label)}${trendHtml(item.trend)}</div><div class="value num">${esc(item.value)}</div><div class="meaning">${esc(item.meaning)}</div>${item.label==='经营健康分'?`<div class="health-rule">${esc(rule.description||'')}</div>`:''}</article>`).join('');
 document.querySelectorAll('.kpi[data-drill]').forEach(el=>el.onclick=()=>openDrill(el.dataset.drill));
}
function renderLogisticsChart(model){
 const list=model.bottlenecks||[];
 $('logisticsChartPanel').innerHTML=`<div class="panel-head"><div><div class="panel-title">瓶颈排行</div><div class="panel-note">进度条表示占已发货柜比例</div></div><div><a data-board-link="logistics" href="${esc(buildBoardUrl('logistics'))}">进入看板</a> · <button data-drill="bottlenecks">全部</button></div></div><div class="bottleneck-list">${list.map(item=>`<div class="bottleneck" data-drill="bottlenecks.${esc(item.key)}"><div class="bottleneck-top"><span>${esc(item.label)}</span><strong class="num">${esc(item.count)}柜</strong></div><div class="bottleneck-meta">${esc(item.hint)} · 最久 ${esc(item.longestDays)} 天 · ${esc(item.longestContainer)}</div><div class="bottleneck-bar"><span style="width:${clamp(item.progressRate||0,0,100)}%"></span></div><div class="progress-hint">${esc(item.progressBasis||'占已发货柜比例')} ${pctText(item.progressRate)}</div></div>`).join('')}</div>`;
 document.querySelectorAll('#logisticsChartPanel [data-drill]').forEach(el=>el.onclick=()=>openDrill(el.dataset.drill));
}
function renderTemperature(model){
 const t=model.temperature||{},g=t.gantt||{days:[],rows:[]},alerts=t.topAlerts||[];
 $('temperaturePanel').innerHTML=`<div class="panel-head"><div><div class="panel-title">温度监控</div><div class="panel-note">缩略甘特看趋势，点击柜号看温度明细</div></div><div><a data-board-link="temperature" href="${esc(buildBoardUrl('temperature'))}">进入看板</a> · <button data-drill="temperatureDetails">全部明细</button></div></div><div class="temperature-summary"><div class="temp-metrics"><div class="mini-metric" data-drill="temperatureAlerts"><div class="label">异常率</div><div class="value num">${pctText(t.alarmRate)}</div></div><div class="mini-metric" data-drill="temperatureAlerts"><div class="label">异常柜</div><div class="value num">${esc(t.alarmCount)}</div></div><div class="mini-metric" data-drill="temperatureDetails"><div class="label">最大温差</div><div class="value num">${esc(t.maxDeviation)}°</div></div><div class="mini-metric" data-drill="temperatureDetails"><div class="label">均温</div><div class="value num">${esc(t.avgReturnTemp)}°</div></div></div><div class="mini-gantt"><div class="gantt-head"><span></span>${g.days.map(d=>`<span>${esc(d.label)}</span>`).join('')}</div>${g.rows.length?g.rows.map(row=>`<div class="gantt-row" data-container="${esc(row.containerNo)}"><div class="gantt-label">${esc(row.containerNo)}</div>${row.cells.map(cell=>`<div class="gantt-cell ${esc(cell.level)}" title="${esc(cell.date)} ${esc(cell.returnTemp||'')}" data-container="${esc(row.containerNo)}"></div>`).join('')}</div>`).join(''):'<div class="empty-state">暂无温度甘特数据</div>'}</div><div class="temp-alerts">${alerts.length?alerts.slice(0,2).map(row=>`<div class="temp-alert" data-container="${esc(row.containerNo)}"><div class="topline"><span>${esc(row.containerNo)}</span><strong>${esc(row.statusText)}</strong></div><div class="meta">回风 ${esc(row.returnTemp)}° · 设定 ${esc(row.setTemp)}° · 温差 ${esc(row.deviation)}°</div></div>`).join(''):'<div class="empty-state">暂无温度异常</div>'}</div></div>`;
 document.querySelectorAll('#temperaturePanel [data-drill]').forEach(el=>el.onclick=()=>openDrill(el.dataset.drill));
 document.querySelectorAll('#temperaturePanel [data-container]').forEach(el=>el.onclick=()=>openDrill(`temperatureByContainer.${el.dataset.container}`));
}
const STRUCTURE_TECH_COLORS=[['#60a5fa','#38bdf8'],['#2dd4bf','#22c55e'],['#f59e0b','#f5c451'],['#a78bfa','#38bdf8'],['#f97316','#facc15'],['#84cc16','#2dd4bf'],['#c084fc','#f0abfc']];function donutSegments(items){let start=0,total=items.reduce((sum,item)=>sum+num(item.value),0)||1;return items.map((item,idx)=>{const value=num(item.value);const size=Math.max(value/total*100,1.8);const seg={item,idx,start,size,colors:STRUCTURE_TECH_COLORS[idx%STRUCTURE_TECH_COLORS.length]};start+=size;return seg})}
function donutBlock(title,items,path){const segments=donutSegments(items||[]);const svgSegments=segments.reduce((acc,seg)=>{const gap=.35,dash=Math.max(seg.size-gap,.4),offset=seg.start*3.6-90;const gradId=`donut-grad-${esc(title)}-${seg.idx}`;acc.defs+=`<linearGradient id="${gradId}" x1="6" y1="18" x2="66" y2="54" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="${seg.colors[0]}" stop-opacity=".96"/><stop offset="100%" stop-color="${seg.colors[1]}" stop-opacity=".84"/></linearGradient>`;acc.circles+=`<circle cx="36" cy="36" r="28" fill="none" stroke="url(#${gradId})" stroke-width="12" stroke-linecap="butt" pathLength="100" stroke-dasharray="${dash} ${100-dash}" transform="rotate(${offset} 36 36)" opacity=".94"/>`;return acc},{defs:'',circles:''});return `<div class="donut-card"><div class="donut-title">${esc(title)}</div><div class="donut-chart-wrap"><div class="donut-chart"><svg viewBox="0 0 72 72" aria-hidden="true"><defs>${svgSegments.defs}</defs><circle cx="36" cy="36" r="28" fill="none" stroke="rgba(99,124,168,.16)" stroke-width="12"/>${svgSegments.circles}<circle cx="36" cy="36" r="17" fill="rgba(13,20,38,.94)" stroke="rgba(148,173,214,.12)" stroke-width="1"/></svg></div></div><div class="donut-list">${segments.map(seg=>`<div class="donut-item" data-drill="${esc(path(seg.item))}"><span class="donut-dot" style="background:linear-gradient(135deg,${seg.colors[0]},${seg.colors[1]})"></span><span class="donut-name">${esc(seg.item.label)}</span><strong>${pctText(seg.item.rate)}</strong></div>`).join('')}</div></div>`}
function renderOrderChart(model){const s=model.structure||{};$('orderChartPanel').innerHTML=`<div class="panel-head"><div><div class="panel-title">结构画像</div><div class="panel-note">国家、品类、品牌占比</div></div><div><a data-board-link="orders" href="${esc(buildBoardUrl('orders'))}">进入看板</a> · <button data-drill="shipped">明细</button></div></div><div class="structure-grid" hidden></div><div class="donut-grid">${donutBlock('国家',s.country||[],item=>`byCountry.${item.label}`)}${donutBlock('品类',s.category||[],item=>`byCategory.${item.key}`)}${donutBlock('品牌',s.brandTop||[],item=>`byFactory.${item.label}`)}</div>`;document.querySelectorAll('#orderChartPanel [data-drill]').forEach(el=>el.onclick=()=>openDrill(el.dataset.drill))}
function renderRisks(model){const risks=model.risks||[];$('riskPanel').innerHTML=`<div class="panel-head"><div><div class="panel-title">风险待办</div><div class="panel-note">点单条只看对应柜，点全部看清单</div></div><div><a data-board-link="risks" href="${esc(buildBoardUrl('risks'))}">进入看板</a> · <button data-drill="risks">全部 ${risks.length}</button></div></div><div class="risk-board">${risks.length?risks.map((r,idx)=>`<div class="risk" data-drill="riskItems.${idx}" style="--accent:${r.severity==='high'?'var(--red)':'var(--orange)'}"><div class="topline"><span>${esc(r.type)}</span><span>${esc(r.containerNo)}</span></div><div class="meta">${esc(r.statusText||r.status||r.summary||'需要业务人员关注')}${r.days?` · ${esc(r.days)}天`:''}</div></div>`).join(''):'<div class="empty-state">当前无高优先级风险</div>'}</div>`;document.querySelectorAll('#riskPanel [data-drill]').forEach(el=>el.onclick=()=>openDrill(el.dataset.drill));const panel=$('riskPanel');if(panel){panel.scrollTop=0;panel.scrollLeft=0}const board=panel&&panel.querySelector('.risk-board');if(board){board.scrollTop=0;board.scrollLeft=0}}
function renderTopicShell(model,config,bodyHtml){
 const tabs=BOARD_CONFIGS.map(board=>`<a class="topic-tab ${board.key===config.key?'active':''}" href="${esc(buildBoardUrl(board.key))}">${esc(board.label)}</a>`).join('');
 return `<div class="topic-shell"><nav class="topic-nav"><div class="topic-tabs">${tabs}</div><a class="topic-back" href="${esc(buildBoardUrl(''))}">返回总览</a></nav><section class="topic-board ${esc(config.key)}"><header class="topic-hero"><div><div class="topic-eyebrow">${esc(config.code)}</div><div class="topic-title">${esc(config.label)}</div><div class="topic-copy">${esc(config.subtitle)}</div></div><div class="topic-metrics">${topicMetric('订单数',model.headline&&model.headline.totalOrders,'订单主表去重订单')}${topicMetric('下单柜数',model.headline&&model.headline.totalBoxes,'鲜果+冻果柜数')}${topicMetric('已发货',model.headline&&model.headline.shipped,'分柜已登记发货')}${topicMetric('健康分',model.headline&&model.headline.healthScore,'综合履约和风险')}</div></header>${bodyHtml}</section></div>`;
}
function renderTopicDashboard(model){const key=currentBoardKey();const config=BOARD_CONFIGS.find(board=>board.key===key);if(!config)return false;$('commandGrid').innerHTML=renderTopicShell(model,config,config.render(model));wireTopicDrilldowns($('commandGrid'));return true}
function topicMetric(label,value,note){return `<div class="topic-metric"><div class="label">${esc(label)}</div><div class="value num">${esc(value==null?'-':value)}</div><div class="progress-hint">${esc(note||'')}</div></div>`}
function topicBars(items,pathFn){return `<div class="bar-chart">${(items||[]).map(item=>`<div class="bar-row" data-drill="${esc(pathFn?pathFn(item):item.drilldown||'')}"><div class="bar-label">${esc(item.label||item.key||'-')}</div><div class="bar-track"><div class="bar-fill" style="width:${clamp(item.rate||item.progressRate||0,0,100)}%"></div></div><div class="bar-value num">${esc(item.value||item.count||0)}</div></div>`).join('')||'<div class="empty-state">暂无结构数据</div>'}</div>`}
function topicRows(rows,renderRow){return `<div class="topic-list">${(rows||[]).length?(rows||[]).map(renderRow).join(''):'<div class="empty-state">暂无可展示数据</div>'}</div>`}
function topicTable(rows,columns){return (rows||[]).length?`<table class="topic-table"><thead><tr>${columns.map(c=>`<th>${esc(labels[c]||c)}</th>`).join('')}</tr></thead><tbody>${rows.slice(0,8).map(row=>`<tr>${columns.map(c=>`<td>${esc(row[c])}</td>`).join('')}</tr>`).join('')}</tbody></table>`:'<div class="empty-state">暂无明细数据</div>'}
function drillRows(path){const data=resolveDrill(path);return data&&Array.isArray(data.rows)?data.rows:[]}
function renderFulfillmentDashboard(model){
 const e=model.efficiency||{},cycle=e.cycleTimes||{},s=model.structure||{};
 return `<div class="topic-grid"><section class="topic-card wide"><h2>履约全链路漏斗</h2><div class="topic-card-note">从下单柜数到发货、到岸、国内发货和签收逐层观察转化</div><div class="fulfillment-funnel">${(e.funnel||[]).map(row=>`<div class="funnel-row" data-drill="${esc(row.drilldown)}"><div class="funnel-label">${esc(row.label)}</div><div class="funnel-track"><div class="funnel-fill" style="width:${clamp(row.rate,0,100)}%"></div></div><div class="funnel-value num">${esc(row.value)} · ${pctText(row.rate)}</div></div>`).join('')||'<div class="empty-state">暂无履约漏斗数据</div>'}</div></section><section class="topic-card"><h2>周期诊断</h2><div class="topic-kpi-grid">${topicMetric('国外段',`${esc(cycle.avgOverseasDays)}天`,'发货到到岸')}${topicMetric('在岸',`${esc(cycle.avgOnShoreDays)}天`,'到岸到国内发货')}${topicMetric('国内段',`${esc(cycle.avgDomesticTransitDays)}天`,'国内发货到签收')}${topicMetric('已签收',model.headline&&model.headline.signed,'完成交付')}</div></section><section class="topic-card"><h2>结构影响</h2>${topicBars(s.country||[],item=>`byCountry.${item.label}`)}</section><section class="topic-card wide"><h2>发货明细抽样</h2>${topicTable(drillRows('shipped'),['orderNo','country','factory','containerNo','shipDate','arrivalDate','signedDate','statusText'])}</section></div>`;
}
function renderLogisticsDashboard(model){
 const list=model.bottlenecks||[];
 return `<div class="topic-grid"><section class="topic-card tall"><h2>瓶颈优先级排行</h2><div class="topic-card-note">优先关注停留最久、占比最高的状态池</div>${topicRows(list,item=>`<div class="topic-row" data-drill="bottlenecks.${esc(item.key)}"><div class="topic-row-top"><span>${esc(item.label)}</span><strong class="num">${esc(item.count)}柜</strong></div><div class="topic-row-meta">${esc(item.hint)} · 最久 ${esc(item.longestDays)} 天 · ${esc(item.longestContainer)}</div><div class="bottleneck-bar"><span style="width:${clamp(item.progressRate||0,0,100)}%"></span></div></div>`)}</section><section class="topic-card"><h2>状态占比</h2>${topicBars(list,item=>`bottlenecks.${item.key}`)}</section><section class="topic-card"><h2>调度指标</h2><div class="topic-kpi-grid">${topicMetric('瓶颈类型',list.length,'当前有量状态')}${topicMetric('总瓶颈柜',list.reduce((sum,item)=>sum+num(item.count),0),'瓶颈池累计')}${topicMetric('最大停留',Math.max(0,...list.map(item=>num(item.longestDays))),'天')}${topicMetric('已发货',model.headline&&model.headline.shipped,'占比基准')}</div></section><section class="topic-card wide"><h2>瓶颈柜明细</h2>${topicTable(drillRows('bottlenecks'),['containerNo','orderNo','country','factory','statusText','dwellDays','shipDate','arrivalDate'])}</section></div>`;
}
function renderTemperatureDashboard(model){
 const t=model.temperature||{},g=t.gantt||{days:[],rows:[]},alerts=t.topAlerts||[];
 return `<div class="topic-grid"><section class="topic-card wide"><h2>温度趋势甘特</h2><div class="mini-gantt"><div class="gantt-head"><span></span>${(g.days||[]).map(d=>`<span>${esc(d.label)}</span>`).join('')}</div>${(g.rows||[]).length?g.rows.map(row=>`<div class="gantt-row" data-container="${esc(row.containerNo)}"><div class="gantt-label">${esc(row.containerNo)}</div>${row.cells.map(cell=>`<div class="gantt-cell ${esc(cell.level)}" title="${esc(cell.date)} ${esc(cell.returnTemp||'')}" data-container="${esc(row.containerNo)}"></div>`).join('')}</div>`).join(''):'<div class="empty-state">暂无温度甘特数据</div>'}</div></section><section class="topic-card"><h2>冷链指标</h2><div class="topic-kpi-grid">${topicMetric('异常率',pctText(t.alarmRate),'异常柜占比')}${topicMetric('异常柜',t.alarmCount,'需优先复核')}${topicMetric('最大温差',`${esc(t.maxDeviation)}°`,'回风-设定')}${topicMetric('平均回风',`${esc(t.avgReturnTemp)}°`,'全部记录均值')}</div></section><section class="topic-card"><h2>异常柜排行</h2>${topicRows(alerts,row=>`<div class="topic-row" data-container="${esc(row.containerNo)}"><div class="topic-row-top"><span>${esc(row.containerNo)}</span><strong>${esc(row.statusText)}</strong></div><div class="topic-row-meta">回风 ${esc(row.returnTemp)}° · 设定 ${esc(row.setTemp)}° · 温差 ${esc(row.deviation)}°</div></div>`)}</section><section class="topic-card wide"><h2>温度明细抽样</h2>${topicTable(drillRows('temperatureDetails'),['containerNo','brand','setTemp','returnTemp','deviation','statusText','recordedAt','note'])}</section></div>`;
}
function renderOrdersDashboard(model){
 const s=model.structure||{},h=model.headline||{};
 return `<div class="topic-grid three"><section class="topic-card"><h2>国家结构</h2>${donutBlock('国家',s.country||[],item=>`byCountry.${item.label}`)}</section><section class="topic-card"><h2>品类结构</h2>${donutBlock('品类',s.category||[],item=>`byCategory.${item.key}`)}</section><section class="topic-card"><h2>品牌/工厂结构</h2>${donutBlock('品牌',s.brandTop||[],item=>`byFactory.${item.label}`)}</section><section class="topic-card"><h2>柜量对比</h2><div class="topic-kpi-grid">${topicMetric('下单柜数',h.totalBoxes,'订单主表')}${topicMetric('已发货',h.shipped,'分柜明细')}${topicMetric('已签收',h.signed,'终端完成')}${topicMetric('未发货',Math.max(0,num(h.totalBoxes)-num(h.shipped)),'下单-发货')}</div></section><section class="topic-card wide"><h2>订单明细抽样</h2>${topicTable(drillRows('orders'),['orderNo','country','factory','freshBoxes','frozenBoxes','totalBoxes'])}</section></div>`;
}
function renderRisksDashboard(model){
 const risks=model.risks||[],high=risks.filter(r=>r.severity==='high').length,tempAlerts=(model.temperature&&model.temperature.alarmCount)||0;
 const panel=$('riskPanel');if(panel){panel.scrollTop=0;panel.scrollLeft=0}
 const typeMap=risks.reduce((acc,r)=>{const key=r.type||'未分类';acc[key]=(acc[key]||0)+1;return acc},{});
 const typeItems=Object.entries(typeMap).map(([label,value])=>({label,value,rate:risks.length?value/risks.length*100:0}));
 return `<div class="topic-grid"><section class="topic-card"><h2>处置概览</h2><div class="topic-kpi-grid">${topicMetric('全部风险',risks.length,'待关注事项')}${topicMetric('高优先级',high,'建议先处理')}${topicMetric('温度异常',tempAlerts,'冷链风险')}${topicMetric('物流瓶颈',(model.bottlenecks||[]).length,'状态池数量')}</div></section><section class="topic-card"><h2>风险类型分布</h2>${topicBars(typeItems,item=>`risks`)}</section><section class="topic-card wide tall"><h2>风险待办清单</h2>${topicRows(risks,(r,idx)=>`<div class="topic-row" data-drill="riskItems.${idx}"><div class="topic-row-top"><span>${esc(r.type)}</span><strong>${esc(r.containerNo)}</strong></div><div class="topic-row-meta">${esc(r.statusText||r.status||r.summary||'需要业务人员关注')}${r.days?` · ${esc(r.days)}天`:''}</div></div>`)}</section></div>`;
}
function renderNewsDashboard(model){
 const items=(model.news&&model.news.items)||[];
 const sourceMap=items.reduce((acc,item)=>{const key=item.source||item.site||'新闻源';acc[key]=(acc[key]||0)+1;return acc},{});
 const sourceItems=Object.entries(sourceMap).map(([label,value])=>({label,value,rate:items.length?value/items.length*100:0}));
 return `<div class="topic-grid"><section class="topic-card"><h2>信息概览</h2><div class="topic-kpi-grid">${topicMetric('新闻数',items.length,'当前抓取结果')}${topicMetric('来源数',Object.keys(sourceMap).length,'不同信息源')}${topicMetric('最新时间',items[0]&&(items[0].publishedAt||items[0].time||items[0].date)||'-','列表首条')}${topicMetric('筛选状态',state.filters.country||'全部国家','继承顶部筛选')}</div></section><section class="topic-card"><h2>来源分布</h2>${topicBars(sourceItems)}</section><section class="topic-card wide tall"><h2>行业情报流</h2><div class="topic-list">${items.length?items.map(item=>`<a class="news-item" href="${esc(item.url||'#')}" target="_blank" rel="noopener"><div class="news-title">${esc(item.title||'未命名新闻')}</div><div class="news-meta">${esc(item.source||item.site||'新闻源')} · ${esc(item.publishedAt||item.time||item.date||'')}</div></a>`).join(''):'<div class="empty-state">暂无自动新闻</div>'}</div></section></div>`;
}
function wireTopicDrilldowns(root){root.querySelectorAll('[data-drill]').forEach(el=>{el.onclick=()=>openDrill(el.dataset.drill)});root.querySelectorAll('[data-container]').forEach(el=>{el.onclick=()=>openDrill(`temperatureByContainer.${el.dataset.container}`)})}
function openDrill(path){const data=resolveDrill(path);if(!data)return;const rows=Array.isArray(data.rows)?data.rows:[],columns=data.columns||Object.keys(rows[0]||{});$('modalTitle').textContent=`${data.title||'明细'} · ${rows.length}条`;$('modalBody').innerHTML=rows.length?`<table class="drill-table"><thead><tr>${columns.map(c=>`<th>${esc(labels[c]||c)}</th>`).join('')}</tr></thead><tbody>${rows.map(row=>`<tr>${columns.map(c=>`<td>${esc(row[c])}</td>`).join('')}</tr>`).join('')}</tbody></table>`:'<div class="empty-state">暂无明细数据</div>';$('drillModal').classList.add('open');DashboardMotion.openModal($('drillModal'))}
function closeDrill(){DashboardMotion.closeModal($('drillModal'),()=>$('drillModal').classList.remove('open'))}
Object.assign(labels,{statusText:'当前状态',severityText:'等级',recordedAt:'记录时间',note:'备注'});
async function load(){try{$('refreshState').textContent='正在加载';const [user,executive]=await Promise.all([api('/api/auth/me'),api('/api/overview-executive'+query())]);state.user=user;state.model=buildViewModel(user,executive);renderUser(user);renderFilters(state.model);renderKpis(state.model);if(!renderTopicDashboard(state.model)){renderFlow(state.model);renderLogisticsChart(state.model);renderTemperature(state.model);renderOrderChart(state.model);renderRisks(state.model);renderNews(state.model)}renderModules(state.model);DashboardMotion.afterOverviewRender();$('refreshState').textContent='已更新 '+new Date().toLocaleTimeString('zh-CN',{hour12:false})}catch(err){console.warn(err);$('refreshState').textContent=err.message||'加载失败';$('kpiStrip').innerHTML='<div class="empty-state">老板经营驾驶舱加载失败，请稍后刷新</div>'}}
$('modalClose').onclick=closeDrill;$('drillModal').onclick=e=>{if(e.target.id==='drillModal')closeDrill()};setInterval(tick,1000);readInitialFilters();tick();load();setInterval(load,60000);
</script>
