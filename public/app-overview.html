<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>老板经营驾驶舱 · DURIAN EXECUTIVE OVERVIEW</title>
<style>
:root{--bg:#070b16;--bg2:#0d1426;--panel:rgba(20,28,48,.75);--panel2:rgba(13,20,38,.92);--line:rgba(99,124,168,.2);--line2:rgba(148,173,214,.14);--text:#eef3ff;--muted:#9fb0cc;--faint:#6c7e9c;--gold:#f5c451;--green:#22c55e;--teal:#2dd4bf;--blue:#60a5fa;--red:#f87171;--orange:#f59e0b;--violet:#a78bfa;--shadow:0 16px 46px rgba(0,0,0,.34)}
*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",sans-serif}body{overflow:hidden}.num{font-variant-numeric:tabular-nums;font-weight:850}
.shell{height:100vh;display:grid;grid-template-rows:58px 1fr;gap:10px;padding:10px;background:radial-gradient(circle at 18% 0%,rgba(37,99,235,.13),transparent 28%),linear-gradient(135deg,#070b16 0%,#0d1426 58%,#0b1020 100%)}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;border:1px solid var(--line);background:rgba(13,20,38,.84);border-radius:8px;padding:0 14px;box-shadow:var(--shadow);min-width:0}.brand-block{display:flex;align-items:center;gap:12px;min-width:0}.brand-mark{width:38px;height:38px;display:grid;place-items:center;border:1px solid rgba(96,165,250,.36);border-radius:7px;color:var(--gold);font-weight:900;background:rgba(96,165,250,.08)}h1{margin:0;font-size:20px;font-weight:900;letter-spacing:0}.brand-block p{margin:2px 0 0;color:var(--muted);font-size:11px}.top-actions{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:12px;white-space:nowrap}.refresh-state{border:1px solid var(--line);border-radius:999px;padding:6px 9px}.clock{display:flex;flex-direction:column;align-items:flex-end;line-height:1.05}.clock strong{font-size:18px;color:var(--text)}.userbar{display:flex;align-items:center;gap:7px}.userbar a{color:var(--text);border:1px solid var(--line);border-radius:6px;padding:5px 8px;text-decoration:none;cursor:pointer}
.dashboard{min-height:0;display:grid;grid-template-rows:82px minmax(0,1fr) 54px;gap:9px}.kpi-strip{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px}.kpi{min-width:0;border:1px solid var(--line);background:linear-gradient(180deg,rgba(20,28,48,.86),rgba(13,20,38,.9));border-radius:7px;padding:9px 10px;position:relative;overflow:hidden}.kpi:before{content:"";position:absolute;left:0;right:0;top:0;height:2px;background:var(--accent,var(--blue))}.kpi .label{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.kpi .value{margin-top:5px;font-size:25px;line-height:1}.metric-rule{margin-top:5px;color:var(--faint);font-size:10px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.command-grid{min-height:0;display:grid;grid-template-columns:1fr 1fr .95fr;grid-template-rows:minmax(0,1fr) minmax(0,1fr);grid-template-areas:"flow logistics temperature" "orders risk news";gap:9px}.panel{min-width:0;min-height:0;border:1px solid var(--line);background:var(--panel);border-radius:8px;box-shadow:var(--shadow);padding:10px;overflow:hidden}.panel-head{height:33px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:7px}.panel-title{font-size:14px;font-weight:900}.panel-note{font-size:10px;color:var(--faint);line-height:1.35}.panel a{color:var(--muted);text-decoration:none}.panel a:hover{color:var(--gold)}#flowPanel{grid-area:flow}#logisticsChartPanel{grid-area:logistics}#temperaturePanel{grid-area:temperature}#orderChartPanel{grid-area:orders}#riskPanel{grid-area:risk}#newsPanel{grid-area:news}
.fulfillment-funnel{height:calc(100% - 40px);display:grid;gap:7px}.funnel-row{display:grid;grid-template-columns:74px minmax(0,1fr) 58px;gap:8px;align-items:center}.funnel-label{font-size:11px;color:var(--muted)}.funnel-track{height:14px;border-radius:999px;background:rgba(70,85,111,.58);overflow:hidden}.funnel-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--blue),var(--teal));width:0}.funnel-value{text-align:right;font-size:12px}.cycle-strip{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px;margin-top:7px}.cycle{border:1px solid var(--line2);border-radius:7px;background:rgba(13,20,38,.62);padding:7px}.cycle .label{font-size:9px;color:var(--faint)}.cycle .value{margin-top:3px;font-size:17px}
.bottleneck-list{height:calc(100% - 40px);display:grid;gap:7px}.bottleneck{border:1px solid var(--line2);border-radius:7px;background:rgba(13,20,38,.62);padding:8px}.bottleneck-top{display:flex;justify-content:space-between;gap:8px;font-size:12px;font-weight:850}.bottleneck-meta{margin-top:5px;color:var(--faint);font-size:10px;line-height:1.3}.bottleneck-bar{margin-top:6px;height:6px;border-radius:999px;background:rgba(70,85,111,.58);overflow:hidden}.bottleneck-bar span{display:block;height:100%;background:var(--orange);border-radius:999px}
.executive-health{display:grid;grid-template-columns:112px minmax(0,1fr);gap:10px;align-items:center}.donut-chart{width:104px;height:104px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--green) 0deg,var(--green) var(--scoreDeg),rgba(70,85,111,.62) var(--scoreDeg),rgba(70,85,111,.62) 360deg)}.donut-hole{width:66px;height:66px;border-radius:50%;display:grid;place-items:center;text-align:center;background:var(--bg2);border:1px solid var(--line)}.donut-hole strong{font-size:22px}.health-lines{display:grid;gap:6px}.health-line{display:flex;justify-content:space-between;gap:8px;font-size:11px;color:var(--muted)}.health-line strong{color:var(--text)}
.temperature-summary{height:calc(100% - 40px);display:grid;grid-template-rows:112px 1fr;gap:7px}.temp-metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px}.mini-metric{border:1px solid var(--line2);border-radius:7px;background:rgba(13,20,38,.62);padding:6px}.mini-metric .label{font-size:9px;color:var(--faint)}.mini-metric .value{font-size:15px;margin-top:3px}.temp-alerts{display:grid;gap:5px;overflow:hidden}.temp-alert{border:1px solid var(--line2);border-radius:7px;background:rgba(13,20,38,.62);padding:6px;font-size:10px;color:var(--muted);display:flex;justify-content:space-between;gap:8px}.temp-alert strong{color:var(--text)}
.structure-grid{height:calc(100% - 40px);display:grid;grid-template-columns:1fr 1fr;gap:8px}.structure-block{min-width:0}.structure-title{font-size:10px;color:var(--faint);margin-bottom:5px}.bar-chart{display:grid;gap:5px}.bar-row{display:grid;grid-template-columns:54px minmax(0,1fr) 34px;gap:6px;align-items:center}.bar-label{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.bar-track{height:8px;border-radius:999px;background:rgba(70,85,111,.58);overflow:hidden}.bar-fill{height:100%;background:linear-gradient(90deg,var(--accent,var(--blue)),rgba(255,255,255,.34));border-radius:999px}.bar-value{text-align:right;font-size:10px}.brand-top{grid-column:1/3}
.risk-board,.news-list{height:calc(100% - 40px);display:grid;gap:6px;overflow:hidden}.risk,.news-item{border:1px solid var(--line2);border-radius:7px;background:rgba(13,20,38,.62);padding:7px;min-width:0}.risk{border-left:3px solid var(--accent,var(--orange))}.risk .topline{display:flex;justify-content:space-between;gap:8px;font-size:11px;font-weight:850}.risk .meta,.news-meta{margin-top:4px;color:var(--faint);font-size:9px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.news-item{display:block;color:var(--text);text-decoration:none}.news-title{font-size:11px;font-weight:800;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.empty-state{color:var(--muted);border:1px dashed var(--line);border-radius:7px;padding:14px;text-align:center;font-size:12px}
.module-dock{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:8px}.module{min-width:0;border:1px solid var(--line);border-radius:7px;background:rgba(13,20,38,.82);padding:8px 9px;color:var(--text);text-decoration:none;overflow:hidden}.module .code{font-size:9px;color:var(--faint);font-family:ui-monospace,SFMono-Regular,Menlo,monospace}.module .name{margin-top:3px;font-size:12px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.module .desc{display:none}
@media (max-width:1180px){body{overflow:auto}.shell{height:auto;min-height:100vh}.dashboard{grid-template-rows:auto auto auto}.kpi-strip{grid-template-columns:repeat(2,minmax(0,1fr))}.command-grid{grid-template-columns:1fr;grid-template-rows:auto;grid-template-areas:"flow" "logistics" "temperature" "orders" "risk" "news"}.panel{min-height:220px}.module-dock{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media (max-width:680px){.shell{padding:8px;grid-template-rows:auto auto}.topbar{height:auto;align-items:flex-start;flex-direction:column;padding:12px}.top-actions{width:100%;justify-content:space-between;flex-wrap:wrap}.kpi-strip,.module-dock{grid-template-columns:1fr}.executive-health,.structure-grid{grid-template-columns:1fr}.brand-top{grid-column:auto}.panel{min-height:230px}}
</style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="brand-block">
      <div class="brand-mark">EX</div>
      <div><h1>老板经营驾驶舱</h1><p>Executive Overview · 风险、效率、结构、温度</p></div>
    </div>
    <div class="top-actions">
      <div class="refresh-state" id="refreshState">正在加载</div>
      <div class="clock"><span id="dateDisplay"></span><strong id="clockDisplay"></strong></div>
      <div class="userbar" id="userbar"></div>
    </div>
  </header>
  <main class="dashboard">
    <section class="kpi-strip" id="kpiStrip" aria-label="经营核心指标"></section>
    <section class="command-grid">
      <section class="panel" id="flowPanel" aria-label="履约效率"></section>
      <section class="panel" id="logisticsChartPanel" aria-label="瓶颈排行"></section>
      <section class="panel" id="temperaturePanel" aria-label="温度健康"></section>
      <section class="panel" id="orderChartPanel" aria-label="结构画像"></section>
      <aside class="panel" id="riskPanel" aria-label="风险待办"></aside>
      <section class="panel" id="newsPanel" aria-label="新闻概览"></section>
    </section>
    <section class="module-dock" id="moduleDock" aria-label="模块入口"></section>
  </main>
</div>
<script>
const API='';
const MODULES=[
  {code:'orders',name:'订单看板',href:'/index.html',desc:'订单和柜数'},
  {code:'flow',name:'货柜流向',href:'/index-flow.html',desc:'状态流转'},
  {code:'logistics',name:'物流监控',href:'/index.html#logistics',desc:'在途滞留'},
  {code:'temperature',name:'温度监控',href:'/index-tv.html',desc:'温度详情'},
  {code:'news',name:'行业新闻',href:'/index.html#news',desc:'新闻源'},
  {code:'smartsheet',name:'智能表',href:'/admin.html#smartsheet',desc:'企微数据'},
  {code:'admin',name:'系统管理',href:'/admin.html#accounts',desc:'权限配置'},
];
function $(id){return document.getElementById(id)}
function esc(value){return String(value==null?'-':value).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function num(value){const n=Number(value||0);return Number.isFinite(n)?n:0}
function pctText(value){return `${Math.round(num(value)*10)/10}%`}
function clamp(value,min,max){return Math.max(min,Math.min(max,value))}
function pad(n){return String(n).padStart(2,'0')}
function gotoLogin(){location.href='/login?redirect='+encodeURIComponent(location.pathname)}
function tick(){const d=new Date();const w=['日','一','二','三','四','五','六'];$('dateDisplay').textContent=`${d.getMonth()+1}/${d.getDate()} 周${w[d.getDay()]}`;$('clockDisplay').textContent=`${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`}
async function api(path){const res=await fetch(API+path,{cache:'no-store'});if(res.status===401){gotoLogin();throw new Error('未登录')}const json=await res.json();if(!res.ok||json.success===false)throw new Error(json.error||'加载失败');return json.data||json}
function moduleAllowed(user,code){if(user.role==='admin')return true;if((user.permissions||[]).includes(code))return true;if((user.dashboardPermissions||[]).includes(code))return true;return code!=='admin'&&code!=='smartsheet'}
function buildViewModel(user, executive){return {user,...executive,modules:MODULES.filter(mod=>moduleAllowed(user,mod.code))}}
function renderUser(user){const name=user.displayName||user.username||'-';const canAdmin=user.role==='admin'||(user.permissions||[]).length>0;$('userbar').innerHTML=`<span>${esc(name)}</span>${canAdmin?'<a href="/admin">后台</a>':''}<a id="btnLogout">退出</a>`;$('btnLogout').onclick=async()=>{try{await fetch('/api/auth/logout',{method:'POST'})}catch(_){}gotoLogin()}}
function renderKpis(model){const h=model.headline||{};const items=[{label:'订单数',value:h.totalOrders,rule:'订单主表去重订单编号',accent:'var(--gold)'},{label:'下单柜数',value:h.totalBoxes,rule:'订单主表鲜果+冻果柜数',accent:'var(--green)'},{label:'已发货',value:h.shipped,rule:'分柜明细有柜号',accent:'var(--teal)'},{label:'已签收',value:h.signed,rule:'签收日期非空',accent:'var(--blue)'},{label:'经营健康分',value:h.healthScore,rule:`风险待办 ${h.totalRisks||0} 项`,accent:h.healthScore>=80?'var(--green)':h.healthScore>=60?'var(--orange)':'var(--red)'}];$('kpiStrip').innerHTML=items.map(item=>`<article class="kpi" style="--accent:${item.accent}"><div class="label">${esc(item.label)}</div><div class="value num">${esc(item.value)}</div><div class="metric-rule">${esc(item.rule)}</div></article>`).join('')}
function renderFlow(model){const e=model.efficiency||{},cycle=e.cycleTimes||{};$('flowPanel').innerHTML=`<div class="panel-head"><div><div class="panel-title">履约效率</div><div class="panel-note">一条漏斗只看发货、到岸、签收效率</div></div><a class="panel-note" href="/index-flow.html">详情</a></div><div class="fulfillment-funnel">${(e.funnel||[]).map(row=>`<div class="funnel-row"><div class="funnel-label">${esc(row.label)}</div><div class="funnel-track"><div class="funnel-fill" style="width:${clamp(row.rate,0,100)}%"></div></div><div class="funnel-value num">${esc(row.value)} · ${pctText(row.rate)}</div></div>`).join('')}<div class="cycle-strip"><div class="cycle"><div class="label">平均国外段</div><div class="value num">${esc(cycle.avgOverseasDays)}天</div></div><div class="cycle"><div class="label">平均在岸</div><div class="value num">${esc(cycle.avgOnShoreDays)}天</div></div><div class="cycle"><div class="label">平均国内段</div><div class="value num">${esc(cycle.avgDomesticTransitDays)}天</div></div></div></div>`}
function renderLogisticsChart(model){const list=model.bottlenecks||[];const max=Math.max(1,...list.map(item=>item.longestDays||item.count||0));$('logisticsChartPanel').innerHTML=`<div class="panel-head"><div><div class="panel-title">瓶颈排行</div><div class="panel-note">看哪里卡、卡了几天、代表柜号</div></div><a class="panel-note" href="/index-flow.html">详情</a></div><div class="bottleneck-list">${list.map(item=>`<div class="bottleneck"><div class="bottleneck-top"><span>${esc(item.label)}</span><strong class="num">${esc(item.count)}柜</strong></div><div class="bottleneck-meta">${esc(item.hint)} · 最久 ${esc(item.longestDays)} 天 · ${esc(item.longestContainer)}</div><div class="bottleneck-bar"><span style="width:${clamp((item.longestDays||0)/max*100,0,100)}%"></span></div></div>`).join('')}</div>`}
function renderTemperature(model){const t=model.temperature||{};const score=Math.max(0,100-num(t.alarmRate)*3-num(t.warningCount)*2);const scoreDeg=clamp(score,0,100)*3.6;$('temperaturePanel').innerHTML=`<div class="panel-head"><div><div class="panel-title">温度健康</div><div class="panel-note">不放详情甘特，只看风险强度</div></div><a class="panel-note" href="/index-tv.html">详情</a></div><div class="temperature-summary"><div class="executive-health"><div class="donut-chart" style="--scoreDeg:${scoreDeg}deg"><div class="donut-hole"><div><strong class="num">${Math.round(score)}</strong><br><span class="panel-note">健康分</span></div></div></div><div class="temp-metrics"><div class="mini-metric"><div class="label">异常率</div><div class="value num">${pctText(t.alarmRate)}</div></div><div class="mini-metric"><div class="label">异常柜</div><div class="value num">${esc(t.alarmCount)}</div></div><div class="mini-metric"><div class="label">最大温差</div><div class="value num">${esc(t.maxDeviation)}°</div></div><div class="mini-metric"><div class="label">均温</div><div class="value num">${esc(t.avgReturnTemp)}°</div></div></div></div><div class="temp-alerts">${(t.topAlerts||[]).length?(t.topAlerts||[]).slice(0,4).map(item=>`<div class="temp-alert"><span>${esc(item.containerNo)}</span><strong>${esc(item.deviation)}°</strong></div>`).join(''):`<div class="temp-alert"><span>暂无异常柜</span><strong>${Math.round(score)}</strong></div>`}</div></div>`}
function renderOrderChart(model){const s=model.structure||{};const rows=(title,items,accent)=>`<div class="structure-block"><div class="structure-title">${esc(title)}</div><div class="bar-chart">${(items||[]).map(item=>`<div class="bar-row"><div class="bar-label">${esc(item.label)}</div><div class="bar-track"><div class="bar-fill" style="--accent:${accent};width:${clamp(item.rate||item.value,0,100)}%"></div></div><div class="bar-value num">${esc(item.value)}</div></div>`).join('')}</div></div>`;$('orderChartPanel').innerHTML=`<div class="panel-head"><div><div class="panel-title">结构画像</div><div class="panel-note">国家、品类、品牌，不重复柜量状态</div></div><a class="panel-note" href="/index-flow.html">详情</a></div><div class="structure-grid">${rows('国家结构',s.country,'var(--blue)')}${rows('品类结构',s.category,'var(--teal)')}<div class="structure-block brand-top">${rows('品牌发货 Top',s.brandTop,'var(--gold)')}</div></div>`}
function renderRisks(model){const risks=model.risks||[];$('riskPanel').innerHTML=`<div class="panel-head"><div><div class="panel-title">风险待办</div><div class="panel-note">高风险优先，不再只截 4 条</div></div></div><div class="risk-board">${risks.length?risks.slice(0,6).map(r=>`<div class="risk" style="--accent:${r.severity==='high'?'var(--red)':'var(--orange)'}"><div class="topline"><span>${esc(r.type)}</span><span>${esc(r.containerNo)}</span></div><div class="meta">${esc(r.summary||'需要业务人员关注')}${r.days?` · ${esc(r.days)}天`:''}</div></div>`).join(''):'<div class="empty-state">当前无高优先级风险</div>'}</div>`}
function renderNews(model){const n=model.news||{};$('newsPanel').innerHTML=`<div class="panel-head"><div><div class="panel-title">外部信息</div><div class="panel-note">只保留最新 3 条</div></div><a class="panel-note" href="/index.html#news">详情</a></div><div class="news-list">${(n.items||[]).length?(n.items||[]).map(item=>`<a class="news-item" href="${esc(item.url||'#')}" target="_blank" rel="noopener"><div class="news-title">${esc(item.title||'未命名新闻')}</div><div class="news-meta">${esc(item.source||item.site||'新闻源')} · ${esc(item.publishedAt||item.time||item.date||'')}</div></a>`).join(''):'<div class="empty-state">暂无自动新闻</div>'}</div>`}
function renderModules(model){$('moduleDock').innerHTML=model.modules.map(mod=>`<a class="module" href="${esc(mod.href)}"><div class="code">${esc(mod.code)}</div><div class="name">${esc(mod.name)}</div><div class="desc">${esc(mod.desc)}</div></a>`).join('')}
async function init(){tick();try{$('refreshState').textContent='正在加载';const [user,executive]=await Promise.all([api('/api/auth/me'),api('/api/overview-executive')]);renderUser(user);const model=buildViewModel(user,executive);renderKpis(model);renderFlow(model);renderLogisticsChart(model);renderTemperature(model);renderOrderChart(model);renderRisks(model);renderNews(model);renderModules(model);$('refreshState').textContent='已更新 '+new Date().toLocaleTimeString('zh-CN',{hour12:false})}catch(err){console.warn(err);$('refreshState').textContent=err.message||'加载失败';$('kpiStrip').innerHTML='<div class="empty-state">老板经营驾驶舱加载失败，请稍后刷新</div>'}}
setInterval(tick,1000);init();setInterval(init,60000);
</script>
</body>
</html>
