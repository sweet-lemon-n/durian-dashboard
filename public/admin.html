<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 - 榴莲温度看板</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1923; --bg-card: #1a2d3d; --border: #2a4055;
      --text: #e8edf2; --text-muted: #8ba4bc; --accent: #4caf50;
      --danger: #f44336; --warning: #ff9800; --info: #2196f3;
      --radius: 10px; --radius-sm: 6px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
    }
    .app { max-width: 1200px; margin: 0 auto; padding: 24px; }

    /* Header */
    .header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 0; border-bottom: 1px solid var(--border); margin-bottom: 24px;
    }
    .header h1 { font-size: 1.4rem; }
    .header a { color: var(--text-muted); text-decoration: none; font-size: 0.85rem; }
    .header a:hover { color: var(--accent); }

    /* Cards */
    .card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px; margin-bottom: 20px;
    }
    .card h2 {
      font-size: 1rem; margin-bottom: 16px; padding-bottom: 8px;
      border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px;
    }

    /* Status grid */
    .status-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px;
    }
    .status-item {
      background: rgba(255,255,255,0.03); border-radius: var(--radius-sm); padding: 16px; text-align: center;
    }
    .status-item .label { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 6px; }
    .status-item .value { font-size: 1.1rem; font-weight: 600; word-break: break-all; }
    .status-ok { color: var(--accent); }
    .status-err { color: var(--danger); }
    .status-warn { color: var(--warning); }

    /* Buttons */
    .btn {
      padding: 10px 20px; border: 1px solid var(--border); border-radius: var(--radius-sm);
      background: var(--bg-card); color: var(--text); cursor: pointer; font-size: 0.9rem;
      transition: all 0.2s; margin-right: 8px; margin-bottom: 8px;
    }
    .btn:hover { border-color: var(--accent); background: #1f3548; }
    .btn-primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-danger { border-color: var(--danger); color: var(--danger); }
    .btn-danger:hover { background: var(--danger); color: #fff; }
    .btn-sm { padding: 4px 10px; font-size: 0.75rem; margin-right: 4px; margin-bottom: 0; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Output box */
    .output {
      background: #0a0f14; border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 14px; margin-top: 12px; font-family: monospace; font-size: 0.82rem;
      white-space: pre-wrap; max-height: 400px; overflow-y: auto; color: var(--text-muted);
    }
    .output.success { color: var(--accent); }
    .output.error { color: var(--danger); }

    /* Form */
    .form-row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 12px; }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group label { font-size: 0.8rem; color: var(--text-muted); }
    .form-input {
      padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
      background: var(--bg); color: var(--text); font-size: 0.9rem; outline: none;
    }
    .form-input:focus { border-color: var(--accent); }

    /* Data table (通用) */
    .data-table-wrap {
      max-height: 500px; overflow: auto; margin-top: 8px;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
    }
    .data-table {
      width: 100%; border-collapse: collapse; font-size: 0.82rem;
    }
    .data-table thead { position: sticky; top: 0; z-index: 2; }
    .data-table thead th {
      background: #152230; text-align: left; padding: 8px 10px;
      border-bottom: 2px solid var(--border); color: var(--text-muted);
      font-weight: 600; white-space: nowrap; font-size: 0.75rem;
    }
    .data-table tbody td {
      padding: 6px 10px; border-bottom: 1px solid rgba(255,255,255,0.04);
      white-space: nowrap; max-width: 200px; overflow: hidden; text-overflow: ellipsis;
    }
    .data-table tbody tr:hover { background: rgba(255,255,255,0.03); }
    .data-table tbody tr.selected { background: rgba(76,175,80,0.1); }
    .data-table .cell-num { text-align: right; font-variant-numeric: tabular-nums; }
    .data-table .cell-mono { font-family: monospace; font-size: 0.75rem; }
    .data-table .cell-json { font-family: monospace; font-size: 0.7rem; color: var(--text-muted); max-width: 160px; }

    /* View toggle bar */
    .view-bar {
      display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
    }
    .view-bar .btn-toggle {
      padding: 3px 10px; font-size: 0.75rem; border-radius: 12px;
      border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer;
    }
    .view-bar .btn-toggle.active { background: var(--accent); color: #000; border-color: var(--accent); }
    .view-bar .view-label { font-size: 0.75rem; color: var(--text-muted); margin-left: auto; }

    /* === Modal === */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 1000;
      display: flex; align-items: center; justify-content: center; backdrop-filter: blur(3px);
    }
    .modal-panel {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
      width: 620px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--bg-card); z-index: 1;
    }
    .modal-header h3 { font-size: 1rem; }
    .modal-close {
      width: 30px; height: 30px; border: none; border-radius: var(--radius-sm);
      background: transparent; color: var(--text-secondary); cursor: pointer; font-size: 1.1rem;
    }
    .modal-close:hover { background: rgba(255,255,255,0.08); color: var(--text); }
    .modal-body { padding: 20px; }
    .modal-body .form-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px 16px;
    }
    .modal-body .form-grid .form-group { width: 100%; }
    .modal-body .form-grid .span-2 { grid-column: 1 / -1; }
    .modal-footer {
      display: flex; gap: 8px; padding: 12px 20px; border-top: 1px solid var(--border);
      justify-content: flex-end; position: sticky; bottom: 0; background: var(--bg-card);
    }

    /* Checkbox */
    .data-table input[type="checkbox"] { accent-color: var(--accent); }

    .log-line { padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .empty-hint { color: var(--text-muted); font-size: 0.85rem; text-align: center; padding: 20px; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>⚙ 管理后台</h1>
      <a href="/">← 返回看板</a>
    </div>

    <!-- 系统状态 -->
    <div class="card">
      <h2>📊 系统状态</h2>
      <div class="status-grid" id="statusGrid">
        <div class="status-item">
          <div class="label">服务状态</div>
          <div class="value status-ok">运行中</div>
        </div>
        <div class="status-item">
          <div class="label">DOCID</div>
          <div class="value" id="statusDocid">-</div>
        </div>
        <div class="status-item">
          <div class="label">API 连通</div>
          <div class="value" id="statusApi">检查中...</div>
        </div>
        <div class="status-item">
          <div class="label">子表数量</div>
          <div class="value" id="statusSheets">-</div>
        </div>
      </div>
      <button class="btn" onclick="refreshStatus()" style="margin-top:12px">🔄 刷新状态</button>
    </div>

    <!-- 一键初始化 -->
    <div class="card">
      <h2>🛠 创建智能表格</h2>
      <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:12px">
        通过 API 创建属于此应用的新表格，自动生成「温度记录」子表和字段。
      </p>
      <div class="form-row">
        <div class="form-group">
          <label>文档名称</label>
          <input class="form-input" id="docName" value="榴莲温度监控数据" style="width:240px">
        </div>
        <div class="form-group">
          <label>子表名称</label>
          <input class="form-input" id="sheetTitle" value="温度记录" style="width:160px">
        </div>
      </div>
      <button class="btn btn-primary" id="btnSetup" onclick="runSetup()">🚀 一键创建</button>
      <button class="btn btn-danger" id="btnStopSetup" onclick="stopSetup()" style="display:none">取消</button>
      <div class="output" id="setupOutput" style="display:none"></div>
    </div>

    <!-- 快捷操作 -->
    <div class="card">
      <h2>🔧 快捷操作</h2>
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        <button class="btn" onclick="doAction('schema/refresh', 'POST')">清除缓存</button>
        <button class="btn" onclick="viewTableStructure()">查看表格结构</button>
        <button class="btn" onclick="viewDashboardData()">查看看板数据</button>
        <button class="btn" onclick="testCallback()">测试回调接口</button>
      </div>
      <div id="actionOutputWrap" style="display:none;margin-top:12px"></div>
    </div>

    <!-- 记录管理 -->
    <div class="card">
      <h2>📋 记录管理</h2>
      <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:12px">
        查看、添加、编辑或删除温度记录
      </p>
      <div class="form-row">
        <div class="form-group">
          <label>目标子表</label>
          <select id="recSheetId" class="form-input" style="width:200px"></select>
        </div>
        <div class="form-group" style="align-self:flex-end">
          <label>&nbsp;</label>
          <button class="btn btn-primary" onclick="openAddModal()">➕ 添加记录</button>
        </div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px">
        <button class="btn" onclick="loadRecords()">📥 加载记录</button>
        <button class="btn btn-danger" onclick="deleteSelectedRecords()" id="btnDelRecords" disabled>🗑 删除选中</button>
        <span style="font-size:0.8rem;color:var(--text-muted);margin-left:auto;align-self:center" id="recCount"></span>
      </div>
      <div id="recViewWrap" style="display:none"></div>
    </div>

    <!-- 字段管理 -->
    <div class="card">
      <h2>🏷 字段管理</h2>
      <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:12px">
        查看字段信息、重命名字段标题
      </p>
      <div class="form-row">
        <div class="form-group">
          <label>目标子表</label>
          <select id="fldSheetId" class="form-input" style="width:200px" onchange="loadFields()"></select>
        </div>
      </div>
      <button class="btn" onclick="loadFields()">🔄 加载字段列表</button>
      <div class="output" id="fieldOutput" style="display:none"></div>
      <div id="fieldList" style="margin-top:8px"></div>
    </div>

    <!-- 视图管理 -->
    <div class="card">
      <h2>👁 视图管理</h2>
      <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:12px">
        查看、添加和删除表格视图
      </p>
      <div class="form-row">
        <div class="form-group">
          <label>目标子表</label>
          <select id="viewSheetId" class="form-input" style="width:200px" onchange="loadViews()"></select>
        </div>
        <div class="form-group">
          <label>新视图标题</label>
          <input class="form-input" id="viewTitle" placeholder="如：表格视图" style="width:160px">
        </div>
        <div class="form-group">
          <label>视图类型</label>
          <select id="viewType" class="form-input">
            <option value="VIEW_TYPE_GRID">表格视图</option>
            <option value="VIEW_TYPE_KANBAN">看板视图</option>
            <option value="VIEW_TYPE_GALLERY">画册视图</option>
            <option value="VIEW_TYPE_GANTT">甘特视图</option>
            <option value="VIEW_TYPE_CALENDAR">日历视图</option>
          </select>
        </div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        <button class="btn btn-primary" onclick="addView()">➕ 添加视图</button>
        <button class="btn" onclick="loadViews()">🔄 加载视图列表</button>
      </div>
      <div class="output" id="viewOutput" style="display:none"></div>
      <div id="viewList" style="margin-top:8px"></div>
    </div>

    <!-- 编组管理 -->
    <div class="card">
      <h2>📁 字段编组</h2>
      <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:12px">
        管理字段编组（折叠分组）
      </p>
      <div class="form-row">
        <div class="form-group">
          <label>目标子表</label>
          <select id="grpSheetId" class="form-input" style="width:200px" onchange="loadGroups()"></select>
        </div>
        <div class="form-group">
          <label>编组名称</label>
          <input class="form-input" id="grpName" placeholder="如：温度信息" style="width:160px">
        </div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        <button class="btn btn-primary" onclick="addGroup()">➕ 添加编组</button>
        <button class="btn" onclick="loadGroups()">🔄 加载编组列表</button>
      </div>
      <div class="output" id="groupOutput" style="display:none"></div>
      <div id="groupList" style="margin-top:8px"></div>
    </div>

    <!-- 文档操作 -->
    <div class="card">
      <h2>📄 文档操作</h2>
      <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:12px">
        当前文档管理操作
      </p>
      <div class="form-row">
        <div class="form-group">
          <label>新文档名称</label>
          <input class="form-input" id="newDocName" placeholder="重命名文档" style="width:240px">
        </div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        <button class="btn btn-primary" onclick="renameDocument()">✏ 重命名文档</button>
        <button class="btn" onclick="getDocumentInfo()">ℹ 查看文档信息</button>
        <button class="btn btn-danger" onclick="deleteDocument()">⚠ 删除当前文档</button>
      </div>
      <div class="output" id="docOutput" style="display:none"></div>
    </div>

    <!-- 模态框容器 -->
    <div id="modalContainer"></div>
  </div>

  <script>
    // ============ 全局状态 ============
    let cachedSheets = [];
    let cachedFields = [];
    let loadedRecords = [];
    let currentEditRecordId = null;

    // ============ 初始化 ============
    (async function init() {
      refreshStatus();
      await populateSheetSelects();
    })();

    async function refreshStatus() {
      try {
        const resp = await fetch('/api/config/info');
        const json = await resp.json();
        if (json.success && json.data) {
          document.getElementById('statusDocid').textContent = json.data.docid || '-';
          document.getElementById('statusSheets').textContent = json.data.sheets ? json.data.sheets.length : '0';
          document.getElementById('statusApi').textContent = '已连接';
          document.getElementById('statusApi').className = 'value status-ok';
        } else {
          document.getElementById('statusApi').textContent = '连接失败';
          document.getElementById('statusApi').className = 'value status-err';
          document.getElementById('statusDocid').textContent = '-';
          document.getElementById('statusSheets').textContent = '-';
        }
      } catch (e) {
        document.getElementById('statusApi').textContent = '连接失败';
        document.getElementById('statusApi').className = 'value status-err';
      }
    }

    // ============ 子表下拉框 ============
    async function ensureSheetsLoaded() {
      if (cachedSheets.length > 0) return cachedSheets;
      try {
        const resp = await fetch('/api/config/info');
        const json = await resp.json();
        if (json.success && json.data) {
          cachedSheets = json.data.sheets || [];
          cachedFields = [];
          cachedSheets.forEach(s => {
            (s.fields || []).forEach(f => { cachedFields.push(f); });
          });
        }
      } catch (e) { console.error(e); }
      return cachedSheets;
    }

    async function populateSheetSelects() {
      const sheets = await ensureSheetsLoaded();
      ['recSheetId', 'fldSheetId', 'viewSheetId', 'grpSheetId'].forEach(selId => {
        const sel = document.getElementById(selId);
        if (!sel) return;
        const currentVal = sel.value;
        sel.innerHTML = '<option value="">-- 选择子表 --</option>';
        sheets.forEach(s => {
          sel.innerHTML += `<option value="${s.sheet_id}">${s.title} (${s.sheet_id})</option>`;
        });
        // Auto-select if only one sheet
        if (sheets.length === 1 && (!currentVal || currentVal === '')) {
          sel.value = sheets[0].sheet_id;
          sel.dispatchEvent(new Event('change'));
        } else if (currentVal && sheets.find(s => s.sheet_id === currentVal)) {
          sel.value = currentVal;
        }
      });
    }

    // ============ 一键创建 ============
    async function runSetup() {
      const btn = document.getElementById('btnSetup');
      const out = document.getElementById('setupOutput');
      btn.disabled = true;
      btn.textContent = '⏳ 创建中...';
      out.style.display = 'block';
      out.className = 'output';
      out.textContent = '正在创建智能表格文档，请稍候...\n';

      try {
        const docName = document.getElementById('docName').value || '榴莲温度监控数据';
        const sheetTitle = document.getElementById('sheetTitle').value || '温度记录';
        const resp = await fetch('/api/setup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ docName, sheetTitle }),
        });
        const json = await resp.json();
        if (json.success) {
          out.className = 'output success';
          out.textContent = [
            '✅ 创建成功！', '',
            `📄 文档ID: ${json.data.docid}`,
            `🔗 文档链接: ${json.data.url}`,
            `📋 子表ID: ${json.data.sheetId}`,
            `📝 子表名: ${json.data.sheetTitle}`,
            '', '字段列表:',
            ...json.data.fields.map(f => `  • ${f.field_title} (${f.field_type}) - ${f.field_id}`),
            '', json.data.message,
          ].join('\n');
          refreshStatus();
          cachedSheets = [];
          await populateSheetSelects();
        } else {
          out.className = 'output error';
          out.textContent = '❌ 创建失败: ' + (json.error || '未知错误');
        }
      } catch (e) {
        out.className = 'output error';
        out.textContent = '❌ 请求异常: ' + e.message;
      } finally {
        btn.disabled = false;
        btn.textContent = '🚀 一键创建';
      }
    }

    function stopSetup() {}

    // ============ 快捷操作 ============
    async function doAction(path, method) {
      const wrap = document.getElementById('actionOutputWrap');
      wrap.style.display = 'block';
      wrap.innerHTML = `<div class="output">正在请求 ${method} /api/${path} ...</div>`;
      try {
        const opts = { method };
        if (method === 'POST') opts.headers = { 'Content-Type': 'application/json' };
        const resp = await fetch(`/api/${path}`, opts);
        const json = await resp.json();
        showWithToggle(wrap, json);
      } catch (e) {
        wrap.innerHTML = `<div class="output error">❌ 请求异常: ${e.message}</div>`;
      }
    }

    async function viewTableStructure() {
      const wrap = document.getElementById('actionOutputWrap');
      wrap.style.display = 'block';
      wrap.innerHTML = `<div class="output">正在加载表格结构...</div>`;
      try {
        const resp = await fetch('/api/config/info');
        const json = await resp.json();
        if (!json.success) throw new Error(json.error);
        // 展开为 子表-字段 二维表
        const rows = [];
        (json.data.sheets || []).forEach(sheet => {
          (sheet.fields || []).forEach(f => {
            let props = '-';
            if (f.property_number) props = `NUMBER(decimals:${f.property_number.decimal_places})`;
            else if (f.property_date_time) props = `DATE_TIME(${f.property_date_time.format})`;
            else if (f.property_single_select) props = `SELECT(options:${f.property_single_select.options?.length||0})`;
            else if (f.field_type) props = f.field_type.replace('FIELD_TYPE_','');
            rows.push({
              '子表': sheet.title,
              '子表ID': sheet.sheet_id,
              '字段ID': f.field_id,
              '字段标题': f.field_title,
              '字段类型': f.field_type ? f.field_type.replace('FIELD_TYPE_','') : '-',
              '属性': props,
            });
          });
        });
        showWithToggle(wrap, rows);
      } catch (e) {
        wrap.innerHTML = `<div class="output error">❌ ${e.message}</div>`;
      }
    }

    async function viewDashboardData() {
      const wrap = document.getElementById('actionOutputWrap');
      wrap.style.display = 'block';
      wrap.innerHTML = `<div class="output">正在加载看板数据...</div>`;
      try {
        const resp = await fetch('/api/dashboard?hours=720&limit=500');
        const json = await resp.json();
        if (!json.success) throw new Error(json.error);
        // 展平 records + stats
        const result = {
          stats: json.data.stats,
          alerts: json.data.alerts,
          records: json.data.records,
        };
        showWithToggle(wrap, result);
      } catch (e) {
        wrap.innerHTML = `<div class="output error">❌ ${e.message}</div>`;
      }
    }

    async function testCallback() {
      const wrap = document.getElementById('actionOutputWrap');
      wrap.style.display = 'block';
      try {

    function renderTableView(idBase, data) {
      const container = document.getElementById(idBase + '_table');
      if (!container) return;

      try {
        let rows = normalizeToRows(data);
        if (!rows || rows.length === 0) {
          container.innerHTML = '<p class="empty-hint">无数据</p>';
          return;
        }

        const keys = Object.keys(rows[0]);
        if (keys.length === 0) {
          container.innerHTML = '<p class="empty-hint">无列</p>';
          return;
        }

        const maxH = rows.length > 20 ? 'max-height:420px;' : '';
        let html = `<div class="data-table-wrap" style="${maxH}"><table class="data-table"><thead><tr>`;
        keys.forEach(k => { html += `<th>${escHtml(k)}</th>`; });
        html += '</tr></thead><tbody>';

        rows.forEach(row => {
          html += '<tr>';
          keys.forEach(k => {
            const v = row[k];
            let display = '';
            let cls = '';
            if (v === null || v === undefined) {
              display = '-';
              cls = 'cell-mono';
            } else if (typeof v === 'number') {
              display = String(v);
              cls = 'cell-num';
            } else if (typeof v === 'boolean') {
              display = v ? '✅' : '❌';
            } else if (typeof v === 'object') {
              display = escHtml(JSON.stringify(v));
              cls = 'cell-json';
            } else {
              display = escHtml(String(v));
            }
            html += `<td class="${cls}">${display}</td>`;
          });
          html += '</tr>';
        });

        html += '</tbody></table></div>';
        html += `<div class="view-label" style="margin-top:4px;font-size:0.75rem;color:var(--text-muted)">共 ${rows.length} 行 × ${keys.length} 列</div>`;
        container.innerHTML = html;
      } catch (e) {
        container.innerHTML = `<div class="output error">表格渲染失败: ${escHtml(e.message)}</div>`;
      }
    }

    function normalizeToRows(data) {
      // 尝试将任意 JSON 结构转为行数组
      if (Array.isArray(data)) {
        if (data.length === 0) return [];
        if (typeof data[0] === 'object' && data[0] !== null) return data;
        // 基本类型数组 → 包装为单列
        return data.map((v, i) => ({ '索引': i, '值': v }));
      }
      if (data && typeof data === 'object') {
        // 检查是否是 { records: [...], stats: {...} } 结构 → 优先展开 records
        if (Array.isArray(data.records)) return data.records;
        // 展平单层对象为键值对表
        const rows = [];
        Object.entries(data).forEach(([k, v]) => {
          if (Array.isArray(v)) {
            v.forEach((item, i) => {
              if (typeof item === 'object' && item !== null) {
                rows.push({ _key: k, _idx: i, ...item });
              } else {
                rows.push({ '键': k, '索引': i, '值': item });
              }
            });
          } else if (typeof v === 'object' && v !== null) {
            rows.push({ '键': k, ...flattenObj(v) });
          } else {
            rows.push({ '键': k, '值': v });
          }
        });
        if (rows.length > 0) return rows;
        // fallback: 展平对象
        return [flattenObj(data)];
      }
      return [{ '值': data }];
    }

    function flattenObj(obj, prefix = '') {
      const result = {};
      Object.entries(obj).forEach(([k, v]) => {
        const key = prefix ? `${prefix}.${k}` : k;
        if (v && typeof v === 'object' && !Array.isArray(v)) {
          Object.assign(result, flattenObj(v, key));
        } else {
          result[key] = v;
        }
      });
      return result;
    }

    function openEditModal(recordId) {

    function buildRecordForm(data) {
      let html = '<div class="form-grid">';
      RECORD_FIELDS.forEach(f => {
        const val = data[f.key];
        let inputHtml = '';
        if (f.type === 'datetime') {
          // 将 ISO / timestamp 转为 datetime-local 格式
          let dtVal = '';
          if (val) {
            try {
              const d = new Date(val);
              if (!isNaN(d.getTime())) {
                dtVal = d.toISOString().slice(0, 16); // yyyy-MM-ddTHH:mm
              }
            } catch(_){}
          }
          // 默认更新时间 = 当前
          if (!dtVal && f.key === 'updateTime') {
            dtVal = new Date().toISOString().slice(0, 16);
          }
          inputHtml = `<input class="form-input" id="mf_${f.key}" type="datetime-local" value="${dtVal}" style="width:100%">`;
        } else if (f.type === 'number') {
          const numVal = (val !== null && val !== undefined) ? val : '';
          inputHtml = `<input class="form-input" id="mf_${f.key}" type="number" step="0.1" value="${numVal}" placeholder="${f.placeholder}" style="width:100%">`;
        } else {
          const txtVal = val || '';
          inputHtml = `<input class="form-input" id="mf_${f.key}" type="text" value="${escAttr(txtVal)}" placeholder="${f.placeholder}" style="width:100%">`;
        }
        html += `<div class="form-group"><label>${f.label}</label>${inputHtml}</div>`;
      });
      html += '</div>';
      return html;
    }

    async function submitRecordForm() {
      const sheetId = document.getElementById('recSheetId').value;
      if (!sheetId) { alert('请先选择目标子表'); return; }

      // 收集表单值并转换为企业微信 API 格式
      const values = {};
      RECORD_FIELDS.forEach(f => {
        const el = document.getElementById('mf_' + f.key);
        if (!el) return;
        const raw = el.value;
        if (raw === '' || raw === null || raw === undefined) return;

        const title = FIELD_TITLE_MAP[f.key];
        if (!title) return;

        if (f.type === 'number') {
          const num = parseFloat(raw);
          if (!isNaN(num)) values[title] = num;
        } else if (f.type === 'datetime') {
          // datetime-local → ms timestamp string
          const d = new Date(raw);
          if (!isNaN(d.getTime())) values[title] = String(d.getTime());
        } else {
          if (raw.trim()) values[title] = [{ type: 'text', text: raw.trim() }];
        }
      });

      closeModal();

      const isEdit = !!currentEditRecordId;
      try {
        let resp, json;
        if (isEdit) {
          resp = await fetch('/api/smartsheet/records/update', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sheetId, records: [{ record_id: currentEditRecordId, values }] }),
          });
        } else {
          resp = await fetch('/api/smartsheet/records/add', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sheetId, records: [{ values }] }),
          });
        }
        json = await resp.json();
        if (json.success) {
          await clearCacheAndReload();
          loadRecords();
        } else {
          alert((isEdit ? '更新' : '添加') + '失败: ' + (json.error || json.errmsg || '未知错误'));
        }
      } catch (e) {
        alert('请求异常: ' + e.message);
      }
    }

      const sheetId = document.getElementById('viewSheetId').value;
      const viewTitle = document.getElementById('viewTitle').value.trim();
      const viewType = document.getElementById('viewType').value;
      const out = document.getElementById('viewOutput');
      out.style.display = 'block';
      if (!sheetId || !viewTitle) {
        out.className = 'output error';
        out.textContent = '❌ 请选择子表并输入视图标题';
        return;
      }
      out.className = 'output';
      out.textContent = '正在添加视图...\n';
      try {
        const resp = await fetch('/api/smartsheet/views/add', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sheetId, viewTitle, viewType }),
        });
        const json = await resp.json();
        out.className = json.success ? 'output success' : 'output error';
        out.textContent = json.success ? `✅ 视图已添加: ${JSON.stringify(json.data, null, 2)}` : `❌ ${json.error}`;
        if (json.success) { document.getElementById('viewTitle').value = ''; loadViews(); }
      } catch (e) {
        out.className = 'output error';
        out.textContent = '❌ 请求异常: ' + e.message;
      }
    }

    async function deleteViewById(viewId) {
      const sheetId = document.getElementById('viewSheetId').value;
      if (!confirm(`确定要删除视图 ${viewId} 吗？`)) return;
      const out = document.getElementById('viewOutput');
      out.style.display = 'block';
      out.className = 'output';
      out.textContent = '正在删除视图...\n';
      try {
        const resp = await fetch('/api/smartsheet/views/delete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sheetId, viewIds: [viewId] }),
        });
        const json = await resp.json();
        out.className = json.success ? 'output success' : 'output error';
        out.textContent = json.success ? `✅ ${json.message}` : `❌ ${json.error}`;
        if (json.success) loadViews();
      } catch (e) {
        out.className = 'output error';
        out.textContent = '❌ 请求异常: ' + e.message;
      }
    }

    // ============ 编组管理 ============
    async function loadGroups() {
      const sheetId = document.getElementById('grpSheetId').value;
      const out = document.getElementById('groupOutput');
      const list = document.getElementById('groupList');
      if (!sheetId) { list.innerHTML = ''; return; }
      out.style.display = 'block';
      out.className = 'output';
      out.textContent = '正在加载编组...\n';
      try {
        const resp = await fetch(`/api/smartsheet/groups?sheetId=${sheetId}`);
        const json = await resp.json();
        if (!json.success) throw new Error(json.error);
        const groups = json.data || [];
        list.innerHTML = groups.length === 0
          ? '<p style="color:var(--text-muted);font-size:0.85rem">无编组</p>'
          : `<table style="width:100%;font-size:0.82rem;border-collapse:collapse">
            <thead><tr style="color:var(--text-muted);text-align:left">
              <th>编组ID</th><th>名称</th><th>包含字段数</th><th>操作</th>
            </tr></thead>
            <tbody>${groups.map(g => `
              <tr style="border-top:1px solid var(--border)">
                <td style="padding:4px;font-family:monospace;font-size:0.75rem">${g.field_group_id}</td>
                <td>${g.name || '-'}</td>
                <td>${(g.children || []).length}</td>
                <td>
                  <button class="btn btn-sm" onclick="renameGroup('${g.field_group_id}','${(g.name || '').replace(/'/g, "\\'")}')">重命名</button>
                  <button class="btn btn-sm btn-danger" onclick="deleteGroupById('${g.field_group_id}')">删除</button>
                </td>
              </tr>
            `).join('')}</tbody></table>`;
        out.className = 'output success';
        out.textContent = `✅ 已加载 ${groups.length} 个编组`;
      } catch (e) {
        out.className = 'output error';
        out.textContent = '❌ ' + e.message;
      }
    }

    async function addGroup() {
      const sheetId = document.getElementById('grpSheetId').value;
      const name = document.getElementById('grpName').value.trim();
      const out = document.getElementById('groupOutput');
      out.style.display = 'block';
      if (!sheetId || !name) {
        out.className = 'output error';
        out.textContent = '❌ 请选择子表并输入编组名称';
        return;
      }
      out.className = 'output';
      out.textContent = '正在添加编组...\n';
      try {
        const resp = await fetch('/api/smartsheet/groups/add', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sheetId, name }),
        });
        const json = await resp.json();
        out.className = json.success ? 'output success' : 'output error';
        out.textContent = json.success ? `✅ 编组已添加: ${JSON.stringify(json.data, null, 2)}` : `❌ ${json.error}`;
        if (json.success) { document.getElementById('grpName').value = ''; loadGroups(); }
      } catch (e) {
        out.className = 'output error';
        out.textContent = '❌ 请求异常: ' + e.message;
      }
    }

    async function renameGroup(groupId, oldName) {
      const sheetId = document.getElementById('grpSheetId').value;
      const newName = prompt(`重命名编组「${oldName}」为：`, oldName);
      if (!newName || newName === oldName) return;
      const out = document.getElementById('groupOutput');
      out.style.display = 'block';
      out.className = 'output';
      out.textContent = '正在更新编组...\n';
      try {
        const resp = await fetch('/api/smartsheet/groups/update', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sheetId, fieldGroupId: groupId, name: newName }),
        });
        const json = await resp.json();
        out.className = json.success ? 'output success' : 'output error';
        out.textContent = json.success ? `✅ 编组已重命名` : `❌ ${json.error}`;
        if (json.success) loadGroups();
      } catch (e) {
        out.className = 'output error';
        out.textContent = '❌ 请求异常: ' + e.message;
      }
    }

    async function deleteGroupById(groupId) {
      const sheetId = document.getElementById('grpSheetId').value;
      if (!confirm(`确定要删除编组 ${groupId} 吗？`)) return;
      const out = document.getElementById('groupOutput');
      out.style.display = 'block';
      out.className = 'output';
      out.textContent = '正在删除编组...\n';
      try {
        const resp = await fetch('/api/smartsheet/groups/delete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sheetId, fieldGroupId: groupId }),
        });
        const json = await resp.json();
        out.className = json.success ? 'output success' : 'output error';
        out.textContent = json.success ? `✅ ${json.message}` : `❌ ${json.error}`;
        if (json.success) loadGroups();
      } catch (e) {
        out.className = 'output error';
        out.textContent = '❌ 请求异常: ' + e.message;
      }
    }

    // ============ 文档操作 ============
    async function renameDocument() {
      const newName = document.getElementById('newDocName').value.trim();
      const out = document.getElementById('docOutput');
      out.style.display = 'block';
      if (!newName) {
        out.className = 'output error';
        out.textContent = '❌ 请输入新文档名称';
        return;
      }
      out.className = 'output';
      out.textContent = '正在重命名文档...\n';
      try {
        const resp = await fetch('/api/doc/rename', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ newName }),
        });
        const json = await resp.json();
        out.className = json.success ? 'output success' : 'output error';
        out.textContent = json.success ? `✅ 文档已重命名为「${newName}」` : `❌ ${json.error}`;
      } catch (e) {
        out.className = 'output error';
        out.textContent = '❌ 请求异常: ' + e.message;
      }
    }

    async function getDocumentInfo() {
      const out = document.getElementById('docOutput');
      out.style.display = 'block';
      out.className = 'output';
      out.textContent = '正在获取文档信息...\n';
      try {
        const resp = await fetch('/api/doc/info');
        const json = await resp.json();
        out.className = json.success ? 'output success' : 'output error';
        out.textContent = json.success ? JSON.stringify(json.data, null, 2) : `❌ ${json.error}`;
      } catch (e) {
        out.className = 'output error';
        out.textContent = '❌ 请求异常: ' + e.message;
      }
    }

    async function deleteDocument() {
      if (!confirm('⚠️ 确定要删除当前文档吗？\n\n这将永久删除该智能表格文档及其所有数据！\n建议先备份重要数据。')) return;
      if (!confirm('再次确认：真的要删除吗？')) return;
      const out = document.getElementById('docOutput');
      out.style.display = 'block';
      out.className = 'output';
      out.textContent = '正在删除文档...\n';
      try {
        const resp = await fetch('/api/doc/delete', { method: 'POST' });
        const json = await resp.json();
        out.className = json.success ? 'output success' : 'output error';
        out.textContent = json.success ? `✅ ${json.message}` : `❌ ${json.error}`;
        if (json.success) refreshStatus();
      } catch (e) {
        out.className = 'output error';
        out.textContent = '❌ 请求异常: ' + e.message;
      }
    }

    // ============ 工具函数 ============
    function escHtml(str) {
      if (!str && str !== 0) return '';
      const div = document.createElement('div');
      div.textContent = String(str);
      return div.innerHTML;
    }

    function escAttr(str) {
      return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/'/g, '&#39;');
    }

    function formatTime(t) {
      if (!t) return '-';
      try {
        const d = new Date(t);
        if (isNaN(d.getTime())) return String(t);
        return d.toLocaleString('zh-CN', {
          month: '2-digit', day: '2-digit',
          hour: '2-digit', minute: '2-digit',
          hour12: false,
        });
      } catch (_) { return String(t); }
    }

    async function clearCacheAndReload() {
      try {
        await fetch('/api/schema/refresh', { method: 'POST' });
        cachedSheets = [];
        await ensureSheetsLoaded();
        await populateSheetSelects();
      } catch (e) { /* ignore */ }
    }
  </script>
