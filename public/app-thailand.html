<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>泰国运输大屏 · THAILAND IN-TRANSIT BOARD</title>
<style>
:root{--bg:#07100f;--panel:#101a1a;--panel2:#152321;--line:rgba(139,173,160,.22);--line2:rgba(210,226,218,.13);--text:#f2fbf7;--muted:#a9bdb4;--faint:#72877e;--gold:#d8bd77;--teal:#75b8ad;--blue:#86a8c7;--red:#d88989;--orange:#d0a36f;--shadow:0 18px 52px rgba(0,0,0,.32)}
*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",sans-serif}body{overflow:hidden}.num{font-variant-numeric:tabular-nums;font-weight:900}
.shell{height:100vh;display:grid;grid-template-rows:64px 1fr;gap:10px;padding:12px;background:radial-gradient(circle at 12% 0%,rgba(117,184,173,.14),transparent 30%),radial-gradient(circle at 82% 8%,rgba(216,189,119,.1),transparent 28%),linear-gradient(135deg,#07100f 0%,#0d1818 56%,#0a1114 100%)}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:18px;border:1px solid var(--line);background:rgba(16,26,26,.84);border-radius:8px;padding:0 16px;box-shadow:var(--shadow);min-width:0}.brand{display:flex;align-items:center;gap:13px;min-width:0}.mark{width:42px;height:42px;border-radius:8px;border:1px solid rgba(216,189,119,.38);background:rgba(216,189,119,.08);display:grid;place-items:center;color:var(--gold);font-weight:950}.brand h1{margin:0;font-size:22px;letter-spacing:0}.brand p{margin:3px 0 0;font-size:11px;color:var(--muted)}.actions{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:12px;white-space:nowrap}.pill{border:1px solid var(--line);border-radius:999px;padding:7px 10px;background:rgba(10,17,20,.58)}.clock{display:flex;flex-direction:column;align-items:flex-end;line-height:1.05}.clock strong{font-size:18px;color:var(--text)}.userbar{display:flex;align-items:center;gap:8px}.userbar a{color:var(--text);border:1px solid var(--line);border-radius:6px;padding:5px 8px;text-decoration:none;cursor:pointer}
.dashboard{min-height:0;display:grid;grid-template-columns:1.08fr .92fr;gap:10px}.panel{min-width:0;min-height:0;border:1px solid var(--line);background:linear-gradient(180deg,rgba(21,35,33,.84),rgba(16,26,26,.9));border-radius:8px;box-shadow:var(--shadow);padding:12px;overflow:hidden;display:grid;grid-template-rows:42px auto 1fr}.panel-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.panel-title{font-size:17px;font-weight:950}.panel-note{margin-top:3px;font-size:10px;color:var(--faint)}.panel button{border:0;background:none;color:var(--gold);cursor:pointer;padding:0;font:inherit;font-size:12px}
.stage-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin:10px 0}.stage{border:1px solid var(--line2);border-radius:7px;background:rgba(10,17,20,.5);padding:10px;cursor:pointer;min-width:0}.stage .label{font-size:11px;color:var(--faint)}.stage .value{margin-top:6px;font-size:30px;line-height:1}.stage .hint{margin-top:5px;color:var(--muted);font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.stage.overseas{border-top:2px solid var(--blue)}.stage.port{border-top:2px solid var(--gold)}.stage.domestic{border-top:2px solid var(--teal)}
.status-list{min-height:0;overflow:auto;display:grid;gap:8px;padding-right:4px}.status-list::-webkit-scrollbar,.gantt-body::-webkit-scrollbar,.modal-body::-webkit-scrollbar{width:5px;height:5px}.status-list::-webkit-scrollbar-thumb,.gantt-body::-webkit-scrollbar-thumb,.modal-body::-webkit-scrollbar-thumb{background:rgba(139,173,160,.32);border-radius:999px}.status-section{border:1px solid var(--line2);border-radius:8px;background:rgba(10,17,20,.44);overflow:hidden}.status-title{display:grid;grid-template-columns:minmax(80px,1fr) auto;gap:8px;align-items:center;padding:9px 10px;border-bottom:1px solid var(--line2);font-size:13px;font-weight:950}.status-title span{color:var(--muted);font-size:11px;font-weight:800}.container-row{display:grid;grid-template-columns:116px minmax(90px,1fr) 72px 78px 58px;gap:8px;align-items:center;padding:8px 10px;border-bottom:1px solid var(--line2);cursor:pointer}.container-row:last-child{border-bottom:0}.container-no{font-size:13px;font-weight:950;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.container-location{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.container-meta,.container-days,.temp-state{font-size:10px;color:var(--faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.temp-state{color:var(--teal)}.temp-state.missing{color:var(--red)}.container-days{text-align:right;color:var(--gold)}
.temp-strip{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin:10px 0}.mini{border:1px solid var(--line2);border-radius:7px;background:rgba(10,17,20,.5);padding:8px;min-width:0}.mini .label{font-size:9px;color:var(--faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.mini .value{margin-top:4px;font-size:18px;line-height:1}.gantt{min-height:0;display:grid;grid-template-rows:25px 1fr;border-top:1px solid var(--line2);padding-top:8px}.gantt-head,.gantt-row{display:grid;grid-template-columns:104px repeat(7,minmax(34px,1fr));gap:5px;align-items:center}.gantt-head{font-size:10px;color:var(--faint)}.gantt-body{min-height:0;overflow:auto;display:grid;gap:6px}.gantt-label{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.gantt-cell{height:23px;border-radius:5px;background:rgba(114,135,126,.24);border:1px solid rgba(210,226,218,.08);cursor:pointer}.gantt-cell.none{opacity:.42}.gantt-cell.ok{background:linear-gradient(180deg,rgba(117,184,173,.88),rgba(86,158,176,.72))}.gantt-cell.warn{background:linear-gradient(180deg,rgba(225,177,98,.92),rgba(190,130,72,.78))}.gantt-cell.alarm{background:linear-gradient(180deg,rgba(226,126,132,.92),rgba(178,75,88,.8))}.gantt-cell.missing{background:linear-gradient(180deg,rgba(216,137,137,.45),rgba(150,72,82,.62));border-color:rgba(216,137,137,.62)}.empty{border:1px dashed var(--line);border-radius:7px;padding:18px;text-align:center;color:var(--muted);font-size:12px}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.58);display:none;align-items:center;justify-content:center;padding:28px;z-index:20}.modal-backdrop.open{display:flex}.modal{width:min(980px,94vw);height:min(680px,86vh);background:var(--panel2);border:1px solid var(--line);border-radius:10px;box-shadow:0 30px 80px rgba(0,0,0,.45);display:grid;grid-template-rows:54px 1fr}.modal-head{display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid var(--line)}.modal-title{font-size:16px;font-weight:950}.modal-close{border:1px solid var(--line);background:rgba(10,17,20,.72);color:var(--text);border-radius:7px;padding:7px 10px;cursor:pointer}.modal-body{overflow:auto;padding:14px}.data-table{width:100%;border-collapse:collapse;font-size:12px}.data-table th,.data-table td{border-bottom:1px solid var(--line2);padding:8px;text-align:left;white-space:nowrap}.data-table th{color:var(--muted);font-weight:850}.data-table td{color:var(--text)}
@media (max-width:1080px){body{overflow:auto}.shell{height:auto;min-height:100vh}.dashboard{grid-template-columns:1fr}.panel{min-height:430px}.container-row{grid-template-columns:104px minmax(80px,1fr) 64px 70px 54px}}
</style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="brand">
      <div class="mark">TH</div>
      <div><h1>泰国运输大屏</h1><p>国外在途、口岸等待、国内在途与温度甘特</p></div>
    </div>
    <div class="actions">
      <div class="pill" id="refreshState">正在加载</div>
      <div class="clock"><span id="dateDisplay"></span><strong id="clockDisplay"></strong></div>
      <div class="userbar" id="userbar"></div>
    </div>
  </header>
  <main class="dashboard">
    <section class="panel" id="logisticsPanel" aria-label="泰国在途状态"></section>
    <section class="panel" id="temperaturePanel" aria-label="泰国温度甘特"></section>
  </main>
</div>
<div class="modal-backdrop" id="detailModal">
  <div class="modal">
    <div class="modal-head"><div class="modal-title" id="modalTitle">明细</div><button class="modal-close" id="modalClose">关闭</button></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>
<script>
const API='';
const STAGES=[
  {key:'overseasTransit',label:'国外在途',klass:'overseas',hint:'已发货未到岸'},
  {key:'onShore',label:'口岸等待',klass:'port',hint:'已到岸未国内发货'},
  {key:'domesticTransit',label:'国内在途',klass:'domestic',hint:'国内发货后未签收'},
];
let state={user:null,model:null};
const labels={orderNo:'订单号',country:'国家',factory:'工厂',containerNo:'柜号',brand:'品牌',category:'品类',statusText:'位置',shipDate:'发货日期',arrivalDate:'到岸日期',domesticShipDate:'国内发货',signedDate:'签收日期',dwellDays:'停留天数',setTemp:'设定温度',returnTemp:'回风温度',deviation:'温差',recordedAt:'记录时间',note:'备注',location:'位置',temperatureStatusText:'温度状态'};
function $(id){return document.getElementById(id)}
function esc(value){return String(value==null?'-':value).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function num(value){const n=Number(value||0);return Number.isFinite(n)?n:0}
function pad(n){return String(n).padStart(2,'0')}
function dateKey(value){if(!value)return '';const s=String(value).trim();if(/^\d{2}-\d{2}-\d{2}/.test(s))return `20${s.slice(0,8)}`;const d=new Date(value);if(Number.isNaN(d.getTime()))return s.slice(0,10);return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}
function gotoLogin(){location.href='/login?redirect='+encodeURIComponent(location.pathname)}
async function api(path){const res=await fetch(API+path,{cache:'no-store'});if(res.status===401){gotoLogin();throw new Error('未登录')}const json=await res.json();if(!res.ok||json.success===false)throw new Error(json.error||'加载失败');return json.data||json}
function tick(){const d=new Date();const w=['日','一','二','三','四','五','六'];$('dateDisplay').textContent=`${d.getMonth()+1}/${d.getDate()} 周${w[d.getDay()]}`;$('clockDisplay').textContent=`${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`}
function renderUser(user){const name=user.displayName||user.username||'-';const canAdmin=user.role==='admin'||(user.permissions||[]).length>0;$('userbar').innerHTML=`<span>${esc(name)}</span>${canAdmin?'<a href="/admin">后台</a>':''}<a id="btnLogout">退出</a>`;$('btnLogout').onclick=async()=>{try{await fetch('/api/auth/logout',{method:'POST'})}catch(_){}gotoLogin()}}
function rowTable(rows,columns){return rows.length?`<table class="data-table"><thead><tr>${columns.map(c=>`<th>${esc(labels[c]||c)}</th>`).join('')}</tr></thead><tbody>${rows.map(row=>`<tr>${columns.map(c=>`<td>${esc(row[c])}</td>`).join('')}</tr>`).join('')}</tbody></table>`:'<div class="empty">暂无数据</div>'}
function resolveDrill(path){const parts=String(path||'').split('.');let cur=state.model&&state.model.drilldowns;for(const part of parts){if(cur==null)return null;cur=cur[part]}return cur}
function openDetail(title,rows,columns){$('modalTitle').textContent=`${title} · ${rows.length}条`;$('modalBody').innerHTML=rowTable(rows,columns);$('detailModal').classList.add('open')}
function openDrill(path){const data=resolveDrill(path);if(!data)return;openDetail(data.title||'明细',Array.isArray(data.rows)?data.rows:[],data.columns||Object.keys((data.rows||[])[0]||{}))}
function closeDetail(){$('detailModal').classList.remove('open')}
function transitRows(model,key){const group=model.drilldowns&&model.drilldowns.bottlenecks&&model.drilldowns.bottlenecks[key];return group&&Array.isArray(group.rows)?group.rows:[]}
function activeTransitRows(model){return STAGES.flatMap(stage=>transitRows(model,stage.key))}
function locationText(row){return row.location||row.currentLocation||row.port||row.statusText||'-'}
function renderLogistics(model){const total=activeTransitRows(model).length;$('logisticsPanel').innerHTML=`<div class="panel-head"><div><div class="panel-title">泰国在途状态</div><div class="panel-note">只保留国外在途、口岸等待、国内在途</div></div><button id="allTransit">全部 ${total}</button></div><div class="stage-grid">${STAGES.map(stage=>{const rows=transitRows(model,stage.key);const longest=Math.max(0,...rows.map(row=>num(row.dwellDays)));return `<div class="stage ${stage.klass}" data-stage="${stage.key}"><div class="label">${stage.label}</div><div class="value num">${rows.length}</div><div class="hint">${stage.hint} · 最久 ${longest} 天</div></div>`}).join('')}</div><div class="status-list">${STAGES.map(stage=>{const rows=transitRows(model,stage.key);return `<section class="status-section"><div class="status-title">${stage.label}<span>${rows.length}柜</span></div>${rows.length?rows.map(row=>{const tempText=row.temperatureStatusText||(row.missingTemperature?'温度缺失':'--');return `<div class="container-row" data-container="${esc(row.containerNo)}" data-stage="${stage.key}"><div class="container-no">${esc(row.containerNo)}</div><div class="container-location">位置：${esc(locationText(row))}</div><div class="container-meta">${esc(row.factory||row.brand||row.orderNo||'-')}</div><div class="temp-state ${row.missingTemperature?'missing':''}">${esc(tempText)}</div><div class="container-days">${esc(row.dwellDays||0)}天</div></div>`}).join(''):'<div class="empty">暂无'+stage.label+'柜</div>'}</section>`}).join('')}</div>`;$('allTransit').onclick=()=>openDetail('泰国在途柜明细',activeTransitRows(model),['containerNo','orderNo','factory','category','statusText','location','temperatureStatusText','dwellDays','shipDate','arrivalDate','domesticShipDate']);$('logisticsPanel').querySelectorAll('[data-stage]').forEach(el=>el.onclick=()=>openDrill(`bottlenecks.${el.dataset.stage}`));$('logisticsPanel').querySelectorAll('[data-container]').forEach(el=>el.onclick=()=>openDrill(`byContainer.${el.dataset.container}`))}
function overseasTransitRows(model){return transitRows(model,'overseasTransit')}
function backendGanttRows(model){return (model.temperature&&model.temperature.gantt&&Array.isArray(model.temperature.gantt.rows))?model.temperature.gantt.rows:[]}
function activeTemperatureContainers(model){return new Set([...overseasTransitRows(model).map(row=>row.containerNo),...backendGanttRows(model).map(row=>row.containerNo)].filter(Boolean))}
function temperatureMatchesTransit(row,temp){return row.containerNo===temp.containerNo&&dateKey(row.shipDate)===dateKey(temp.releaseDate)}
function thailandTemperatureDetails(model){const details=(model.temperature&&model.temperature.details)||[];const overseas=overseasTransitRows(model);const ganttSet=new Set(backendGanttRows(model).map(row=>row.containerNo).filter(Boolean));return details.filter(temp=>overseas.some(row=>temperatureMatchesTransit(row,temp))||ganttSet.has(temp.containerNo))}
function buildGanttRows(model){const gantt=model.temperature&&model.temperature.gantt;if(gantt&&Array.isArray(gantt.rows)&&gantt.rows.length)return {days:gantt.days||[],rows:gantt.rows.slice(0,12)};const days=(gantt&&gantt.days)||[];const rows=overseasTransitRows(model).slice(0,12);return {days,rows:rows.map(row=>({containerNo:row.containerNo,brand:row.brand,missing:true,cells:days.map((day,idx)=>({date:day.key,level:idx===days.length-1?'missing':'none',returnTemp:null,setTemp:null,deviation:null,statusText:idx===days.length-1?'温度缺失':''}))}))}}
function openGanttContainer(containerNo){const temp=resolveDrill(`temperatureByContainer.${containerNo}`);if(temp&&Array.isArray(temp.rows)&&temp.rows.length){openDrill(`temperatureByContainer.${containerNo}`);return}openDrill(`byContainer.${containerNo}`)}
function renderTemperature(model){const details=thailandTemperatureDetails(model);const overseas=overseasTransitRows(model);const gantt=buildGanttRows(model);const missingCount=gantt.rows.filter(row=>row.missing||(row.cells||[]).some(cell=>cell.level==='missing')).length;const alarmCount=details.filter(row=>row.status==='ALARM').length;const warnCount=details.filter(row=>row.status==='WARN').length;$('temperaturePanel').innerHTML=`<div class="panel-head"><div><div class="panel-title">温度甘特图</div><div class="panel-note">只展示国外在途柜；到岸和国内在途不再更新温度</div></div><button id="tempDetails">温度明细</button></div><div class="temp-strip"><div class="mini"><div class="label">国外在途</div><div class="value num">${overseas.length}</div></div><div class="mini"><div class="label">温度记录</div><div class="value num">${details.length}</div></div><div class="mini"><div class="label">缺温柜</div><div class="value num">${missingCount}</div></div><div class="mini"><div class="label">异常/预警</div><div class="value num">${alarmCount}/${warnCount}</div></div></div><div class="gantt" id="ganttGrid"><div class="gantt-head"><span>柜号</span>${gantt.days.map(day=>`<span>${esc(day.label)}</span>`).join('')}</div><div class="gantt-body">${gantt.rows.length?gantt.rows.map(row=>`<div class="gantt-row" data-container="${esc(row.containerNo)}"><div class="gantt-label">${esc(row.containerNo)}</div>${row.cells.map(cell=>`<div class="gantt-cell ${esc(cell.level)}" title="${esc(cell.date)} ${esc(cell.statusText||'')} 回风 ${esc(cell.returnTemp||'-')} 设定 ${esc(cell.setTemp||'-')}"></div>`).join('')}</div>`).join(''):'<div class="empty">暂无泰国国外在途柜</div>'}</div></div>`;$('tempDetails').onclick=()=>openDetail('泰国国外在途温度明细',details,['containerNo','brand','setTemp','returnTemp','deviation','statusText','recordedAt','note']);$('temperaturePanel').querySelectorAll('[data-container]').forEach(el=>el.onclick=()=>openGanttContainer(el.dataset.container))}
async function load(){try{$('refreshState').textContent='正在加载';const [user,executive]=await Promise.all([api('/api/auth/me'),api('/api/overview-executive?country=%E6%B3%B0%E5%9B%BD')]);state.user=user;state.model=executive;renderUser(user);renderLogistics(executive);renderTemperature(executive);$('refreshState').textContent='已更新 '+new Date().toLocaleTimeString('zh-CN',{hour12:false})}catch(err){console.warn(err);$('refreshState').textContent=err.message||'加载失败';$('logisticsPanel').innerHTML='<div class="empty">泰国大屏加载失败，请稍后刷新</div>'}}
$('modalClose').onclick=closeDetail;$('detailModal').onclick=e=>{if(e.target.id==='detailModal')closeDetail()};setInterval(tick,1000);tick();load();setInterval(load,60000);
</script>
</body>
</html>
