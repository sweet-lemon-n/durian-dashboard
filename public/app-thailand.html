<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>泰国运输大屏 · THAILAND TRANSPORT BOARD</title>
<style>
:root{--bg:#07100f;--panel:#101a1a;--panel2:#152321;--line:rgba(139,173,160,.2);--line2:rgba(210,226,218,.12);--text:#f2fbf7;--muted:#a9bdb4;--faint:#72877e;--gold:#d8bd77;--green:#7fbd91;--teal:#75b8ad;--blue:#86a8c7;--red:#d88989;--orange:#d0a36f;--shadow:0 18px 52px rgba(0,0,0,.32)}
*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",sans-serif}body{overflow:hidden}.num{font-variant-numeric:tabular-nums;font-weight:900}
.shell{height:100vh;display:grid;grid-template-rows:64px 1fr;gap:10px;padding:12px;background:radial-gradient(circle at 12% 0%,rgba(127,189,145,.14),transparent 30%),radial-gradient(circle at 80% 10%,rgba(216,189,119,.1),transparent 28%),linear-gradient(135deg,#07100f 0%,#0d1818 56%,#0a1114 100%)}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:18px;border:1px solid var(--line);background:rgba(16,26,26,.84);border-radius:8px;padding:0 16px;box-shadow:var(--shadow);min-width:0}.brand{display:flex;align-items:center;gap:13px;min-width:0}.mark{width:42px;height:42px;border-radius:8px;border:1px solid rgba(216,189,119,.38);background:rgba(216,189,119,.08);display:grid;place-items:center;color:var(--gold);font-weight:950}.brand h1{margin:0;font-size:22px;letter-spacing:0}.brand p{margin:3px 0 0;font-size:11px;color:var(--muted)}.actions{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:12px;white-space:nowrap}.pill{border:1px solid var(--line);border-radius:999px;padding:7px 10px;background:rgba(10,17,20,.58)}.clock{display:flex;flex-direction:column;align-items:flex-end;line-height:1.05}.clock strong{font-size:18px;color:var(--text)}.userbar{display:flex;align-items:center;gap:8px}.userbar a{color:var(--text);border:1px solid var(--line);border-radius:6px;padding:5px 8px;text-decoration:none;cursor:pointer}
.dashboard{min-height:0;display:grid;grid-template-columns:1.02fr 1fr 1.18fr;gap:10px}.panel{min-width:0;min-height:0;border:1px solid var(--line);background:linear-gradient(180deg,rgba(21,35,33,.84),rgba(16,26,26,.88));border-radius:8px;box-shadow:var(--shadow);padding:12px;overflow:hidden;display:grid;grid-template-rows:40px auto 1fr}.panel-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.panel-title{font-size:16px;font-weight:950}.panel-note{margin-top:3px;font-size:10px;color:var(--faint)}.panel button{border:0;background:none;color:var(--gold);cursor:pointer;padding:0;font:inherit;font-size:12px}
.metric-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin:10px 0}.metric{border:1px solid var(--line2);background:rgba(10,17,20,.5);border-radius:7px;padding:10px;min-width:0}.metric .label{font-size:10px;color:var(--faint)}.metric .value{margin-top:5px;font-size:28px;line-height:1}.metric.gold{--accent:var(--gold)}.metric.green{--accent:var(--green)}.metric.teal{--accent:var(--teal)}.metric.blue{--accent:var(--blue)}.metric{border-top:2px solid var(--accent,var(--line))}
.table-wrap{min-height:0;overflow:auto;border-top:1px solid var(--line2);padding-top:8px}.table-wrap::-webkit-scrollbar,.gantt-body::-webkit-scrollbar,.transit-list::-webkit-scrollbar,.modal-body::-webkit-scrollbar{width:5px;height:5px}.table-wrap::-webkit-scrollbar-thumb,.gantt-body::-webkit-scrollbar-thumb,.transit-list::-webkit-scrollbar-thumb,.modal-body::-webkit-scrollbar-thumb{background:rgba(139,173,160,.32);border-radius:999px}.data-table{width:100%;border-collapse:collapse;font-size:11px}.data-table th,.data-table td{border-bottom:1px solid var(--line2);padding:7px 6px;text-align:left;white-space:nowrap}.data-table th{color:var(--muted);font-weight:850}.data-table td{color:var(--text)}
.transit-summary{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin:10px 0}.stage{border:1px solid var(--line2);border-radius:7px;background:rgba(10,17,20,.5);padding:9px;cursor:pointer}.stage .label{font-size:10px;color:var(--faint)}.stage .value{margin-top:4px;font-size:23px}.stage.overseas{border-top:2px solid var(--blue)}.stage.onshore{border-top:2px solid var(--gold)}.stage.domestic{border-top:2px solid var(--teal)}
.transit-list{min-height:0;overflow:auto;display:grid;gap:7px}.transit-card{border:1px solid var(--line2);background:rgba(10,17,20,.5);border-radius:7px;padding:9px;cursor:pointer}.transit-top{display:flex;justify-content:space-between;gap:10px;font-size:12px;font-weight:900}.transit-meta{margin-top:5px;font-size:10px;color:var(--faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.bar{height:6px;border-radius:999px;background:rgba(114,135,126,.3);overflow:hidden;margin-top:7px}.bar span{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--blue),var(--teal),var(--gold))}
.temp-strip{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin:10px 0}.mini{border:1px solid var(--line2);border-radius:7px;background:rgba(10,17,20,.5);padding:8px}.mini .label{font-size:9px;color:var(--faint)}.mini .value{margin-top:4px;font-size:18px}.gantt{min-height:0;display:grid;grid-template-rows:25px 1fr;border-top:1px solid var(--line2);padding-top:8px}.gantt-head,.gantt-row{display:grid;grid-template-columns:96px repeat(7,minmax(34px,1fr));gap:5px;align-items:center}.gantt-head{font-size:10px;color:var(--faint)}.gantt-body{min-height:0;overflow:auto;display:grid;gap:6px}.gantt-label{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.gantt-cell{height:22px;border-radius:5px;background:rgba(114,135,126,.24);border:1px solid rgba(210,226,218,.08);cursor:pointer}.gantt-cell.none{opacity:.4}.gantt-cell.ok{background:linear-gradient(180deg,rgba(127,189,145,.82),rgba(80,137,101,.7))}.gantt-cell.warn{background:linear-gradient(180deg,rgba(208,163,111,.88),rgba(160,118,75,.76))}.gantt-cell.alarm{background:linear-gradient(180deg,rgba(216,137,137,.9),rgba(162,82,86,.78))}.empty{border:1px dashed var(--line);border-radius:7px;padding:18px;text-align:center;color:var(--muted);font-size:12px}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.58);display:none;align-items:center;justify-content:center;padding:28px;z-index:20}.modal-backdrop.open{display:flex}.modal{width:min(980px,94vw);height:min(680px,86vh);background:var(--panel2);border:1px solid var(--line);border-radius:10px;box-shadow:0 30px 80px rgba(0,0,0,.45);display:grid;grid-template-rows:54px 1fr}.modal-head{display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid var(--line)}.modal-title{font-size:16px;font-weight:950}.modal-close{border:1px solid var(--line);background:rgba(10,17,20,.72);color:var(--text);border-radius:7px;padding:7px 10px;cursor:pointer}.modal-body{overflow:auto;padding:14px}
@media (max-width:1080px){body{overflow:auto}.shell{height:auto;min-height:100vh}.dashboard{grid-template-columns:1fr}.panel{min-height:430px}}
</style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="brand">
      <div class="mark">TH</div>
      <div><h1>泰国运输大屏</h1><p>只看泰国订单、物流在途、温度甘特</p></div>
    </div>
    <div class="actions">
      <div class="pill" id="refreshState">正在加载</div>
      <div class="clock"><span id="dateDisplay"></span><strong id="clockDisplay"></strong></div>
      <div class="userbar" id="userbar"></div>
    </div>
  </header>
  <main class="dashboard">
    <section class="panel" id="orderPanel" aria-label="泰国订单数据"></section>
    <section class="panel" id="logisticsPanel" aria-label="泰国物流在途"></section>
    <section class="panel" id="temperaturePanel" aria-label="泰国温度甘特"></section>
  </main>
</div>
<div class="modal-backdrop" id="detailModal">
  <div class="modal">
    <div class="modal-head"><div class="modal-title" id="modalTitle">明细</div><button class="modal-close" id="modalClose">关闭</button></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>
<script>
const API='';
const COUNTRY='泰国';
let state={user:null,model:null};
const labels={orderNo:'订单号',country:'国家',factory:'工厂',freshBoxes:'鲜果柜数',frozenBoxes:'冻果柜数',totalBoxes:'总柜数',containerNo:'柜号',brand:'品牌',category:'品类',statusText:'当前状态',shipDate:'发货日期',arrivalDate:'到岸日期',domesticShipDate:'国内发货',signedDate:'签收日期',dwellDays:'停留天数',setTemp:'设定温度',returnTemp:'回风温度',deviation:'温差',recordedAt:'记录时间',note:'备注'};
function $(id){return document.getElementById(id)}
function esc(value){return String(value==null?'-':value).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function num(value){const n=Number(value||0);return Number.isFinite(n)?n:0}
function pctText(value){return `${Math.round(num(value)*10)/10}%`}
function clamp(value,min,max){return Math.max(min,Math.min(max,num(value)))}
function pad(n){return String(n).padStart(2,'0')}
function gotoLogin(){location.href='/login?redirect='+encodeURIComponent(location.pathname)}
async function api(path){const res=await fetch(API+path,{cache:'no-store'});if(res.status===401){gotoLogin();throw new Error('未登录')}const json=await res.json();if(!res.ok||json.success===false)throw new Error(json.error||'加载失败');return json.data||json}
function tick(){const d=new Date();const w=['日','一','二','三','四','五','六'];$('dateDisplay').textContent=`${d.getMonth()+1}/${d.getDate()} 周${w[d.getDay()]}`;$('clockDisplay').textContent=`${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`}
function renderUser(user){const name=user.displayName||user.username||'-';const canAdmin=user.role==='admin'||(user.permissions||[]).length>0;$('userbar').innerHTML=`<span>${esc(name)}</span>${canAdmin?'<a href="/admin">后台</a>':''}<a id="btnLogout">退出</a>`;$('btnLogout').onclick=async()=>{try{await fetch('/api/auth/logout',{method:'POST'})}catch(_){}gotoLogin()}}
function rowTable(rows,columns){return rows.length?`<table class="data-table"><thead><tr>${columns.map(c=>`<th>${esc(labels[c]||c)}</th>`).join('')}</tr></thead><tbody>${rows.map(row=>`<tr>${columns.map(c=>`<td>${esc(row[c])}</td>`).join('')}</tr>`).join('')}</tbody></table>`:'<div class="empty">暂无数据</div>'}
function resolveDrill(path){const parts=String(path||'').split('.');let cur=state.model&&state.model.drilldowns;for(const part of parts){if(cur==null)return null;cur=cur[part]}return cur}
function openDetail(title,rows,columns){$('modalTitle').textContent=`${title} · ${rows.length}条`;$('modalBody').innerHTML=rowTable(rows,columns);$('detailModal').classList.add('open')}
function openDrill(path){const data=resolveDrill(path);if(!data)return;openDetail(data.title||'明细',Array.isArray(data.rows)?data.rows:[],data.columns||Object.keys((data.rows||[])[0]||{}))}
function closeDetail(){$('detailModal').classList.remove('open')}
function thailandContainers(model){return new Set(((model.drilldowns&&model.drilldowns.shipped&&model.drilldowns.shipped.rows)||[]).map(row=>row.containerNo).filter(Boolean))}
function thailandTemperatureDetails(model){const set=thailandContainers(model);const details=(model.temperature&&model.temperature.details)||[];if(!set.size)return details;return details.filter(row=>set.has(row.containerNo))}
function renderOrders(model){const h=model.headline||{};const rows=(model.drilldowns&&model.drilldowns.orders&&model.drilldowns.orders.rows)||[];$('orderPanel').innerHTML=`<div class="panel-head"><div><div class="panel-title">订单数据</div><div class="panel-note">泰国订单主表口径</div></div><button data-drill="orders">订单明细</button></div><div class="metric-grid"><div class="metric gold"><div class="label">订单数</div><div class="value num">${esc(h.totalOrders)}</div></div><div class="metric green"><div class="label">下单柜数</div><div class="value num">${esc(h.totalBoxes)}</div></div><div class="metric teal"><div class="label">已发货</div><div class="value num">${esc(h.shipped)}</div></div><div class="metric blue"><div class="label">已签收</div><div class="value num">${esc(h.signed)}</div></div></div><div class="table-wrap">${rowTable(rows.slice(0,12),['orderNo','factory','freshBoxes','frozenBoxes','totalBoxes'])}</div>`;$('orderPanel').querySelector('[data-drill]').onclick=()=>openDrill('orders')}
function transitRows(model,key){const group=model.drilldowns&&model.drilldowns.bottlenecks&&model.drilldowns.bottlenecks[key];return group&&Array.isArray(group.rows)?group.rows:[]}
function renderLogistics(model){const stages=[{key:'overseasTransit',label:'国外在途',klass:'overseas'},{key:'onShore',label:'在岸待叫车',klass:'onshore'},{key:'domesticTransit',label:'国内在途',klass:'domestic'}];const cards=(model.bottlenecks||[]).filter(item=>stages.some(s=>s.key===item.key));$('logisticsPanel').innerHTML=`<div class="panel-head"><div><div class="panel-title">物流在途</div><div class="panel-note">国外在途、在岸、国内在途</div></div><button data-drill="shipped">全部发货柜</button></div><div class="transit-summary">${stages.map(stage=>`<div class="stage ${stage.klass}" data-stage="${stage.key}"><div class="label">${stage.label}</div><div class="value num">${transitRows(model,stage.key).length}</div></div>`).join('')}</div><div class="transit-list">${cards.length?cards.map(item=>`<div class="transit-card" data-stage="${esc(item.key)}"><div class="transit-top"><span>${esc(item.label)}</span><strong>${esc(item.count)}柜</strong></div><div class="transit-meta">${esc(item.hint)} · 平均 ${esc(item.avgDays)} 天 · 最久 ${esc(item.longestDays)} 天 · ${esc(item.longestContainer)}</div><div class="bar"><span style="width:${clamp(item.progressRate,0,100)}%"></span></div></div>`).join(''):'<div class="empty">暂无在途柜</div>'}</div>`;$('logisticsPanel').querySelector('[data-drill]').onclick=()=>openDrill('shipped');$('logisticsPanel').querySelectorAll('[data-stage]').forEach(el=>el.onclick=()=>openDrill(`bottlenecks.${el.dataset.stage}`))}
function buildGanttRows(model){const days=(model.temperature&&model.temperature.gantt&&model.temperature.gantt.days)||[];const details=thailandTemperatureDetails(model);return {days,rows:details.slice(0,10).map(row=>({containerNo:row.containerNo,brand:row.brand,cells:days.map((day,idx)=>({date:day.key,level:idx===days.length-1?(row.status==='ALARM'?'alarm':row.status==='WARN'?'warn':'ok'):'none',returnTemp:idx===days.length-1?row.returnTemp:null,setTemp:idx===days.length-1?row.setTemp:null,deviation:idx===days.length-1?row.deviation:null}))}))}}
function renderTemperature(model){const t=model.temperature||{};const details=thailandTemperatureDetails(model);const alarmCount=details.filter(row=>row.status==='ALARM').length;const warnCount=details.filter(row=>row.status==='WARN').length;const maxDeviation=details.reduce((max,row)=>Math.max(max,num(row.deviation)),0);const avg=details.length?Math.round(details.reduce((sum,row)=>sum+num(row.returnTemp),0)/details.length*10)/10:num(t.avgReturnTemp);const gantt=buildGanttRows(model);$('temperaturePanel').innerHTML=`<div class="panel-head"><div><div class="panel-title">温度甘特图</div><div class="panel-note">泰国发货柜温度趋势</div></div><button id="tempDetails">温度明细</button></div><div class="temp-strip"><div class="mini"><div class="label">温度记录</div><div class="value num">${details.length||esc(t.recordCount)}</div></div><div class="mini"><div class="label">异常柜</div><div class="value num">${alarmCount}</div></div><div class="mini"><div class="label">均温</div><div class="value num">${esc(avg)}°</div></div><div class="mini"><div class="label">最大温差</div><div class="value num">${maxDeviation||esc(t.maxDeviation)}°</div></div></div><div class="gantt" id="ganttGrid"><div class="gantt-head"><span>柜号</span>${gantt.days.map(day=>`<span>${esc(day.label)}</span>`).join('')}</div><div class="gantt-body">${gantt.rows.length?gantt.rows.map(row=>`<div class="gantt-row" data-container="${esc(row.containerNo)}"><div class="gantt-label">${esc(row.containerNo)}</div>${row.cells.map(cell=>`<div class="gantt-cell ${esc(cell.level)}" title="${esc(cell.date)} 回风 ${esc(cell.returnTemp||'-')} 设定 ${esc(cell.setTemp||'-')}"></div>`).join('')}</div>`).join(''):'<div class="empty">暂无泰国柜温度记录</div>'}</div></div>`;$('tempDetails').onclick=()=>openDetail('泰国温度明细',details,['containerNo','brand','setTemp','returnTemp','deviation','statusText','recordedAt','note']);$('temperaturePanel').querySelectorAll('[data-container]').forEach(el=>el.onclick=()=>openDrill(`temperatureByContainer.${el.dataset.container}`))}
async function load(){try{$('refreshState').textContent='正在加载';const [user,executive]=await Promise.all([api('/api/auth/me'),api('/api/overview-executive?country=%E6%B3%B0%E5%9B%BD')]);state.user=user;state.model=executive;renderUser(user);renderOrders(executive);renderLogistics(executive);renderTemperature(executive);$('refreshState').textContent='已更新 '+new Date().toLocaleTimeString('zh-CN',{hour12:false})}catch(err){console.warn(err);$('refreshState').textContent=err.message||'加载失败';$('orderPanel').innerHTML='<div class="empty">泰国大屏加载失败，请稍后刷新</div>'}}
$('modalClose').onclick=closeDetail;$('detailModal').onclick=e=>{if(e.target.id==='detailModal')closeDetail()};setInterval(tick,1000);tick();load();setInterval(load,60000);
</script>
</body>
</html>
