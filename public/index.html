<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>榴莲交付总览 · DURIAN DELIVERY OVERVIEW</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;700;900&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#070b16; --bg2:#0d1426;
    --panel:rgba(20,28,48,.72); --panel2:rgba(13,20,38,.85);
    --line:rgba(99,124,168,.18); --line2:rgba(148,173,214,.12);
    --txt:#eef3ff; --txt2:#9fb0cc; --txt3:#6c7e9c;
    --gold:#f5c451; --th:#eab308; --vn:#ef4444;
    --signed:#22c55e; --delivered:#2dd4bf; --transit:#f59e0b; --port:#fbbf24; --pending:#46556f;
    --danger:#f87171; --warn:#fbbf24; --ok:#34d399;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{min-height:100%;width:100%;background:var(--bg);
    font-family:"Noto Sans SC","Microsoft YaHei",sans-serif;color:var(--txt);}
  .num{font-family:"Oswald","Barlow Condensed",sans-serif;font-weight:700;font-feature-settings:"tnum";}
  .mono{font-family:"Oswald","Barlow Condensed",sans-serif;font-weight:600;letter-spacing:.02em;}

  .board{height:100vh;width:100vw;display:grid;grid-template-rows:6vh 41.5vh 1fr;
    gap:1.1vh;padding:1.1vh 1.1vw;
    background:
      radial-gradient(1200px 600px at 12% -10%, rgba(234,179,8,.10), transparent 60%),
      radial-gradient(1200px 600px at 88% -10%, rgba(239,68,68,.10), transparent 60%),
      var(--bg);}

  .top{display:flex;align-items:center;gap:1.3vw;padding:0 1.3vw;border-radius:1.1vh;
    background:linear-gradient(90deg,rgba(234,179,8,.14),rgba(239,68,68,.14));
    border:1px solid var(--line);position:relative;overflow:hidden;min-width:0;}
  .top::before{content:"";position:absolute;inset:0;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.05),transparent);}
  .brand{display:flex;align-items:center;gap:.8vw;position:relative;flex-shrink:0;}
  .logo{font-size:3vh;line-height:1;}
  .title-main{font-weight:900;font-size:2.2vh;letter-spacing:.08em;}
  .title-sub{font-size:1.2vh;color:var(--txt2);letter-spacing:.06em;margin-top:.1vh;}
  .divider-v{width:1px;height:4.4vh;background:var(--line);flex-shrink:0;}
  .agg{display:flex;align-items:baseline;gap:1.1vw;position:relative;min-width:0;flex:1;overflow:hidden;}
  .agg .item{display:flex;flex-direction:column;line-height:1.05;flex-shrink:0;}
  .agg .v{font-size:2.7vh;color:var(--gold);}
  .agg .v.green{color:var(--signed);}
  .agg .u{font-size:1.05vh;color:var(--txt3);letter-spacing:.04em;margin-top:.2vh;white-space:nowrap;}
  .top .right{margin-left:auto;display:flex;align-items:center;gap:1vw;position:relative;flex-shrink:0;}
  .top .clock-box{display:flex;flex-direction:column;align-items:flex-end;gap:.1vh;line-height:1.1;}
  .top .date{font-size:1.25vh;color:var(--txt2);font-weight:500;white-space:nowrap;}
  .top .clock{font-size:1.9vh;color:var(--txt);letter-spacing:.05em;white-space:nowrap;}
  .top .userbar{display:flex;align-items:center;gap:.5vw;font-size:1.2vh;color:var(--txt2);white-space:nowrap;}
  .top .userbar .uname{color:var(--gold);font-weight:700;max-width:8vw;overflow:hidden;text-overflow:ellipsis;display:inline-block;vertical-align:bottom;}
  .top .userbar a{color:var(--txt2);text-decoration:none;border:1px solid var(--line);
    padding:.2vh .55vw;border-radius:.5vh;cursor:pointer;transition:.15s;font-size:1.15vh;}
  .top .userbar a:hover{color:var(--vn);border-color:var(--vn);}
  .top .userbar a.admin{color:var(--gold);border-color:rgba(245,196,81,.4);}
  .top .userbar a.admin:hover{background:var(--gold);color:#000;}

  .main{display:grid;grid-template-columns:1fr 1fr;gap:1.1vw;min-height:0;}
  .country{display:flex;flex-direction:column;gap:.95vh;min-height:0;
    background:var(--panel);border:1px solid var(--line);border-radius:1.3vh;
    padding:1.2vh 1.3vw 1.3vh;position:relative;overflow:hidden;}
  .country.th{border-top:.42vh solid var(--th);} .country.vn{border-top:.42vh solid var(--vn);}
  .c-head{display:flex;align-items:center;gap:.6vw;}
  .flag{font-size:2.7vh;}
  .c-name{font-size:2.3vh;font-weight:900;letter-spacing:.07em;}
  .c-name small{font-size:1.25vh;color:var(--txt2);font-weight:500;letter-spacing:.16em;margin-left:.4vw;}
  .c-date{margin-left:auto;font-size:1.25vh;color:var(--txt3);}

  .kpis{display:flex;gap:.55vw;}
  .kpi{flex:1 1 0;min-width:0;background:var(--panel2);border:1px solid var(--line2);
    border-radius:.9vh;padding:.7vh .4vw;text-align:center;}
  .kpi .kv{font-size:2.7vh;line-height:1;}
  .kpi .ku{font-size:1.05vh;color:var(--txt3);margin-top:.4vh;white-space:nowrap;}
  .c-wht{color:#fff;} .c-red{color:var(--vn);} .c-signed{color:var(--signed);} .c-dlv{color:var(--delivered);}
  .c-transit{color:var(--transit);} .c-port{color:var(--port);} .c-pending{color:#8ea0bd;} .c-th{color:var(--th);} .c-danger{color:var(--danger);}

  .overall{display:flex;align-items:center;gap:.8vw;}
  .overall .lab{font-size:1.25vh;color:var(--txt2);white-space:nowrap;font-weight:700;letter-spacing:.05em;}
  .bar{flex:1;min-width:0;height:2.3vh;background:rgba(255,255,255,.05);border-radius:.55vh;
    display:flex;overflow:hidden;border:1px solid var(--line2);}
  .seg{display:flex;align-items:center;justify-content:center;font-size:1.25vh;font-weight:700;color:#06121f;
    white-space:nowrap;overflow:hidden;min-width:0;}
  .seg.s-signed{background:var(--signed);} .seg.s-dlv{background:var(--delivered);}
  .seg.s-transit{background:var(--transit);} .seg.s-port{background:var(--port);}
  .seg.s-pending{background:var(--pending);color:#dbe4f2;}
  .rate{font-size:1.6vh;font-weight:700;white-space:nowrap;} .rate.big{font-size:2.3vh;}

  .legend{display:flex;flex-wrap:wrap;gap:.8vw;font-size:1.15vh;color:var(--txt2);}
  .legend span{display:inline-flex;align-items:center;gap:.3vw;}
  .dot{width:.95vh;height:.95vh;border-radius:50%;display:inline-block;}

  .cats{display:flex;flex-direction:column;gap:.85vh;flex:1;min-height:0;overflow-y:auto;padding-right:.3vw;}
  .cats::-webkit-scrollbar{width:4px;}
  .cats::-webkit-scrollbar-thumb{background:rgba(148,173,214,.18);border-radius:2px;}
  .cat{display:flex;flex-direction:column;gap:.55vh;}
  .cat-head{display:flex;align-items:center;gap:.6vw;flex-wrap:wrap;}
  .cat-tag{display:inline-flex;align-items:center;gap:.3vw;padding:.25vh .65vw;border-radius:.6vh;
    font-size:1.25vh;font-weight:700;letter-spacing:.04em;}
  .cat-tag.fresh{background:rgba(239,68,68,.16);color:#ffb4b4;border:1px solid rgba(239,68,68,.35);}
  .cat-tag.frozen{background:rgba(56,189,248,.15);color:#9fdcff;border:1px solid rgba(56,189,248,.32);}
  .cat-sum{font-size:1.2vh;color:var(--txt2);font-weight:600;} .cat-sum b{color:var(--txt);}

  .rows{display:flex;flex-direction:column;gap:.5vh;}
  .row{display:grid;grid-template-columns:13vw 1fr 6vw;align-items:center;gap:.8vw;}
  .row .nm{font-size:1.35vh;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .row .nm small{display:block;font-size:1.05vh;color:var(--txt3);font-weight:500;margin-top:.05vh;}
  .row .bar{height:1.85vh;}
  .row .cap{font-size:1.02vh;color:var(--txt3);text-align:right;white-space:nowrap;line-height:1.2;}
  .row .cap b{color:var(--txt2);font-weight:700;} .row .seg{font-size:1.05vh;}

  .bottom{display:grid;grid-template-columns:2.2fr 1fr;gap:1.1vw;min-height:0;}
  .ncol{background:var(--panel);border:1px solid var(--line);border-radius:1.3vh;
    border-top:.35vh solid var(--gold);
    padding:1.2vh 1.1vw;display:flex;flex-direction:column;gap:.7vh;overflow:hidden;}
  .n-head{display:flex;align-items:center;gap:.4vw;font-size:1.5vh;font-weight:900;letter-spacing:.04em;}
  .n-body-wrap{display:flex;flex-direction:column;gap:.9vh;flex:1;min-height:0;overflow-y:auto;padding-right:.3vw;}
  .n-body-wrap::-webkit-scrollbar{width:4px;}
  .n-body-wrap::-webkit-scrollbar-thumb{background:rgba(148,173,214,.18);border-radius:2px;}
  .n-section{display:flex;flex-direction:column;gap:.55vh;}
  .n-section-head{display:flex;align-items:center;gap:.4vw;font-size:1.2vh;font-weight:700;letter-spacing:.04em;
    padding:.25vh .55vw;border-radius:.5vh;align-self:flex-start;}
  .n-section-head.th{background:rgba(234,179,8,.16);color:#fde68a;border:1px solid rgba(234,179,8,.32);}
  .n-section-head.vn{background:rgba(239,68,68,.16);color:#fca5a5;border:1px solid rgba(239,68,68,.32);}
  .n-list{display:flex;flex-direction:column;gap:.6vh;}
  .n-item{display:flex;gap:.5vw;align-items:flex-start;}
  .n-ico{font-size:1.4vh;line-height:1.3;flex-shrink:0;}
  .n-body{line-height:1.3;min-width:0;}
  .n-t{font-size:1.25vh;font-weight:700;color:var(--txt);}
  .n-d{font-size:1.08vh;color:var(--txt2);} .n-d b{color:var(--gold);font-weight:700;}

  .logistics{background:var(--panel);border:1px solid var(--line);border-radius:1.3vh;
    border-top:.42vh solid var(--gold);padding:1.2vh 1.2vw;display:flex;flex-direction:column;
    gap:1vh;overflow:hidden;position:relative;}
  .logistics::before{content:"";position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(700px 200px at 50% 0%,rgba(245,196,81,.10),transparent 70%);}
  .l-head{display:flex;align-items:center;gap:.5vw;position:relative;}
  .l-ico{font-size:2vh;}
  .l-title{font-size:1.7vh;font-weight:900;letter-spacing:.05em;}
  .l-title small{color:var(--txt3);font-weight:500;font-size:1.15vh;margin-left:.4vw;letter-spacing:.12em;}
  .l-sub{margin-left:auto;font-size:1.1vh;color:var(--txt3);}
  .l-kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:.5vw;position:relative;}
  .l-kpi{background:var(--panel2);border:1px solid var(--line2);border-radius:.85vh;
    padding:.6vh .3vw;text-align:center;position:relative;}
  .l-kpi .lv{font-size:2.4vh;line-height:1;}
  .l-kpi .lv .u{font-size:1.05vh;font-weight:600;color:var(--txt2);margin-left:.12vw;}
  .l-kpi .lu{font-size:1.02vh;color:var(--txt3);margin-top:.35vh;white-space:nowrap;}
  .l-kpi.alarm{border-color:rgba(248,113,113,.5);background:rgba(248,113,113,.08);}
  .l-kpi.warn{border-color:rgba(251,191,36,.45);background:rgba(251,191,36,.07);}
  .l-tables{display:grid;grid-template-columns:1fr 1.18fr;gap:1vw;flex:1;min-height:0;position:relative;}
  .l-table{display:flex;flex-direction:column;gap:.45vh;min-height:0;}
  .l-th{display:flex;align-items:center;gap:.4vw;font-size:1.25vh;font-weight:700;}
  .l-th .badge{font-size:1vh;padding:.15vh .55vw;border-radius:.45vh;font-weight:700;}
  .badge.red{background:rgba(248,113,113,.2);color:#ffb4b4;}
  table.t{width:100%;border-collapse:collapse;table-layout:fixed;}
  table.t th{font-size:1vh;color:var(--txt3);font-weight:600;text-align:left;
    padding:.4vh .3vw;border-bottom:1px solid var(--line2);white-space:nowrap;}
  table.t td{padding:.5vh .3vw;border-bottom:1px solid var(--line2);
    font-size:1.18vh;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;vertical-align:middle;}
  table.t tr:last-child td{border-bottom:none;}
  .pill{display:inline-block;font-size:.98vh;font-weight:700;padding:.12vh .5vw;border-radius:.4vh;line-height:1.4;}
  .pill.fresh{background:rgba(239,68,68,.18);color:#ffb4b4;}
  .pill.frozen{background:rgba(56,189,248,.16);color:#9fdcff;}
  .pill.ok{background:rgba(52,211,153,.16);color:#86efac;}
  .pill.warn{background:rgba(251,191,36,.18);color:#ffe08a;}
  .pill.alarm{background:rgba(248,113,113,.2);color:#ffb4b4;}
  .dev-ok{color:var(--ok);font-weight:700;} .dev-warn{color:var(--warn);font-weight:700;} .dev-alarm{color:var(--danger);font-weight:800;}

  /* ===== 温度甘特图（看板下方，保留的核心功能）===== */
  .gantt-section{padding:2.4vh 1.1vw 3vh;background:var(--bg);}
  .gantt-section .g-head{display:flex;align-items:center;gap:14px;margin-bottom:1.4vh;flex-wrap:wrap;}
  .gantt-section .g-head h2{font-size:2vh;font-weight:900;letter-spacing:.04em;}
  .gantt-section .g-head .g-sub{font-size:1.3vh;color:var(--txt3);}
  .gantt-section .g-ctrl{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:1.3vh;color:var(--txt2);}
  .gantt-section select{background:var(--panel2);border:1px solid var(--line);color:var(--txt);
    padding:6px 10px;border-radius:6px;font-size:1.3vh;}
  .gantt-legend{display:flex;align-items:center;gap:8px;font-size:1.2vh;color:var(--txt2);margin-bottom:1vh;}
  .gantt-legend .legend-bar{width:160px;height:10px;border-radius:5px;
    background:linear-gradient(90deg,rgb(21,101,192),rgb(66,165,245),rgb(102,187,106),rgb(255,235,59),rgb(255,152,0),rgb(244,67,54));}
  #ganttContainer{overflow:auto;border:1px solid var(--line);border-radius:1.1vh;background:var(--panel2);}
  #ganttContainer .gantt-empty{padding:30px;text-align:center;color:var(--txt3);font-size:1.4vh;}
  #ganttContainer table.gantt-table{width:100%;border-collapse:collapse;}
  #ganttContainer table.gantt-table th{font-size:1.2vh;color:var(--txt2);font-weight:600;
    padding:8px 6px;border-bottom:1px solid var(--line);white-space:nowrap;text-align:center;}
  #ganttContainer table.gantt-table th small{color:var(--txt3);font-weight:400;}
  #ganttContainer table.gantt-table td{padding:8px 6px;text-align:center;font-size:1.3vh;font-weight:700;
    border-bottom:1px solid var(--line2);min-width:54px;}
  #ganttContainer .gantt-row-label{text-align:left;font-weight:700;color:var(--txt);background:var(--panel);
    position:sticky;left:0;white-space:nowrap;font-family:"Oswald",sans-serif;}
  #ganttContainer .gantt-empty-cell{color:var(--txt3);background:transparent;font-weight:400;}

  #loader{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:var(--bg);z-index:99;color:var(--txt2);font-size:1.6vh;flex-direction:column;gap:1vh;}
  #loader .spin{width:5vh;height:5vh;border:.4vh solid rgba(255,255,255,.1);border-top-color:var(--gold);
    border-radius:50%;animation:sp 1s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg)}}
  #loader.hidden{display:none;}
</style>
</head>
<body>
<div id="loader"><div class="spin"></div><div>正在加载数据...</div></div>

<div class="board">
  <div class="top">
    <div class="brand">
      <div class="logo">🌴</div>
      <div>
        <div class="title-main" id="title-main">榴莲交付总览 · DURIAN DELIVERY OVERVIEW</div>
        <div class="title-sub" id="title-sub">THAILAND & VIETNAM · 泰越双产季订单 + 物流监控实时看板</div>
      </div>
    </div>
    <div class="divider-v"></div>
    <div class="agg" id="agg"></div>
    <div class="right">
      <div class="clock-box">
        <div class="date" id="topDate">加载中...</div>
        <div class="clock num" id="clock">--:--:--</div>
      </div>
      <div class="userbar" id="userbar"></div>
    </div>
  </div>
  <div class="main">
    <section class="country th" id="country-th"></section>
    <section class="country vn" id="country-vn"></section>
  </div>
  <div class="bottom">
    <section class="logistics" id="logistics"></section>
    <div class="ncol" id="news-combined"></div>
  </div>
</div>

<!-- 温度甘特图（保留的核心功能，置于看板下方） -->
<section class="gantt-section">
  <div class="g-head">
    <h2>📅 温度甘特图</h2>
    <span class="g-sub">最近 7 天 · 柜号 × 日期 · 企业微信实时温度</span>
    <div class="g-ctrl">
      <span>显示温度：</span>
      <select id="tempTypeFilter">
        <option value="returnTemp">回风温度</option>
        <option value="setTemp">设定温度</option>
        <option value="supplyTemp">送风温度</option>
      </select>
    </div>
  </div>
  <div class="gantt-legend"><span>冷</span><span class="legend-bar"></span><span>热</span></div>
  <div id="ganttContainer"><p class="gantt-empty">加载中...</p></div>
</section>

<script>
// ===== 看板渲染器：从 /api/aggregate 拉数据（带登录认证）=====
const API = '';
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s==null?'':s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function md(s){ return esc(s).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>'); }
const num = (n) => Number(n)||0;
function kpi(cls, val, label){ return `<div class="kpi"><div class="kv num ${cls}">${val}</div><div class="ku">${label}</div></div>`; }
function seg(w,cls,txt){ return w>0.3 ? `<span class="seg ${cls}" style="width:${w}%">${txt}</span>`:''; }

function gotoLogin(){ window.location.href = '/login?redirect=' + encodeURIComponent(window.location.pathname); }

function renderCountry(el, info, country){
  const isTH = country==='TH';
  const kpis = isTH ? [
    kpi('c-th',info.orders,'总订单 / 单'), kpi('c-wht',info.boxes,'总箱量 / 柜'),
    kpi('c-signed',info.rows.filter(r=>num(r.delivered)>0).length,'已交付 / 单'),
    kpi('c-signed',info.delivered,'已交付 / 柜'), kpi('c-transit',info.transit,'在途 / 柜'),
    kpi('c-pending',info.pending,'待发 / 柜'), kpi('c-signed',info.rate.toFixed(1)+'%','交付率')
  ] : [
    kpi('c-red',info.orders,'总订单 / 单'), kpi('c-wht',info.boxes,'总箱量 / 柜'),
    kpi('c-signed',info.signed,'已签收 / 柜'), kpi('c-dlv',info.delivered,'已交付 / 柜'),
    kpi('c-transit',info.transit,'在途 / 柜'), kpi('c-port',info.port,'口岸 / 柜'),
    kpi('c-pending',info.pending,'待发 / 柜'), kpi('c-signed',info.rate.toFixed(1)+'%','签收率')
  ];
  const total = info.boxes||1;
  const done = isTH ? info.delivered : info.signed;
  const bar = seg(done/total*100,'s-signed',done) + (isTH?'':seg(info.delivered/total*100,'s-dlv',info.delivered))
    + seg(info.transit/total*100,'s-transit',info.transit) + seg(info.port/total*100,'s-port',info.port)
    + seg(info.pending/total*100,'s-pending',info.pending);
  const legend = isTH
    ? `<span><i class="dot" style="background:var(--signed)"></i>已交付</span><span><i class="dot" style="background:var(--transit)"></i>在途</span><span><i class="dot" style="background:var(--pending)"></i>待发</span>`
    : `<span><i class="dot" style="background:var(--signed)"></i>已签收</span><span><i class="dot" style="background:var(--delivered)"></i>已交付</span><span><i class="dot" style="background:var(--transit)"></i>在途</span><span><i class="dot" style="background:var(--port)"></i>口岸</span><span><i class="dot" style="background:var(--pending)"></i>待发</span>`;
  const catLabel = {FRESH:'🍒 鲜果 FRESH', FROZEN:'❄️ 冻肉 FROZEN'};
  const renderCat = (cat) => {
    const rows = info.rows.filter(r=>r.category===cat);
    if(!rows.length) return '';
    const s={orders:0,boxes:0,delivered:0,signed:0,transit:0,port:0,pending:0};
    rows.forEach(r=>Object.keys(s).forEach(k=>s[k]+=num(r[k])));
    const sumTxt = `<b>${s.orders} 单 / ${s.boxes} 柜</b>` + (isTH
      ? ` · 已交 ${s.delivered} · 在途 ${s.transit} · 待发 ${s.pending}`
      : ` · 签收 ${s.signed} · 在途 ${s.transit} · 口岸 ${s.port} · 待发 ${s.pending}`);
    const rowsHtml = rows.map(r=>{
      const rt=r.boxes||1, rDone=isTH?num(r.delivered):num(r.signed), rRate=rDone/rt*100;
      const b = seg(rDone/rt*100,'s-signed',rDone) + (isTH?'':seg(num(r.delivered)/rt*100,'s-dlv',r.delivered))
        + seg(num(r.transit)/rt*100,'s-transit',r.transit) + seg(num(r.port)/rt*100,'s-port',r.port)
        + seg(num(r.pending)/rt*100,'s-pending',r.pending);
      return `<div class="row"><div class="nm">${esc(r.brand)}<small>${num(r.orders)} 单 / ${num(r.boxes)} 柜</small></div>
        <div class="bar">${b||'<span class="seg s-pending" style="width:100%">'+num(r.boxes)+' 待发</span>'}</div>
        <div class="cap">${isTH?'交付率':'签收率'} <b class="${rRate>0?'c-signed':'c-pending'}">${rRate.toFixed(1)}%</b></div></div>`;
    }).join('');
    return `<div class="cat"><div class="cat-head"><span class="cat-tag ${cat.toLowerCase()}">${catLabel[cat]}</span><span class="cat-sum">${sumTxt}</span></div><div class="rows">${rowsHtml}</div></div>`;
  };
  el.innerHTML = `
    <div class="c-head"><span class="flag">${isTH?'🇹🇭':'🇻🇳'}</span><span class="c-name">${isTH?'泰国 THAILAND':'越南 VIETNAM'}<small>${isTH?'泰国榴莲订单交付进度':'越南榴莲订单交付进度'}</small></span><span class="c-date">数据实时</span></div>
    <div class="kpis">${kpis.join('')}</div>
    <div class="overall"><span class="lab">总进度</span><div class="bar">${bar}</div><span class="rate big c-signed num">${info.rate.toFixed(1)}%</span></div>
    <div class="legend">${legend}</div>
    <div class="cats">${renderCat('FRESH')}${renderCat('FROZEN')}</div>`;
}

function renderLogistics(el, L){
  const k=L.kpis||{}, pd=L.portDelays||[], tc=L.inTransitContainers||[];
  const dCls=d=>d>=3?'dev-alarm':(d>=2?'dev-warn':'dev-ok');
  const pdRows=pd.map(r=>`<tr><td class="mono">${esc(r.container)}</td><td>${esc(r.route)}</td><td><span class="pill ${r.category==='FROZEN'?'frozen':'fresh'}">${r.category==='FROZEN'?'冻果':'鲜果'}</span></td><td class="${dCls(num(r.delayDays))} mono">${num(r.delayDays).toFixed(1)}天</td><td>${esc(r.reason)}</td></tr>`).join('');
  const sPill=(s,n)=>s==='ALARM'?'<span class="pill alarm">▲'+esc(n||'异常')+'</span>':(s==='WARN'?'<span class="pill warn">'+esc(n||'注意')+'</span>':'<span class="pill ok">'+esc(n||'正常')+'</span>');
  const tcRows=tc.map(r=>{const dev=num(r.returnTemp)-num(r.setTemp);return `<tr><td class="mono">${esc(r.container)}</td><td>${esc(r.brand)}</td><td class="mono">${num(r.setTemp)}° / ${num(r.returnTemp)}°</td><td class="${dCls(dev)} mono">${dev>=0?'+':''}${dev.toFixed(1)}°</td><td>${esc(r.location)}</td><td>${sPill(r.status,r.note)}</td></tr>`;}).join('');
  const alarms=tc.filter(r=>r.status==='ALARM').length;
  el.innerHTML=`
    <div class="l-head"><span class="l-ico">🚚</span><span class="l-title">物流监控 LOGISTICS<small>冷链在途 · 温度与关口实时</small></span><span class="l-sub">实时数据</span></div>
    <div class="l-kpis">
      <div class="l-kpi"><div class="lv num c-transit">${num(k.inTransit)}<span class="u">柜</span></div><div class="lu">在途批次</div></div>
      <div class="l-kpi"><div class="lv num c-wht">${num(k.tempRecords)}<span class="u">条</span></div><div class="lu">温度记录</div></div>
      <div class="l-kpi"><div class="lv num c-dlv">${num(k.avgReturnTemp).toFixed(1)}<span class="u">°C</span></div><div class="lu">平均回风温度</div></div>
      <div class="l-kpi alarm"><div class="lv num c-danger">${num(k.tempAlarms)}<span class="u">条</span></div><div class="lu">温度异常</div></div>
      <div class="l-kpi warn"><div class="lv num c-port">${num(k.portDelayed)}<span class="u">柜</span></div><div class="lu">关口滞留</div></div>
    </div>
    <div class="l-tables">
      <div class="l-table"><div class="l-th">🚨 关口滞留预警 <span class="badge red">${pd.length} 批</span></div>
        <table class="t"><colgroup><col style="width:30%"><col style="width:21%"><col style="width:15%"><col style="width:14%"><col style="width:20%"></colgroup>
        <thead><tr><th>柜号 / 路线</th><th>客户</th><th>品类</th><th>滞留</th><th>原因</th></tr></thead>
        <tbody>${pdRows||'<tr><td colspan="5" style="color:var(--txt3);text-align:center">暂无滞留</td></tr>'}</tbody></table></div>
      <div class="l-table"><div class="l-th">🌡️ 在途冷柜 · 温度告警 <span class="badge red">${alarms} 异常</span></div>
        <table class="t"><colgroup><col style="width:27%"><col style="width:13%"><col style="width:17%"><col style="width:12%"><col style="width:20%"><col style="width:11%"></colgroup>
        <thead><tr><th>柜号</th><th>品牌</th><th>设定/回风</th><th>偏差</th><th>当前位置</th><th>状态</th></tr></thead>
        <tbody>${tcRows||'<tr><td colspan="6" style="color:var(--txt3);text-align:center">暂无在途柜</td></tr>'}</tbody></table></div>
    </div>`;
}

function renderNewsCombined(el, thArr, vnArr){
  const sec = (country, arr) => {
    const flag = country==='TH' ? '🇹🇭 泰国 · 产业快讯' : '🇻🇳 越南 · 市场动向';
    const items = (arr||[]).map(n=>`<div class="n-item"><span class="n-ico">${esc(n.icon||'📌')}</span><div class="n-body"><div class="n-t">${esc(n.title)}</div><div class="n-d">${md(n.detail||'')}</div></div></div>`).join('') || '<div style="color:var(--txt3);font-size:1.1vh">暂无</div>';
    return `<div class="n-section"><div class="n-section-head ${country.toLowerCase()}">${flag}</div><div class="n-list">${items}</div></div>`;
  };
  el.innerHTML = `<div class="n-head">📢 产业快讯 · INDUSTRY NEWS</div>
    <div class="n-body-wrap">${sec('TH',thArr)}${sec('VN',vnArr)}</div>`;
}

async function loadUser(){
  try{
    const r = await fetch(API+'/api/auth/me',{cache:'no-store'});
    if(r.status===401){ gotoLogin(); return false; }
    const j = await r.json();
    if(j && j.success && j.data){
      const name = j.data.displayName || j.data.username;
      const adminLink = j.data.role==='admin' ? ' <a class="admin" href="/admin">后台</a>' : '';
      $('userbar').innerHTML = `👤 <span class="uname" title="${esc(name)}">${esc(name)}</span>${adminLink} <a id="btnLogout">退出</a>`;
      $('btnLogout').onclick = async ()=>{ try{ await fetch(API+'/api/auth/logout',{method:'POST'}); }catch(_){} gotoLogin(); };
    }
    return true;
  }catch(e){ console.warn('用户信息加载失败：',e.message); return true; }
}

async function loadData(){
  try{
    const r=await fetch(API+'/api/aggregate',{cache:'no-store'});
    if(r.status===401){ gotoLogin(); return null; }
    if(!r.ok) throw new Error('HTTP '+r.status);
    return await r.json();
  }
  catch(e){ console.warn('无法连接后端：',e.message); return null; }
}
function paint(d){
  if(d.meta){ if(d.meta.title)$('title-main').textContent=d.meta.title; if(d.meta.subtitle)$('title-sub').textContent=d.meta.subtitle; }
  const g=d.global;
  $('agg').innerHTML=`<div class="item"><span class="v num">${g.totalOrders}</span><span class="u">合计订单 / 单</span></div>
    <div class="item"><span class="v num">${g.totalBoxes}</span><span class="u">合计箱量 / 柜</span></div>
    <div class="item"><span class="v num green">${g.totalDone}</span><span class="u">累计完成 / 柜</span></div>
    <div class="item"><span class="v num">${g.totalMoving}</span><span class="u">在途+口岸 / 柜</span></div>
    <div class="item"><span class="v num">${g.totalPending}</span><span class="u">待发 / 柜</span></div>`;
  renderCountry($('country-th'),d.th,'TH');
  renderCountry($('country-vn'),d.vn,'VN');
  renderLogistics($('logistics'),d.logistics);
  renderNewsCombined($('news-combined'),d.news.th,d.news.vn);
  const srcTag = d._source==='wecom' ? ' · 📡企微' : ' · ✏️手动';
  $('topDate').textContent='最后更新 ' + new Date(d.generatedAt||Date.now()).toLocaleTimeString('zh-CN') + srcTag;
}
async function boot(){
  const ok = await loadUser();
  if(!ok) return; // 已跳转登录
  const d=await loadData();
  $('loader').classList.add('hidden');
  if(d){ paint(d); setInterval(async()=>{const nd=await loadData();if(nd)paint(nd);},30000); }
}
function tick(){const d=new Date(),p=n=>String(n).padStart(2,'0');$('clock').textContent=`${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;}
tick();setInterval(tick,1000);boot();
</script>
<script src="gantt.js?v=1"></script>
</body>
