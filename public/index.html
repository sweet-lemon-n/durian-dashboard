<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍈 榴莲运输温度监控看板</title>
  <link rel="stylesheet" href="style.css?v=6">
</head>
<body>
  <div class="app">
    <!-- 顶部导航 -->
    <header class="header">
      <div class="header-left">
        <h1>🍈 榴莲运输温度监控看板</h1>
        <span class="header-badge">LIVE</span>
      </div>
      <div class="header-center" id="userInfo"></div>
      <div class="header-right">
        <span class="last-update" id="lastUpdate">--</span>
        <button class="btn-refresh" id="btnRefresh" title="手动刷新">⟳ 刷新</button>
        <button class="btn-settings" id="btnSettings">⚙</button>
        <button class="btn-logout" id="btnLogout" title="退出登录">退出</button>
      </div>
    </header>

    <!-- 统计卡片行 -->
    <section class="stats-row" id="statsRow">
      <div class="stat-card">
        <div class="stat-label">在途批次</div>
        <div class="stat-value" id="statContainers">--</div>
        <div class="stat-unit">柜</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">温度记录</div>
        <div class="stat-value" id="statTotal">--</div>
        <div class="stat-unit">条</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">平均回风温度</div>
        <div class="stat-value" id="statAvgTemp">--</div>
        <div class="stat-unit">°C</div>
      </div>
      <div class="stat-card warning" id="statAlertsCard">
        <div class="stat-label">温度异常</div>
        <div class="stat-value" id="statAbnormal">--</div>
        <div class="stat-unit">条</div>
      </div>
      <div class="stat-card detention" id="statDetentionCard">
        <div class="stat-label">关口滞留</div>
        <div class="stat-value" id="statDetained">--</div>
        <div class="stat-unit">柜</div>
      </div>
    </section>

    <!-- 滞留告警横幅（有关口滞留时显示） -->
    <section class="alert-banner detention-banner" id="detentionBanner" style="display:none">
      <div class="alert-banner-header">
        <span>⏳ 关口滞留预警</span>
        <span class="alert-count" id="detentionCount">0</span>
      </div>
      <div class="alert-list" id="detentionList"></div>
    </section>

    <!-- 告警横幅（有异常时显示） -->
    <section class="alert-banner" id="alertBanner" style="display:none">
      <div class="alert-banner-header">
        <span>⚠️ 温度告警</span>
        <span class="alert-count" id="alertCount">0</span>
      </div>
      <div class="alert-list" id="alertList"></div>
    </section>

    <!-- 甘特图区域 -->
    <section class="chart-section">
      <div class="chart-header">
        <h2>📅 温度甘特图（最近7天）</h2>
        <div class="chart-controls">
          <span style="color:var(--text-secondary);font-size:0.85rem">显示温度：</span>
          <select id="tempTypeFilter" class="filter-select">
            <option value="returnTemp">回风温度</option>
            <option value="setTemp">设定温度</option>
            <option value="supplyTemp">送风温度</option>
          </select>
        </div>
      </div>
      <div class="gantt-legend">
        <span>冷</span>
        <span class="legend-bar"></span>
        <span>热</span>
      </div>
      <div class="gantt-wrap" id="ganttContainer">
        <p class="gantt-empty">加载中...</p>
      </div>
    </section>

    <!-- 数据明细 -->
    <section class="table-section">
      <div class="table-header">
        <h2>📋 温度记录明细</h2>
        <div class="table-info">
          <span id="tableRecordCount">0 条记录</span>
        </div>
      </div>
      <div class="table-wrap">
        <table id="recordsTable">
          <thead>
            <tr>
              <th>柜号</th>
              <th>品牌</th>
              <th>放柜时间</th>
              <th>设定温度</th>
              <th>送风温度</th>
              <th>回风温度</th>
              <th>风口设定</th>
              <th>当前位置</th>
              <th>味道</th>
              <th>关口</th>
              <th>滞留关口</th>
              <th>滞留天数</th>
              <th>更新时间</th>
              <th>状态</th>
            </tr>
          </thead>
          <tbody id="recordsBody">
            <tr class="empty-row">
              <td colspan="14">加载中...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <!-- 底部 -->
    <footer class="footer">
      <span>数据源：企业微信智能表格</span>
      <span>自动刷新间隔：<span id="refreshIntervalDisplay">30</span> 秒</span>
    </footer>
  </div>

  <!-- 设置面板 -->
  <div class="settings-overlay" id="settingsOverlay" style="display:none">
    <div class="settings-panel">
      <div class="settings-header">
        <h3>⚙ 看板设置</h3>
        <button class="btn-close" id="btnSettingsClose">✕</button>
      </div>
      <div class="settings-body">
        <div class="setting-item">
          <label>温度正常范围</label>
          <div class="setting-range">
            <input type="number" id="settingTempMin" class="setting-input" step="0.5"> °C
            <span>~</span>
            <input type="number" id="settingTempMax" class="setting-input" step="0.5"> °C
          </div>
        </div>
        <div class="setting-item">
          <label>刷新间隔（秒）</label>
          <input type="number" id="settingRefresh" class="setting-input" min="5" max="300" step="5">
        </div>
        <button class="btn-primary" id="btnSaveSettings">保存设置</button>
      </div>
    </div>
  </div>

  <script src="app.js?v=6"></script>
</body>
</html>
